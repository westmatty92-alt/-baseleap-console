          <button onclick="resetAllSelections()" ${bulkDis}>Reset all to proposed</button>
        </div>
        <div id="fin-list">${f.validated.map(renderFinCard).join("")}</div>`
        : `<div class="fin-empty">No validated gaps yet — qualify gaps on the Feasibility tab first.</div>`}
      ${f.pending ? `<div class="fin-note">${f.pending} gap${f.pending === 1 ? " is" : "s are"} still awaiting feasibility — assess ${f.pending === 1 ? "it" : "them"} on the Feasibility tab if ${f.pending === 1 ? "it's" : "they're"} in scope.</div>` : ""}
      <div class="fin-note" id="finalize-msg">${esc(S.automation.finMsg)}</div>
    </div></div>`;
}

/* ---- Build-plan subtab UI ---- */
function renderBuildPlanBody(){
  const body = document.getElementById("automation-body");
  if(!S.buildPlan.loaded){ body.innerHTML = `<div class="audit-empty">Loading build plan…</div>`; loadBuildPlanData(S.activeClientId); return; }
  // precedence: a saved plan is the truth; a draft only shows before any save
  const inner = S.buildPlan.plan ? renderSavedPlan() : S.buildPlan.draft ? renderDraftReview() : renderPlanEmpty();
  body.innerHTML = inner + `<div class="msg" id="buildplan-msg" style="margin-top:10px">${esc(S.buildPlan.msg)}</div>`;
  autoSizeNotes();
}

// Scroller fix: the notes content (review flag / spec / deployment dumps) lays out
// full-height instead of scrolling inside a 64px box. Runs after every plan render;
// the textarea's own oninput keeps it growing while the operator types (saveStepNotes
// intentionally doesn't re-render). resize:vertical still allows manual shrinking.
function autoSizeNotes(){
  document.querySelectorAll("#automation-body textarea.notes").forEach(t => {
    t.style.height = "auto"; t.style.height = (t.scrollHeight + 2) + "px";
  });
}

function renderPlanEmpty(){
  return `
    <div class="card">
      <div class="phase-t">No build plan yet</div>
      <div class="msg" style="margin-bottom:12px">Generates ONE dependency-ordered plan (setup + automation steps) from this client's accepted gaps. Validate gaps on the Feasibility tab, then mark them accepted on the Finalize tab.</div>
      <button class="btn-primary" style="width:auto" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating plan…":"Generate build plan"}</button>
    </div>`;
}

/* -- draft review: warnings FIRST (look before you save), then scope flags, summary, ordered steps -- */
function renderDraftWarnings(d){
  if(!d.warnings.length) return "";
  return `
    <div class="plan-warn">
      <div class="plan-warn-title">⚠ ${d.warnings.length} accepted gap${d.warnings.length===1?"":"s"} NOT covered by this plan</div>
      ${d.warnings.map(w => `<div class="plan-warn-item">• ${esc(w)}</div>`).join("")}
      <div class="msg" style="margin-top:6px">Look before you save: regenerate, or save knowingly — some gaps are a conversation, not an automation.</div>
    </div>`;
}

function draftDepLabel(s, d){
  return s.depends_on.map(ref => { const t = d.steps.find(x => x.ref === ref); return t ? "#" + (t.position + 1) : ref; }).join(", ");
}

function stepBadges(s){
  return [s.agent, s.mode, s.needs_review ? "⚠ review · " + s.needs_review : "", s.manifest && s.manifest.tbd ? "⚠ tags/fields TBD" : "", s.long_lead ? "long-lead" : "", s.estimated_hours != null ? s.estimated_hours + "h" : ""]
    .filter(Boolean).map(b => `<span class="step-badge">${esc(String(b))}</span>`).join(" ");
}

/* -- Build-Plan Depth: expandable node workflow + manifest (draft AND saved) --
   Structured underneath, readable flow on expand (locked decision): typed
   {type, config} nodes from formulated engines get a type chip; prose-string
   steps from catalog specs render as plain STEP rows — same top-to-bottom flow.
   Expand state lives in S.buildPlan.expanded so it survives the re-renders the
   PM layer triggers (checklist toggles, status changes). */
function toggleStepDepth(key){
  S.buildPlan.expanded[key] = !S.buildPlan.expanded[key];
  renderAutomation();
}

function renderNodeRows(nodes){
  // wf-t-<type> class + wrapped branch cards are inert hooks: no color/grid CSS
  // matches them outside .bp-detail, so draft-review renders exactly as before.
  return (nodes || []).map(n => {
    if(typeof n === "string") return `<div class="wf-row wf-t-step"><span class="wf-chip">STEP</span><span>${esc(n)}</span></div>`;
    const chip = n.type === "condition" ? "IF" : String(n.type || "step").toUpperCase();
    let html = `<div class="wf-row wf-t-${esc(n.type || "step")}"><span class="wf-chip">${esc(chip)}</span><span>${esc(n.config || "")}</span></div>`;
    if(n.type === "condition")
      html += `<div class="wf-branch"><div class="wf-br"><div class="wf-branch-label">YES</div>${renderNodeRows(n.yes)}</div><div class="wf-br"><div class="wf-branch-label">NO</div>${renderNodeRows(n.no)}</div></div>`;
    return html;
  }).join("");
}

// Fallback name = config's leading action phrase (before the first " — ", " (",
// or " → "), e.g. "Send review request email", "Add tag review-requested", "2–12h".
function nodeName(config){
  const c = String(config || "").trim();
  return c.split(/\s[—–-]\s|\s\(|\s→\s/)[0].trim() || c;
}
// The node's canonical GHL action/trigger NAME — an explicit node.action if the
// plan declared one, else classified from type + config against the GHL vocabulary
// (.claude/skills/ghl-automation). Returns null when it can't tell (caller falls
// back to nodeName). This is a display label only — never a lookup key.
function ghlActionName(n){
  if(n && typeof n.action === "string" && n.action.trim()) return n.action.trim();
  const t = n && n.type, c = String((n && n.config) || "").toLowerCase();
  const any = (...ws) => ws.some(w => c.includes(w));
  if(t === "wait") return "Wait";
  if(t === "guard" || t === "condition") return "If/Else";
  if(t === "webhook") return any("custom") ? "Custom Webhook" : "Webhook";
  if(t === "handoff") return any("go to", "goto") ? "Go To" : "Add to Workflow";
  if(t === "trigger"){
    if(any("inbound webhook")) return "Inbound Webhook";
    if(any("appointment status", "showed", "no-show")) return "Appointment Status";
    if(any("pipeline stage", "stage changed", "stage moved", "job complete")) return "Pipeline Stage Changed";
    if(any("opportunity status", "won", "lost")) return "Opportunity Status Changed";
    if(any("tag added", "tag: ", "contact tag")) return "Contact Tag";
    if(any("form submit")) return "Form Submitted";
    if(any("payment received", "payment")) return "Payment Received";
    if(any("invoice")) return "Invoice";
    if(any("coupon")) return "Coupon Redeemed";
    if(any("order")) return "Order Form Submission";
    if(any("email open", "opened", "clicked", "email event")) return "Email Events";
    if(any("link click")) return "Trigger Link Clicked";
    if(any("contact created", "new contact")) return "Contact Created";
    if(any("webhook")) return "Inbound Webhook";
    return "Workflow Trigger";
  }
  if(t === "action"){
    if(any("email")) return "Send Email";                     // the medium wins: "send review request email" = Send Email
    if(any("sms", "text message")) return "Send SMS";
    if(any("whatsapp")) return "WhatsApp";
    if(any("voicemail")) return "Voicemail";
    if(any("review request")) return "Review Request";        // only the native Review Request primitive (no email/SMS medium named)
    if(any("internal notification", "notify", "alert the team")) return "Internal Notification";
    if(any("slack")) return "Slack";
    if(any("manual call", "place call")) return "Manual Call";
    if(any("send invoice", "invoice")) return "Send Invoice";
    if(any("webhook")) return "Webhook";
    return null;
  }
  if(t === "update"){
    if(any("remove tag", "clear tag")) return "Remove Contact Tag";
    if(any("add tag", "apply tag", "add the tag")) return "Add Contact Tag";
    if(any("remove from workflow")) return "Remove from Workflow";
    if(any("add to workflow", "enroll", "add to campaign")) return "Add to Workflow";
    if(any("assign")) return "Assign to User";
    if(any("note")) return "Add to Notes";
    if(any("dnd")) return "DND Contact";
    if(any("custom value")) return "Update Custom Values";
    if(any("opportunity", "pipeline stage", "deal", "move to stage")) return "Update Opportunity";
    if(any("appointment status")) return "Update Appointment Status";
    return "Update Contact Field";
  }
  return null;
}
function flLabel(n){ return ghlActionName(n) || nodeName(n && n.config) || "Step"; }
// The step's per-client parameter_values, set by renderEngineDetail for the
// duration of its synchronous render so flNode can resolve a node's declared
// param(s) → this client's concrete value. Null on draft/formulate/historical
// rows (no dict) — nodes then show no "This client's value" section.
let flParams = null;
function paramLabel(k){ return String(k).replace(/_/g, " ").replace(/^./, c => c.toUpperCase()); }
// A node declares the client_parameter(s) it resolves as deploy.param (string)
// and/or deploy.params (array). Union them, order preserved, dedup empties out.
function paramKeys(d){
  const ks = [];
  if(typeof d.param === "string" && d.param.trim()) ks.push(d.param.trim());
  if(Array.isArray(d.params)) d.params.forEach(k => { if(typeof k === "string" && k.trim()) ks.push(k.trim()); });
  return ks;
}
// Resolve those keys against flParams → [{k, v}] for the popup. Only keys that
// have a concrete value in THIS client's dict survive (a declared-but-unanswered
// key or a missing dict just yields nothing — the generic "What you input" still
// tells the builder what to enter).
function clientValues(d){
  if(!flParams) return [];
  return paramKeys(d).map(k => ({ k, v: flParams[k] })).filter(x => x.v != null && String(x.v).trim());
}
// One flow node: its canonical GHL action/trigger NAME (label + popup chip),
// colored by type. The full config ("what it does") + deploy buckets + this
// client's resolved param values ride in data-* and open in the click popup.
function flNode(cls, name, config, deploy){
  const d = deploy && typeof deploy === "object" ? deploy : {};
  const da = (k, v) => v ? ` ${k}="${escAttr(v)}"` : "";
  const cv = clientValues(d);
  const tasks = Array.isArray(d.tasks) ? d.tasks.map(t => t && t.text).filter(Boolean) : [];
  return `<div class="fl-node ${cls}" data-t="${escAttr(name)}" data-d="${escAttr(config || "")}"`
    + da("data-cv", cv.length ? JSON.stringify(cv) : "")
    + da("data-tasks", tasks.length ? tasks.join("\n") : "")
    + da("data-input", d.input) + da("data-assets", d.assets) + da("data-guard", d.guardrail)
    + ` onclick="showNodeInfo(this)"><span class="fl-lbl">${esc(name)}</span></div>`;
}
// One labeled popup section — only rendered when it has content. esc() escapes
// the (untrusted) config/deploy text; the label is a fixed string.
function niSec(label, text, warn){
  return text ? `<div class="ni-sec${warn ? " warn" : ""}"><div class="ni-sec-label">${esc(label)}</div><div class="ni-sec-body">${esc(text)}</div></div>` : "";
}
// This client's concrete value(s) for the node, from data-cv (JSON [{k,v}]).
// A single param renders bare (the section title says whose value it is); two+
// get a param label each so the builder knows which is which. A "NEEDS DISCOVERY"
// value is flagged — it's an unresolved answer that becomes a checklist task.
function niClientValue(json){
  let arr; try{ arr = JSON.parse(json || "[]"); }catch(e){ arr = []; }
  if(!arr.length) return "";
  const tbd = v => /^needs discovery/i.test(String(v).trim());
  const row = x => {
    const flagged = tbd(x.v);
    const val = `<span class="ni-cv-val${flagged ? " ni-cv-tbd" : ""}">${flagged ? "⚠ " : ""}${esc(String(x.v))}</span>`;
    return arr.length === 1 ? val : `<div class="ni-cv-row"><span class="ni-cv-k">${esc(paramLabel(x.k))}</span>${val}</div>`;
  };
  return `<div class="ni-sec ni-cv"><div class="ni-sec-label">This client's value</div>`
    + `<div class="ni-sec-body">${arr.map(row).join("")}</div></div>`;
}
// Popup: the node's config, this client's resolved value(s), then the generic
// deploy buckets, organized into sections.
function showNodeInfo(el){
  const d = el.dataset;
  document.getElementById("ni-chip").textContent = d.t || "STEP";
  document.getElementById("ni-body").innerHTML =
      niSec("What it does", d.d, false)
    + niClientValue(d.cv)
    + niSec("What you input", d.input, false)
    + niSec("Assets to attach", d.assets, false)
    + niSec("Set up first (see checklist)", d.tasks, false)
    + niSec("Do not change", d.guard, true);
  document.getElementById("node-info").style.display = "flex";
}
function closeNodeInfo(){ document.getElementById("node-info").style.display = "none"; }
document.addEventListener("keydown", e => { if(e.key === "Escape") closeNodeInfo(); });
// Node-graph canvas: pan by drag, zoom by wheel/buttons (40%–200%). Transform-based
// (translate + scale) so pan works at any zoom; applied straight to the DOM (no
// re-render, so expand states survive) and mirrored in S so a re-render restores it.
function applyGraphView(){
  const bp = S.buildPlan, p = bp.pan || (bp.pan = { x:0, y:0 });
  const el = document.getElementById("flZoom");   if(el) el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${bp.zoom || 1})`;
  const lbl = document.getElementById("flZoomPct"); if(lbl) lbl.textContent = Math.round((bp.zoom || 1) * 100) + "%";
}
// Zoom toward a point (cx,cy) in viewport coords so that point stays put.
function zoomGraphAt(z2, cx, cy){
  const bp = S.buildPlan, z = bp.zoom || 1, p = bp.pan || (bp.pan = { x:0, y:0 });
  z2 = Math.min(2, Math.max(0.4, Math.round(z2 * 100) / 100));
  if(z2 === z) return;
  p.x = cx - (cx - p.x) * (z2 / z);
  p.y = cy - (cy - p.y) * (z2 / z);
  bp.zoom = z2;
  applyGraphView();
}
// Buttons: delta 0 resets (fit); otherwise zoom about the viewport centre.
function zoomGraph(delta){
  if(delta === 0){ S.buildPlan.zoom = 1; S.buildPlan.pan = { x:0, y:0 }; applyGraphView(); return; }
  const vp = document.querySelector(".fl-viewport"), r = vp ? vp.getBoundingClientRect() : { width:400, height:400 };
  zoomGraphAt((S.buildPlan.zoom || 1) + delta, r.width / 2, r.height / 2);
}
// Wheel over the graph zooms (cursor-anchored) and never scrolls the page; the
// inline onwheel binding is non-passive, so preventDefault is honoured.
function graphWheel(e, vp){
  e.preventDefault();
  const r = vp.getBoundingClientRect();
  zoomGraphAt((S.buildPlan.zoom || 1) + (e.deltaY < 0 ? 0.1 : -0.1), e.clientX - r.left, e.clientY - r.top);
}
let flPan = null, flDragged = false;
function graphPanStart(e, vp){
  if(e.button !== 0) return;                 // left-drag only
  const p = S.buildPlan.pan || { x:0, y:0 };
  flPan = { sx:e.clientX, sy:e.clientY, px:p.x, py:p.y, vp };
  flDragged = false;
  vp.classList.add("grabbing");
  e.preventDefault();
}
document.addEventListener("mousemove", e => {
  if(!flPan) return;
  const dx = e.clientX - flPan.sx, dy = e.clientY - flPan.sy;
  if(Math.abs(dx) > 3 || Math.abs(dy) > 3) flDragged = true;
  S.buildPlan.pan = { x: flPan.px + dx, y: flPan.py + dy };
  applyGraphView();
});
document.addEventListener("mouseup", () => { if(flPan){ flPan.vp.classList.remove("grabbing"); flPan = null; } });
// A drag ends in a click — swallow it (capture phase) so it doesn't open a node popup.
document.addEventListener("click", e => { if(flDragged){ e.stopPropagation(); e.preventDefault(); flDragged = false; } }, true);

// Visual node GRAPH for the detail view: same nodes data as renderNodeRows,
// drawn as a vertical flow — boxed nodes, connector lines with arrowheads,
// branch splits, end nodes as terminal pills. Each node is CLICKABLE → a popup
// with its full description (flNode); the graph itself only previews one line.
// RENDER RULE (locked July 8 2026): a guard IS a GHL if/else — it ALWAYS forks.
// Trip side (YES) → End pill (label from the config's "→ …" part); pass side
// (NO) → the ENTIRE remaining flow, so cascading guards nest into successive
// forks exactly like the real GHL canvas. A linear guard row misrepresents
// the workflow. Data unchanged — guard stays a single node in workflow JSONB.
function renderNodeGraph(nodes){
  nodes = nodes || [];
  let html = "";
  for(let i = 0; i < nodes.length; i++){
    const n = nodes[i];
    const conn = i ? `<div class="fl-conn"></div>` : "";
    if(typeof n === "string"){ html += conn + flNode("", nodeName(n) || "Step", n); continue; }
    if(n.type === "end"){ html += conn + `<div class="fl-end">${esc(n.config || "End")}</div>`; continue; }
    // GUARD / multi-branch If-Else: a fork with one column per condition plus a
    // None column that carries the MAIN flow (the remaining sibling nodes). A guard
    // WITH a `branches` array renders those conditions (up to 5) + None (6 total);
    // a legacy single-condition guard (`config:"If X → end"`) is the 2-branch case.
    // The remainder is consumed by the None column, so we return.
    if(n.type === "guard" || (Array.isArray(n.branches) && n.branches.length)){
      const elseFlow = renderNodeGraph(nodes.slice(i + 1));
      let cols;
      if(Array.isArray(n.branches) && n.branches.length){
        cols = n.branches.map(b => ({ label: b.when || "if", to: b.to }));
        cols.push({ label: "if none", to: null, html: elseFlow, tone: "go" });
      } else {
        const parts = String(n.config || "").split("→");
        const outcome = (parts[1] || "").trim();
        const endTxt = outcome && outcome.toLowerCase() !== "end" ? outcome : "End";
        cols = [
          { label: "if met",     to: [{ type: "end", config: endTxt }] },
          { label: "if not met", to: null, html: elseFlow, tone: "go" }
        ];
      }
      html += conn + flNode("fl-t-guard", flLabel(n), n.config || "", n.deploy) + renderFork(cols);
      return html;
    }
    html += conn + flNode("fl-t-" + esc(n.type || "step"), flLabel(n), n.config || "", n.deploy);
    if(n.type === "condition")   // binary If — both sides are explicit flows (no None column)
      html += renderFork([{ label: "yes", to: n.yes, tone: "go" }, { label: "no", to: n.no }]);
  }
  return html;
}

// A fork = the vertical connector into a bracket of branch columns. Each column:
// { label, tone("go"→green else red), and its downstream flow as `to` (nodes) or
// pre-rendered `html` }. An empty branch shows a single End pill.
function renderFork(cols){
  const inner = cols.map(c => {
    const flow = c.html != null ? c.html : renderNodeGraph(c.to && c.to.length ? c.to : [{ type: "end", config: "End" }]);
    return `<div class="fl-b"><div class="fl-blabel${c.tone === "go" ? " fl-blabel-go" : ""}">${esc(c.label)}</div>`
      + `<div class="fl-conn fl-conn-x"></div>${flow || `<div class="fl-end">End</div>`}</div>`;
  }).join("");
  return `<div class="fl-conn"></div><div class="fl-fork">${inner}</div>`;
}

/* Nested disclosure (3 levels): step depth → collapsed automation list (01 · Name)
   → automation open = final_rule + nodes IMMEDIATELY → collapsed Tests below.
   Each level keys into S.buildPlan.expanded independently ("<key>:aN", "<key>:aN:t")
   so states survive PM-layer re-renders. The .auto-head right side stays empty on
   purpose — the future per-automation "Refine / discuss" chat slots in there. */
function renderAutomationTests(a, key){
  const tests = Array.isArray(a.tests) ? a.tests : (a.tests ? [String(a.tests)] : []);
  if(!tests.length) return "";
  const tKey = key + ":t";
  const open = !!S.buildPlan.expanded[tKey];
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(tKey)}')">${open ? "▾" : "▸"} Tests (${tests.length})</button>`
    + (open ? `<div class="wf-tests">${tests.map((t, i) => {
        const name = testName(t), how = testHow(t);
        if(!how) return `<div class="wf-test">☐ ${esc(name)}</div>`;   // legacy assertion-only test
        const eKey = `${key}:test${i}`, eo = !!S.buildPlan.expanded[eKey];
        return `<div class="wf-test"><button class="disc-toggle" onclick="toggleStepDepth('${escAttr(eKey)}')">${eo ? "▾" : "▸"} ☐ ${esc(name)}</button>`
          + (eo ? `<div class="disc-how">${esc(how)}</div>` : "") + `</div>`;
      }).join("")}</div>` : "");
}

function renderAutomationBody(a, key){
  const trig = a.trigger ? `<div class="wf-row"><span class="wf-chip">TRIGGER</span><span>${esc(a.trigger.type + (a.trigger.filters && Object.keys(a.trigger.filters).length ? " — " + JSON.stringify(a.trigger.filters) : ""))}</span></div>` : "";
  return (a.final_rule ? `<div class="wf-rule">${esc(a.final_rule)}</div>` : "")
    + (a.nodes ? renderNodeRows(a.nodes) : trig + renderNodeRows(a.steps))   // typed nodes open with their own trigger node
    + renderAutomationTests(a, key);
}

function renderAutomationList(automations, key){
  return (automations || []).map((a, i) => {
    const num = String(i + 1).padStart(2, "0");
    if(typeof a === "string")   // thin spec: name-only entry, nothing to expand
      return `<div class="auto-head"><span class="auto-num">${num}</span><span class="auto-name">${esc(a)}</span></div>`;
    const aKey = `${key}:a${i}`;
    const open = !!S.buildPlan.expanded[aKey];
    return `
      <div class="auto-head">
        <button class="auto-toggle" onclick="toggleStepDepth('${escAttr(aKey)}')">${open ? "▾" : "▸"} <span class="auto-num">${num}</span> ${esc(a.name || "Untitled automation")}</button>
      </div>`
      + (open ? `<div class="auto-body">${renderAutomationBody(a, aKey)}</div>` : "");
  }).join("");
}

function renderManifestLines(m){
  if(!m) return "";
  if(m.tbd) return `<div class="mf-line">⚠ <span class="mf-k">Tags/fields TBD</span> — engine not yet deepened; no manifest in the catalog. List and create them manually before building.</div>`;
  const fields = (m.requires_fields || []).map(fieldLabel);
  return [
    (m.creates_tags || []).length ? `<div class="mf-line"><span class="mf-k">Creates tags:</span> ${esc(m.creates_tags.join(" · "))}</div>` : "",
    (m.requires_tags || []).length ? `<div class="mf-line"><span class="mf-k">Requires tags:</span> ${esc(m.requires_tags.join(" · "))}</div>` : "",
    fields.length ? `<div class="mf-line"><span class="mf-k">Fields:</span> ${esc(fields.join(" · "))}</div>` : "",
  ].join("");
}

function renderStepDepth(s, key){
  if(!s.manifest && !s.workflow) return "";
  const open = !!S.buildPlan.expanded[key];
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(key)}')">${open ? "▾" : "▸"} Node workflow &amp; manifest</button>`
    + (open ? `<div class="depth-box">${renderManifestLines(s.manifest)}${s.workflow ? renderAutomationList(s.workflow, key) : ""}</div>` : "");
}

/* -- Deployment guide section (split DoD): READ-ONLY, collapsed by default,
   structured labeled blocks — never a raw dump, no inputs anywhere. The ⚠ REVIEW
   flag sits inline on the toggle so it stays visible without opening. -- */
function renderDeploymentLines(v, depth = 0){
  const pad = depth ? ` style="margin-left:${depth * 14}px"` : "";
  if(Array.isArray(v)) return v.map(x => `<div class="mf-line"${pad}>• ${esc(typeof x === "object" ? JSON.stringify(x) : String(x))}</div>`).join("");
  if(v && typeof v === "object")
    return Object.entries(v).map(([k, x]) =>
      (x && typeof x === "object")
        ? `<div class="mf-line"${pad}><span class="mf-k">${esc(k)}:</span></div>` + renderDeploymentLines(x, depth + 1)
        : `<div class="mf-line"${pad}><span class="mf-k">${esc(k)}:</span> ${esc(String(x))}</div>`
    ).join("");
  return `<div class="mf-line"${pad}>${esc(String(v))}</div>`;
}

function renderDeploymentBlock(label, v){
  return v == null ? "" : `<div class="dep-tier">${esc(label)}</div>` + renderDeploymentLines(v);
}

function renderDeploymentBody(dep){
  return (dep.route === "dropin" ? `<div class="mf-line">Drop-in engine — deploy as-is.</div>` : "")
    + renderDeploymentBlock("Changes made", dep.changes_note)
    + renderDeploymentBlock("Parameter values", dep.parameter_values)
    + renderDeploymentBlock("Branding", dep.tiers && dep.tiers.branding)
    + renderDeploymentBlock("Business rules", dep.tiers && dep.tiers.business_rules)
    + renderDeploymentBlock("Never touch", dep.tiers && dep.tiers.never_touch)
    + renderDeploymentBlock("Client overrides", dep.overrides)
    + renderDeploymentBlock("Engine spec", dep.spec_extras);
}

function renderStepDeployment(dep, key){
  if(!dep) return "";
  const dKey = key + ":d";
  const open = !!S.buildPlan.expanded[dKey];
  const flag = dep.needs_review === "parameterize" ? `<span class="dep-review">⚠ REVIEW — parameterized: confirm changes</span>`
             : dep.needs_review === "formulate"    ? `<span class="dep-review">⚠ REVIEW — formulated: unproven${dep.seeded_from ? " (seeded from " + esc(dep.seeded_from) + " stub)" : ""}</span>` : "";
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(dKey)}')">${open ? "▾" : "▸"} Deployment guide ${flag}</button>`
    + (open ? `<div class="depth-box">${renderDeploymentBody(dep)}</div>` : "");
}

// "Names surfaced UP FRONT" (locked requirement): the pre-build checklist card —
// every tag/field the plan's engines need, unioned from the steps' manifests,
// plus the engines whose manifests are TBD. Works on draft steps (attached) and
// saved rows (persisted manifest column) alike.
function renderManifestCard(steps){
  const manifests = steps.filter(s => s.manifest && !s.manifest.tbd).map(s => s.manifest);
  const tbdSteps = steps.filter(s => s.manifest && s.manifest.tbd);
  if(!manifests.length && !tbdSteps.length) return "";
  const tags = [...new Set(manifests.flatMap(m => [...(m.creates_tags || []), ...(m.requires_tags || [])]))];
  const fieldByKey = new Map();
  manifests.flatMap(m => m.requires_fields || []).forEach(f => { const k = fieldKey(f); if(!fieldByKey.has(k)) fieldByKey.set(k, f); });
  const fields = [...fieldByKey.values()].map(fieldLabel);
  const tbdTitles = [...new Set(tbdSteps.map(s => s.title))];
  return `
    <div class="card">
      <div class="phase-h">Pre-build manifest — create these before building</div>
      ${tags.length ? `<div class="mf-line"><span class="mf-k">Tags (${tags.length}):</span> ${esc(tags.join(" · "))}</div>` : ""}
      ${fields.length ? `<div class="mf-line"><span class="mf-k">Fields (${fields.length}):</span> ${esc(fields.join(" · "))}</div>` : ""}
      ${tbdTitles.length ? `<div class="mf-line">⚠ <span class="mf-k">TBD:</span> ${esc(tbdTitles.join(" · "))} — engine${tbdTitles.length === 1 ? "" : "s"} not yet deepened; tags/fields not generated.</div>` : ""}
    </div>`;
}

// Parameterize steps carry the editable "changes made" note (the drop-in vs
// parameterize signal — drop-in steps have none). Edits stay on the draft step
// and are persisted into notes at save.
function renderDraftChangesNote(s){
  if(s.needs_review !== "parameterize" || !s.carries_artifacts) return "";
  return `
    <div class="msg" style="margin:6px 0 4px">Changes made — confirm (editable):</div>
    <textarea oninput="updateDraftChangesNote('${esc(s.ref)}', this.value)">${esc(s.changes_note || "")}</textarea>`;
}

function renderDraftStep(s, d){
  const gap = s.gap_ref === null ? null : S.buildPlan.draftGaps[s.gap_ref];
  return `
    <div class="gap-card ${gap ? "sev-" + esc(gap.severity || "medium") : ""}">
      <div class="gap-top">
        <div style="flex:1;font-size:14px;font-weight:600">${s.position + 1}. ${esc(s.title)}</div>
        ${stepBadges(s)}
      </div>
      <div class="gap-body">
        ${gap ? `<div class="msg" style="margin-bottom:4px">Delivers: ${esc(gap.title)}</div>` : ""}
        ${s.depends_on.length ? `<div class="msg" style="margin-bottom:4px">After: ${esc(draftDepLabel(s, d))}</div>` : ""}
        <div style="font-size:13px;margin:6px 0">${esc(s.detail)}</div>
        ${renderDraftChangesNote(s)}
        ${s.checklist.length ? `<div class="msg">${s.checklist.map(c => "☐ " + esc(ckText(c))).join("<br>")}</div>` : ""}
        ${renderStepDepth(s, s.ref)}
        ${renderStepDeployment(draftStepDeployment(s), s.ref)}
      </div>
    </div>`;
}

function renderDraftReview(){
  const d = S.buildPlan.draft;
  const hours = d.steps.reduce((t, s) => t + s.estimated_hours, 0);
  return renderDraftWarnings(d)
    + (d.scope_flags.length ? `
      <div class="card" style="border-left:3px solid #EF9F27">
        <div class="phase-h">Scope flags — surfaced by the planner</div>
        ${d.scope_flags.map(f => `<div class="msg">• ${esc(f)}</div>`).join("")}
      </div>` : "")
    + `<div class="card">
        <div class="phase-h">Draft plan — NOT saved yet</div>
        <div class="phase-t">${esc(d.title)}</div>
        <div class="msg">${esc(d.summary)}</div>
        <div class="msg" style="margin-top:6px">${d.steps.length} steps · ~${hours}h internal cost-to-deliver</div>
      </div>`
    + renderManifestCard(d.steps)
    + d.steps.map(s => renderDraftStep(s, d)).join("")
    + `<div class="btn-row" style="margin-top:14px">
        <button class="btn-primary" style="width:auto" onclick="saveBuildPlan()" ${S.buildPlan.saving?"disabled":""}>${S.buildPlan.saving?"Saving…":"Save plan"}</button>
        <button class="btn-ghost" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating…":"Regenerate"}</button>
        <button class="btn-ghost" onclick="discardDraft()">Discard draft</button>
      </div>`;
}

function discardDraft(){
  S.buildPlan.draft = null; S.buildPlan.draftGaps = null;
  setBuildPlanMsg("Draft discarded — nothing was saved.");
  renderAutomation();
}

/* ============================================================
   SAVED PLAN — track-grouped PM table + right slide-over.
   Presentation/interaction only, no build_steps writes change here.
   Row model: one build_steps row = one row. agent='automation' → engine
   row; agent='setup' → summarized in the section Setup badge (status still
   editable via its disclosure) and counted in the rollup, never an engine row.
============================================================ */
const TRACK_LABELS = { automation: "Stack Setup", app: "App", agent: "Agent Builder" };   // display only; internal track value stays 'automation'
const TRACK_ORDER = ["automation", "app", "agent"];
const STATUS_STAGE = { queued: 0, building: 1, testing: 2, done: 3 };
const STATUS_VALUES = ["queued","building","testing","done"];
function stepTrack(s){ return s.track || "automation"; }   // null → CRM (migration 011 default)
function byIdStep(id){ return S.buildPlan.steps.find(x => x.id === id) || null; }
function statusOptions(status){ return STATUS_VALUES.map(v => `<option value="${v}" ${status===v?"selected":""}>${v}</option>`).join(""); }

function renderSavedPlan(){
  if(S.buildPlan.panel) return renderEngineDetail();   // detail view fully REPLACES the table (mutually exclusive)
  const p = S.buildPlan.plan, steps = S.buildPlan.steps;
  const done = steps.filter(s => s.status === "done").length;
  const head = `
    <div class="card">
      <div class="phase-h">Build plan · ${esc(p.status || "")}</div>
      <div class="phase-t">${esc(p.title || "Untitled plan")}</div>
      <div class="msg">${esc(p.summary || "")}</div>
      <div class="msg" style="margin-top:6px">${done} of ${steps.length} steps done</div>
      <div style="margin-top:10px"><button class="btn-ghost" style="width:auto" onclick="regenerateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating…":"Generate new plan"}</button></div>
    </div>`;
  // CRM always shown; App / Agent Builder only when steps of that track exist.
  const sections = TRACK_ORDER
    .filter(tr => tr === "automation" || steps.some(s => stepTrack(s) === tr))
    .map(tr => renderPlanSection(tr, steps.filter(s => stepTrack(s) === tr)))
    .join("");
  return head + renderManifestCard(steps) + sections;
}

// A test-gate is an ordinary automation step the planner ends an engine's chain
// with ("configured != complete"): its checklist IS the test matrix. It carries no
// structural flag — only a title convention — so we identify it structurally and
// match it to its parent engine by shared gap_id (both deliver the same gap), the
// engine being the sibling that carries the node workflow. The title marker only
// confirms/disambiguates; it is never the sole signal.
function isTestGateTitle(s){ return /test[\s-]*gate/i.test((s && s.title) || ""); }

// Partition a track's automation steps into top-level `engines` (engine steps PLUS
// any test-gate we could not match) and `gatesByParent` (parentStepId -> [gate,…]).
// Nestable test-gate = title marker + NO workflow + a gap_id + a workflow-carrying
// sibling in the same gap. Anything failing those stays top-level — never force-nested.
// Render-only: every step (nested or not) still appears once for completion counts.
function partitionTestGates(steps){
  const gatesByParent = new Map(), nested = new Set();
  steps.forEach(g => {
    const hasWf = Array.isArray(g.workflow) && g.workflow.length;
    if(!isTestGateTitle(g) || hasWf || g.gap_id == null) return;         // not a nestable gate
    const parent = steps.find(e => e.id !== g.id && e.gap_id === g.gap_id
      && Array.isArray(e.workflow) && e.workflow.length);                // first workflow-carrying sibling in the gap
    if(!parent) return;                                                  // no engine sibling -> standalone
    if(!gatesByParent.has(parent.id)) gatesByParent.set(parent.id, []);
    gatesByParent.get(parent.id).push(g);
    nested.add(g.id);
  });
  return { engines: steps.filter(s => !nested.has(s.id)), gatesByParent };
}

function renderPlanSection(track, allSteps){
  const cKey = "seccol:" + track, open = !S.buildPlan.expanded[cKey];   // default open
  const done = allSteps.filter(s => s.status === "done").length;
  const setupSteps = allSteps.filter(s => s.agent === "setup");
  const setupDone = setupSteps.filter(s => s.status === "done").length;
  const setupOk = setupSteps.length > 0 && setupDone === setupSteps.length;
  const sKey = "secsetup:" + track, setupOpen = !!S.buildPlan.expanded[sKey];
  const setupBadge = setupSteps.length
    ? `<button class="bp-setup-badge ${setupOk ? "bp-setup-ok" : "bp-setup-no"}" onclick="event.stopPropagation();toggleStepDepth('${escAttr(sKey)}')">Setup ${setupOk ? "✓" : "○"} ${setupDone}/${setupSteps.length}</button>`
    : "";
  // Test-gates nest into their engine's dropdown (last sub-row); engines + any
  // unmatched gate render at the top level. Rollup counts (done/allSteps) are
  // unchanged — every step still exists once, only its render slot moves.
  const { engines, gatesByParent } = partitionTestGates(allSteps.filter(s => s.agent !== "setup"));
  // pill tint reflects the group's rollup: all done / in progress / not started
  const secState = !allSteps.length ? "empty" : done === allSteps.length ? "done" : done > 0 ? "prog" : "todo";
  const thead = `<div class="bp-thead"><span>Task</span><span>Description</span><span>Progress</span><span>Hrs</span><span>Status</span></div>`;
  return `
    <div class="bp-section">
      <div class="bp-pill bp-pill-${secState}">
        <button class="bp-pill-toggle" onclick="toggleStepDepth('${escAttr(cKey)}')">
          <span>${open ? "▾" : "▸"}</span>
          <span class="bp-pill-dot"></span>
          <span>${esc(TRACK_LABELS[track] || track)}</span>
          <span class="bp-sec-roll">${done}/${allSteps.length} complete</span>
        </button>
        ${setupBadge}
      </div>
      ${open && setupOpen && setupSteps.length ? renderSetupMini(setupSteps) : ""}
      ${open && engines.length ? `<div class="bp-table">${thead}${engines.map(s => renderEngineRow(s, gatesByParent)).join("")}</div>` : ""}
    </div>`;
}

// Setup steps are not engine rows; this compact editable list (revealed by the
// Setup badge) is the only place their status is advanced, so Setup ✓ can be reached.
function renderSetupMini(setupSteps){
  return `<div class="bp-setup-list">` + setupSteps.map(s =>
    `<div class="bp-setup-item"><span>${esc(s.title)}</span><select class="bp-status-sel" onchange="setStepStatus('${s.id}', this.value)">${statusOptions(s.status)}</select></div>`
  ).join("") + `</div>`;
}

function renderEngineRow(s, gatesByParent){
  const stage = STATUS_STAGE[s.status] != null ? STATUS_STAGE[s.status] : 0;
  const pct = [0, 25, 75, 100][stage] || 0;   // 4 discrete stages (queued/building/testing/done); ticks in CSS keep it from reading as a continuous %
  const blockers = (s.depends_on || []).map(byIdStep).filter(t => t && t.status !== "done");
  const blocked = blockers.length ? `<span class="bp-blocked">blocked by: ${esc(blockers.map(b => b.title).join(", "))}</span>` : "";
  const actionable = s.status === "queued" && blockers.length === 0;   // unblocked + not started = do next
  const hasAutos = Array.isArray(s.workflow) && s.workflow.length;
  const rowKey = "eng:" + s.id, expanded = !!S.buildPlan.expanded[rowKey];
  return `
    <div class="bp-row st-${esc(s.status)}${actionable ? " actionable" : ""}">
      <div class="bp-c-task">
        <button class="bp-row-name" onclick="toggleStepDepth('${escAttr(rowKey)}')">${hasAutos ? (expanded ? "▾ " : "▸ ") : ""}${esc(s.title)}</button>
        ${blocked}
      </div>
      <div class="bp-desc">${s.detail ? esc(s.detail) : "—"}</div>
      <div class="bp-c-prog">
        <div class="bp-bar"><i style="width:${pct}%"></i></div>
        <span class="bp-stage">${esc(s.status)}</span>
      </div>
      <span class="bp-hours">${s.estimated_hours != null ? esc(String(s.estimated_hours)) + "h" : ""}</span>
      <select class="bp-status-sel" onchange="setStepStatus('${s.id}', this.value)">${statusOptions(s.status)}</select>
    </div>`
    + (expanded && hasAutos ? renderEngineSubRows(s, gatesByParent) : "");
}

// Inline indented sub-rows = the step's workflow automations (statusless — there
// is no per-automation status; click opens the slide-over), THEN its nested
// test-gate(s) as the last entries — unlike automations, a test-gate keeps its own
// status control and its checklist (the test matrix) expands inline.
function renderEngineSubRows(s, gatesByParent){
  const autos = (s.workflow || []).map((a, i) => {
    const name = typeof a === "string" ? a : (a.name || "Untitled automation");
    return `<div class="bp-subrow" onclick="openEnginePanel('${s.id}', ${i})"><span class="auto-num">${String(i + 1).padStart(2, "0")}</span> ${esc(name)}</div>`;
  }).join("");
  const gates = ((gatesByParent && gatesByParent.get(s.id)) || []).map(renderTestGateSubRow).join("");
  return autos + gates;
}

// Shared instructional-checklist renderer — the detail-view Setup Checklist AND the
// nested test-gate's test matrix render through this ONE function, so they stay
// identical: dual-shape items ({text,how} or string), checkbox owns done, caret owns
// the how disclosure (no-how items keep the <label> so a text click still toggles done).
function renderChecklistItems(step){
  return (step.checklist || []).map((c, i) => {
    const how = ckHow(c), txt = ckText(c);
    const label = c.done ? `<s>${esc(txt)}</s>` : esc(txt);
    const cb = `<input type="checkbox" ${c.done?"checked":""} onchange="toggleStepChecklist('${step.id}',${i})">`;
    const eKey = `${step.id}:ck${i}`, open = !!S.buildPlan.expanded[eKey];
    const row = how
      ? `<div class="bp-ck-lbl">${cb} <button class="disc-toggle bp-ck-toggle" onclick="toggleStepDepth('${escAttr(eKey)}')">${open ? "▾" : "▸"} ${label}</button></div>`
      : `<label class="bp-ck-lbl">${cb} ${label}</label>`;
    return `<div class="bp-ck">${row}${how && open ? `<div class="disc-how">${esc(how)}</div>` : ""}</div>`;
  }).join("");
}

// A nested test-gate: its own row with a status select + a caret that expands the
// test-matrix checklist inline (reusing the shared checklist renderer). blocked-by is
// SCOPED — same-gap (its own engine's) blockers are the redundant parent reference and
// suppressed; cross-engine blockers still surface.
function renderTestGateSubRow(g){
  const rowKey = "tg:" + g.id, open = !!S.buildPlan.expanded[rowKey];
  const blockers = (g.depends_on || []).map(byIdStep).filter(t => t && t.status !== "done" && t.gap_id !== g.gap_id);
  const blocked = blockers.length ? `<span class="bp-blocked">blocked by: ${esc(blockers.map(b => b.title).join(", "))}</span>` : "";
  const items = renderChecklistItems(g);
  return `<div class="bp-subrow bp-testgate st-${esc(g.status)}">
      <button class="disc-toggle bp-tg-name" onclick="toggleStepDepth('${escAttr(rowKey)}')">${open ? "▾" : "▸"} <span class="bp-tg-chip">Test gate</span> ${esc(g.title)}</button>
      ${blocked}
      <select class="bp-status-sel" onchange="setStepStatus('${g.id}', this.value)">${statusOptions(g.status)}</select>
    </div>`
    + (open ? `<div class="bp-tg-checklist">${items || `<div class="msg">No test items.</div>`}</div>` : "");
}

/* Right slide-over — reuses the existing per-automation content renderers
   verbatim (renderAutomationBody / renderManifestLines / renderDeploymentBody).
   panel state = {stepId, autoIndex}, lives in freshBuildPlan so a client switch
   clears it. Rendered as part of the tab body; a null panel renders nothing. */
function openEnginePanel(stepId, autoIndex){ S.buildPlan.panel = { stepId, autoIndex }; S.buildPlan.zoom = 1; S.buildPlan.pan = { x:0, y:0 }; renderAutomation(); }   // each automation opens fit at 100%
function closeEnginePanel(){ S.buildPlan.panel = null; renderAutomation(); }

// Flattened, plan-ordered sequence of every workflow automation across all steps
// (steps are position-sorted; automations in array order). Setup steps (no workflow)
// contribute nothing; thin string automations ARE included, so the sequence matches
// the clickable sub-row list exactly — "N of M" is truthful and Next/Prev never skips
// an automation the operator can see in the plan.
function flatAutomations(){
  const seq = [];
  S.buildPlan.steps.forEach(s => {
    if(Array.isArray(s.workflow)) s.workflow.forEach((_a, i) => seq.push({ stepId: s.id, autoIndex: i }));
  });
  return seq;
}
// Clamp navigation between automations (no wrap). delta -1 = Prev, +1 = Next.
// openEnginePanel resets zoom/pan + re-renders (and re-sets flParams for the new step).
function navAutomation(delta){
  const pv = S.buildPlan.panel; if(!pv) return;
  const seq = flatAutomations();
  const cur = seq.findIndex(x => x.stepId === pv.stepId && x.autoIndex === pv.autoIndex);
  const next = cur + delta;
  if(cur < 0 || next < 0 || next >= seq.length) return;   // clamp at both ends
  openEnginePanel(seq[next].stepId, seq[next].autoIndex);
}

// Automation detail — dark card dashboard (decision-surface tokens, as Finalize).
// Main: Workflow card (typed node flow) → Tests card → Deployment card whose
// sections are individually collapsible (collapsed by default — the fix for the
// three-screens-of-prose sidebar). Side: Checklist + Notes (editable, on top,
// never buried) + Manifest. Content comes from the same renderers
// (renderNodeRows / renderAutomationTests / renderManifestLines /
// renderDeploymentLines) — layout and theme only.
function renderEngineDetail(){
  const pv = S.buildPlan.panel; if(!pv) return "";
  const s = byIdStep(pv.stepId);
  // Stale panel (step gone) must not blank the tab now that detail replaces the table.
  if(!s) return `<div class="bp-detail"><div class="msg">This step is no longer in the plan.</div></div>`;
  const a = (s.workflow || [])[pv.autoIndex];
  const isObj = a && typeof a === "object";
  const autoName = a ? (typeof a === "string" ? a : (a.name || "Untitled automation")) : "";
  const key = "panel:" + s.id + ":" + pv.autoIndex;   // isolated expand namespace for Tests + deployment sections
  // Per-client values for this step feed flNode during the sync render below, so
  // each node's popup shows THIS client's concrete setting next to the generic input.
  flParams = (s.deployment && s.deployment.parameter_values) || null;
  const trigTxt = isObj && a.trigger ? a.trigger.type + (a.trigger.filters && Object.keys(a.trigger.filters).length ? " — " + JSON.stringify(a.trigger.filters) : "") : "";
  const trig = isObj && a.trigger ? flNode("fl-t-trigger", ghlActionName({ type:"trigger", config:trigTxt, action:a.trigger.action }) || nodeName(trigTxt), trigTxt, a.trigger.deploy) : "";
  const flow = isObj
    ? (a.nodes ? renderNodeGraph(a.nodes) : trig + (trig && (a.steps || []).length ? `<div class="fl-conn"></div>` : "") + renderNodeGraph(a.steps))
    : "";
  const z = S.buildPlan.zoom || 1, p = S.buildPlan.pan || { x:0, y:0 };
  const nodes = isObj
    ? `<div class="fl-graphwrap"><div class="fl-viewport" onmousedown="graphPanStart(event,this)" onwheel="graphWheel(event,this)"><div class="fl-zoom" id="flZoom" style="transform:translate(${p.x}px, ${p.y}px) scale(${z})">${flow}</div></div>
       <div class="fl-zoomctl">
         <button onclick="zoomGraph(-0.1)" title="Zoom out">−</button>
         <span class="fl-zoompct" id="flZoomPct" onclick="zoomGraph(0)" title="Reset (fit)">${Math.round(z * 100)}%</span>
         <button onclick="zoomGraph(0.1)" title="Zoom in">+</button>
       </div></div>`
    : `<div class="msg">${esc(autoName)} — no structured detail.</div>`;
  const lead = isObj && a.final_rule ? `<div class="bp-lead">${esc(a.final_rule)}</div>` : "";
  const tests = isObj ? renderAutomationTests(a, key) : "";
  const checklist = renderChecklistItems(s);
  const seq = flatAutomations();
  const cur = seq.findIndex(x => x.stepId === pv.stepId && x.autoIndex === pv.autoIndex);
  // Nav only when there's more than one automation to move between and the current one
  // is locatable (cur >= 0 guards a stale panel). Clamp: Prev off at first, Next at last.
  const nav = (seq.length > 1 && cur >= 0) ? `
        <div class="bp-detail-nav">
          <button class="bp-nav-btn" onclick="navAutomation(-1)" ${cur === 0 ? "disabled" : ""}>‹ Prev</button>
          <span class="bp-nav-pos">Automation ${cur + 1} of ${seq.length}</span>
          <button class="bp-nav-btn" onclick="navAutomation(1)" ${cur === seq.length - 1 ? "disabled" : ""}>Next ›</button>
        </div>` : "";
  return `
    <div class="bp-detail">
      <div class="bp-detail-head">
        <div>
          <div class="bp-detail-title">${esc(autoName)}</div>
          <div class="bp-detail-sub">${esc(s.title)}</div>
        </div>${nav}
      </div>
      <div class="bp-detail-grid">
        <div class="bp-main">
          <div class="bp-card bp-card-graph"><h4>Workflow</h4>${lead}${nodes}${tests ? `<div class="bp-tests">${tests}</div>` : ""}</div>
        </div>
        <aside class="bp-side">
          ${s.manifest ? `<div class="bp-card"><h4>Manifest</h4>${renderManifestLines(s.manifest)}</div>` : ""}
          <div class="bp-card"><h4>Setup Checklist</h4>${checklist || `<div class="msg">No checklist items.</div>`}</div>
          ${s.deployment ? renderDeploymentCard(s.deployment, key, s.workflow) : ""}
          <div class="bp-card"><h4>Notes</h4>
            <textarea class="notes" oninput="this.style.height='auto';this.style.height=(this.scrollHeight+2)+'px'" onchange="saveStepNotes('${s.id}', this.value)">${esc(s.notes || "")}</textarea>
          </div>
        </aside>
      </div>
    </div>`;
}

// Every client_parameter a node in this workflow already resolves (deploy.param /
// deploy.params). Those now render as "This client's value" inside the node popup,
// so the side card must NOT repeat them — it keeps only the engine-level leftovers.
function claimedParamKeys(workflow){
  const keys = new Set();
  const walk = nodes => (nodes || []).forEach(n => {
    if(!n || typeof n !== "object") return;
    if(n.deploy) paramKeys(n.deploy).forEach(k => keys.add(k));
    if(Array.isArray(n.branches)) n.branches.forEach(b => walk(b.to));
    walk(n.yes); walk(n.no);
  });
  (workflow || []).forEach(a => { if(a && typeof a === "object") walk(a.nodes || a.steps); });
  return keys;
}

// Deployment card: each block of the deployment story is its own collapsible
// row (collapsed by default) instead of one always-open wall of prose. Bodies
// reuse renderDeploymentLines verbatim; the ⚠ REVIEW flag stays visible on the
// card header without opening anything.
function renderDeploymentCard(dep, key, workflow){
  const flag = dep.needs_review === "parameterize" ? `<span class="dep-review">⚠ REVIEW — parameterized: confirm changes</span>`
             : dep.needs_review === "formulate"    ? `<span class="dep-review">⚠ REVIEW — formulated: unproven${dep.seeded_from ? " (seeded from " + esc(dep.seeded_from) + " stub)" : ""}</span>` : "";
  // Node-level content lives in the click popups now: branding→Assets, per-node
  // never_touch→Do not change, and every node-attributed parameter_value→"This
  // client's value". The card keeps ONLY the genuinely engine-level leftovers:
  // Client settings = the parameters NO node claims (master toggles, scope choices);
  // Never touch = the cross-cutting architectural rules that belong to no single node.
  const claimed = claimedParamKeys(workflow);
  const engineParams = dep.parameter_values
    ? Object.fromEntries(Object.entries(dep.parameter_values).filter(([k]) => !claimed.has(k)))
    : null;
  const sections = [
    ["Changes made", dep.changes_note],
    ["Client settings", engineParams && Object.keys(engineParams).length ? engineParams : null],
    ["Business rules", dep.tiers && dep.tiers.business_rules],
    ["Never touch", dep.tiers && dep.tiers.never_touch],
    ["Client overrides", dep.overrides],
    ["Engine spec", dep.spec_extras],
  ].filter(([, v]) => v != null);
  const rows = sections.map(([label, v], i) => {
    const dKey = `${key}:dep${i}`, open = !!S.buildPlan.expanded[dKey];
    return `<div class="bp-dep-sec">
      <button class="bp-dep-toggle" onclick="toggleStepDepth('${escAttr(dKey)}')">${open ? "▾" : "▸"} ${esc(label)}</button>
      ${open ? `<div class="bp-dep-body">${renderDeploymentLines(v)}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="bp-card"><h4>Deployment ${flag}</h4>
    ${dep.route === "dropin" ? `<div class="mf-line">Drop-in engine — deploy as-is.</div>` : ""}
    ${rows || `<div class="msg">No deployment details.</div>`}</div>`;
}

async function setStepStatus(stepId, status){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  // completed_at is the Phase D hinge (SOP-gen + ledger): stamped on done, cleared on any move away
  const patch = { status, completed_at: status === "done" ? new Date().toISOString() : null };
  const { data, error } = await sb.from("build_steps").update(patch).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Status update failed: " + error.message); renderAutomation(); return; }
  Object.assign(s, data);
  setBuildPlanMsg(`Step ${s.position + 1} → ${data.status} ✓`);
  renderAutomation();
}

async function toggleStepChecklist(stepId, idx){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const list = (s.checklist || []).map((c, i) => i === idx ? { ...c, done: !c.done } : c);
  const { data, error } = await sb.from("build_steps").update({ checklist: list }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Checklist update failed: " + error.message); renderAutomation(); return; }  // rerender snaps the checkbox back
  Object.assign(s, data);
  renderAutomation();
}

async function saveStepNotes(stepId, text){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const { data, error } = await sb.from("build_steps").update({ notes: text.trim() || null }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Notes save failed: " + error.message); return; }
  Object.assign(s, data);
  setBuildPlanMsg("Notes saved ✓");   // no rerender — keeps focus/scroll; local row already mirrors the DB
}

/* ============================================================
   MODULE — SETUP AGENT (GHL API execution arm, Phase 1 manual)
   Creates the saved build plan's manifest items (tags + fields)
   in the client's GHL sub-account via /api/ghl. Custom values,
   calendars, pipelines: preflighted read-only (manifests don't
   declare them yet). Safety valve: preflight → dry-run → confirm
   → sequential find-before-create → fail-stop → audit log.
============================================================ */

// All GHL calls go through /api/ghl (whitelisted actions) — the browser never
// calls services.leadconnectorhq.com directly. Token + locationId come from
// the active client's row unless ctx pins them (the run loop pins both at run
// start so a mid-run client switch can never cross sub-accounts).
async function ghl(action, payload, ctx){
  const c = ctx || S.activeClient || {};
  const res = await fetch("/api/ghl", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: c.ghl_pit_token, locationId: c.ghl_location_id, action, payload }),
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok){
    const msg = Array.isArray(data.message) ? data.message.join("; ") : (data.message || data.error || ("HTTP " + res.status));
    const err = new Error(msg); err.status = res.status; err.meta = data.meta || null;
    throw err;
  }
  return data;
}

// manifest field type → GHL customFields dataType (contact/opportunity create)
const GHL_DATATYPE = { text: "TEXT", number: "NUMERICAL", currency: "MONETORY", date: "DATE" };

function setSetupMsg(t){ S.setup.msg = t; const el = document.getElementById("setup-msg"); if(el) el.textContent = t; }

function renderSetup(){
  document.getElementById("content").innerHTML = `
    <div class="panel-title">${MODULES.setup.title}</div>
    <div class="panel-sub">${esc(S.activeClient.business_name)} — ${MODULES.setup.sub}</div>
    <div id="setup-body"></div>`;
  renderSetupBody();
}

function renderSetupBody(){
  const el = document.getElementById("setup-body"); if(!el) return;
  if(!S.setup.loaded){
    el.innerHTML = `<div class="msg">Loading…</div>`;
    loadSetupData(S.activeClientId);
    return;
  }
  el.innerHTML = renderSetupSettings() + renderSetupRunCard() + renderSetupLogCard() + renderSetupChecklist()
    + `<div class="msg" id="setup-msg">${esc(S.setup.msg)}</div>`;
}

async function loadSetupData(cid){
  try{
    const { data: runs, error } = await sb.from("setup_runs").select("*")
      .eq("client_id", cid).order("created_at", { ascending: false }).limit(1);
    if(error) throw new Error(error.message);
    S.setup.run = (runs && runs[0]) || null;
    await ensureBuildPlanLoaded(cid);
  }catch(e){ S.setup.msg = "Load failed: " + e.message; }
  S.setup.loaded = true;
  if(S.activeClientId === cid && S.module === "setup") renderSetupBody();
}

// Same data as loadBuildPlanData but WITHOUT its renderAutomation() tail —
// calling that from here would stomp the setup view. Fills the shared
// S.buildPlan slice so the automation module sees the same truth.
async function ensureBuildPlanLoaded(cid){
  if(S.buildPlan.loaded) return;
  const { data: plans, error } = await sb.from("build_plans").select("*")
    .eq("client_id", cid).order("created_at", { ascending: false }).limit(1);
  if(error) throw new Error(error.message);
  S.buildPlan.plan = (plans && plans[0]) || null;
  S.buildPlan.steps = [];
  if(S.buildPlan.plan){
    const { data: steps, error: e2 } = await sb.from("build_steps").select("*")
      .eq("build_plan_id", S.buildPlan.plan.id).order("position");
    if(e2) throw new Error(e2.message);
    S.buildPlan.steps = steps || [];
  }
  S.buildPlan.loaded = true;
}

/* ---- Card 1: GHL connection settings ---- */
function renderSetupSettings(){
  const c = S.activeClient, tokenSet = !!c.ghl_pit_token;
  return `
    <div class="card">
      <div class="phase-h">GHL connection</div>
      <div class="stack-row"><label>Location ID</label>
        <input id="setup-loc" value="${escAttr(c.ghl_location_id || "")}" placeholder="sub-account Settings → Business Profile (~20 chars, not a UUID)"></div>
      <div class="stack-row"><label>Integration token</label>
        <input id="setup-token" type="password" placeholder="${tokenSet ? "token set — enter a new value to replace" : "pit-… created INSIDE the client's sub-account"}"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn-primary" style="width:auto" onclick="saveSetupSettings()">Save connection</button>
        ${tokenSet ? `<button class="btn-ghost" onclick="disconnectGhl()">Disconnect GHL</button>` : ""}
        ${c.paid_at
          ? `<span class="msg">Invoice paid ${esc(new Date(c.paid_at).toLocaleDateString())}</span>`
          : `<button class="btn-ghost" onclick="markInvoicePaid()">Mark invoice paid</button>`}
      </div>
      ${tokenSet ? "" : `<div class="msg" style="margin-top:8px">A Private Integration Token is bound to ONE sub-account — create it inside the client's account with contacts, custom fields, custom values, calendars, tags and BOTH Pipelines scopes (own section) ticked.</div>`}
    </div>`;
}

async function saveSetupSettings(){
  const loc = document.getElementById("setup-loc").value.trim();
  const tok = document.getElementById("setup-token").value.trim();
  const patch = { ghl_location_id: loc || null };
  if(tok) patch.ghl_pit_token = tok;   // empty input = keep the existing token
  const { data, error } = await sb.from("clients").update(patch).eq("id", S.activeClientId).select().single();
  if(error){ setSetupMsg("Save failed: " + error.message); return; }
  S.activeClient = data;
  S.setup.preflight = null; S.setup.diff = null;   // connection changed — stale inventory
  setSetupMsg("Connection saved ✓");
  renderSetupBody();
}

async function markInvoicePaid(){
  const { data, error } = await sb.from("clients").update({ paid_at: new Date().toISOString() }).eq("id", S.activeClientId).select().single();
  if(error){ setSetupMsg("Mark paid failed: " + error.message); return; }
  S.activeClient = data;
  setSetupMsg("Invoice marked paid ✓");
  renderSetupBody();
}

async function disconnectGhl(){
  const { data, error } = await sb.from("clients").update({ ghl_pit_token: null }).eq("id", S.activeClientId).select().single();
  if(error){ setSetupMsg("Disconnect failed: " + error.message); return; }
  S.activeClient = data;
  S.setup.preflight = null; S.setup.diff = null;
  setSetupMsg("Token cleared from the console. Also revoke the integration inside GHL (sub-account Settings → Private Integrations) to fully de-authorize. Location ID and the created-item map are kept.");
  renderSetupBody();
}

/* ---- Card 2: gate + manifest union + preflight + dry-run ---- */
function setupGateMissing(){
  const c = S.activeClient, missing = [];
  if(!c.paid_at) missing.push("invoice not marked paid");
  if(!c.ghl_location_id) missing.push("no GHL location ID");
  if(!c.ghl_pit_token) missing.push("no Private Integration Token");
  if(!S.buildPlan.plan) missing.push("no saved build plan");
  return missing;
}

// Union of every saved step manifest — same dedupe rules as the planner:
// tags by exact string, fields by object:name (fieldKey). "[…]" names are
// per-client parameterized schemes (documented convention) — never created
// literally; surfaced separately for hand-naming.
function setupManifestUnion(steps){
  const tags = new Set(), fields = new Map();
  steps.filter(s => s.manifest && !s.manifest.tbd).forEach(s => {
    const m = s.manifest;
    [...(m.creates_tags || []), ...(m.requires_tags || [])].forEach(t => tags.add(t));
    (m.requires_fields || []).forEach(f => { const k = fieldKey(f); if(!fields.has(k)) fields.set(k, f); });
  });
  const all = [...tags], allF = [...fields.values()];
  return {
    tags: all.filter(t => !t.startsWith("[")),
    fields: allF.filter(f => !f.name.startsWith("[")),
    paramItems: all.filter(t => t.startsWith("[")).concat(allF.filter(f => f.name.startsWith("[")).map(fieldLabel)),
  };
}

async function preflightSetup(){
  const missing = setupGateMissing();
  if(missing.length){ setSetupMsg("Blocked — " + missing.join(" · ")); return; }
  S.setup.busy = true; S.setup.msg = "Preflighting — reading the live sub-account inventory…"; renderSetupBody();
  try{
    const [tags, fields, cvs, cals, pipes] = await Promise.all([
      ghl("list_tags"), ghl("list_fields"), ghl("list_custom_values"), ghl("list_calendars"), ghl("list_pipelines"),
    ]);
    S.setup.preflight = {
      tags: tags.tags || [], fields: fields.customFields || [],
      customValues: cvs.customValues || [], calendars: cals.calendars || [], pipelines: pipes.pipelines || [],
    };
    S.setup.diff = computeSetupDiff();
    S.setup.msg = "";
  }catch(e){ S.setup.preflight = null; S.setup.diff = null; S.setup.msg = "Preflight failed: " + e.message; }
  S.setup.busy = false;
  renderSetupBody();
}

function computeSetupDiff(){
  const pf = S.setup.preflight;
  const u = setupManifestUnion(S.buildPlan.steps);
  const tagNames = new Set(pf.tags.map(t => (t.name || "").toLowerCase()));
  const fKeys = new Set(pf.fields.map(f => (f.model || "contact") + ":" + (f.name || "").toLowerCase()));
  const tagsToCreate = u.tags.filter(t => !tagNames.has(t.toLowerCase()));
  const fieldsToCreate = u.fields.filter(f => !fKeys.has(fieldObject(f) + ":" + f.name.toLowerCase()));
  return { union: u, tagsToCreate, fieldsToCreate,
    tagsExisting: u.tags.length - tagsToCreate.length, fieldsExisting: u.fields.length - fieldsToCreate.length };
}

function renderSetupRunCard(){
  const missing = setupGateMissing();
  let inner;
  if(missing.length){
    inner = `<button class="btn-primary" style="width:auto" disabled>Run GHL setup</button>
      <div class="msg" style="margin-top:6px">Blocked — ${missing.map(esc).join(" · ")}</div>`;
  } else if(!S.setup.preflight){
    inner = `<button class="btn-primary" style="width:auto" onclick="preflightSetup()" ${S.setup.busy ? "disabled" : ""}>Preflight &amp; preview</button>
      <div class="msg" style="margin-top:6px">Reads the live sub-account inventory first — nothing is written until you confirm the preview.</div>`;
  } else {
    const d = S.setup.diff, n = d.tagsToCreate.length + d.fieldsToCreate.length;
    inner = renderSetupDiff(d) + `
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="width:auto" onclick="confirmRunSetup()" ${S.setup.running ? "disabled" : ""}>
          ${S.setup.running ? "Running…" : (n ? `Confirm — create ${n} item${n === 1 ? "" : "s"}` : "Record inventory & start checklist (0 to create)")}</button>
        <button class="btn-ghost" onclick="preflightSetup()" ${S.setup.running || S.setup.busy ? "disabled" : ""}>Refresh preview</button>
      </div>`;
  }
  return `<div class="card"><div class="phase-h">Run GHL setup — ${esc((S.buildPlan.plan && S.buildPlan.plan.title) || "build plan")}</div>${inner}</div>`;
}

function renderSetupDiff(d){
  const pf = S.setup.preflight;
  return [
    `<div class="mf-line"><span class="mf-k">Tags:</span> ${d.tagsToCreate.length} to create · ${d.tagsExisting} already exist${d.tagsToCreate.length ? " — " + esc(d.tagsToCreate.join(" · ")) : ""}</div>`,
    `<div class="mf-line"><span class="mf-k">Fields:</span> ${d.fieldsToCreate.length} to create · ${d.fieldsExisting} already exist${d.fieldsToCreate.length ? " — " + esc(d.fieldsToCreate.map(fieldLabel).join(" · ")) : ""}</div>`,
    d.union.paramItems.length ? `<div class="mf-line">⚠ <span class="mf-k">Parameterized schemes (name per client, by hand):</span> ${esc(d.union.paramItems.join(" · "))}</div>` : "",
    `<div class="mf-line"><span class="mf-k">Inventory (read-only):</span> ${pf.customValues.length} custom values · ${pf.calendars.length} calendars · ${pf.pipelines.length} pipelines — manifests don't declare these yet; create by hand where the plan needs them</div>`,
  ].join("");
}

/* ---- Card 3: sequential execution loop — fail-stop, live log ---- */
async function confirmRunSetup(){
  if(S.setup.running || !S.setup.diff) return;
  const cid = S.activeClientId;
  const ctx = { ghl_location_id: S.activeClient.ghl_location_id, ghl_pit_token: S.activeClient.ghl_pit_token };
  const baseMap = S.activeClient.ghl_map || {};
  const d = S.setup.diff, pf = S.setup.preflight;
  S.setup.running = true; renderSetupBody();

  // an interrupted run from a dead session stays 'running' forever — close it out
  if(S.setup.run && S.setup.run.status === "running")
    await sb.from("setup_runs").update({ status: "failed", finished_at: new Date().toISOString() }).eq("id", S.setup.run.id).select().single();

  const { data: run, error: insErr } = await sb.from("setup_runs").insert({
    operator_id: S.user.id, client_id: cid, build_plan_id: S.buildPlan.plan.id,
    status: "running", log: [], checklist: humanChecklistTemplate(S.buildPlan.steps, ctx.ghl_location_id),
  }).select().single();
  if(insErr){ setSetupMsg("Could not start run: " + insErr.message); S.setup.running = false; renderSetupBody(); return; }
  S.setup.run = run;

  const tagByName = new Map(pf.tags.map(t => [(t.name || "").toLowerCase(), t]));
  const fieldByKey = new Map(pf.fields.map(f => [(f.model || "contact") + ":" + (f.name || "").toLowerCase(), f]));
  const log = [];
  const push = async (entry) => {
    log.push({ ...entry, ts: new Date().toISOString() });
    const { data } = await sb.from("setup_runs").update({ log }).eq("id", run.id).select().single();
    if(data) S.setup.run = data;
    if(S.activeClientId === cid && S.module === "setup") renderSetupBody();
  };

  const items = [
    ...d.union.tags.map(t => ({ kind: "tag", name: t })),
    ...d.union.fields.map(f => ({ kind: "field", name: f.name, object: fieldObject(f), f })),
  ];
  let failed = false;
  for(const it of items){
    if(S.activeClientId !== cid){ S.setup.running = false; return; }   // client switched — abort; row stays 'running' → shown as interrupted
    try{
      if(it.kind === "tag") await setupTagItem(it, tagByName, push, ctx);
      else await setupFieldItem(it, fieldByKey, push, ctx);
    }catch(e){
      await push({ kind: it.kind, object: it.object, name: it.name, action: "error", error: e.message });
      failed = true;
      break;   // FAIL-STOP: nothing past the first error
    }
  }

  await mergeGhlMap(cid, baseMap, log);
  const { data: fin } = await sb.from("setup_runs").update({
    status: failed ? "failed" : "complete", finished_at: new Date().toISOString(),
  }).eq("id", run.id).select().single();
  if(fin) S.setup.run = fin;
  S.setup.running = false;
  S.setup.preflight = null; S.setup.diff = null;   // any re-run starts from a fresh preflight
  S.setup.msg = failed
    ? "Run FAILED — the log shows exactly what succeeded and what stopped it. Fix the cause and re-run: existing items skip (idempotent)."
    : "Setup run complete ✓ — created items and their GHL ids are recorded on the client.";
  if(S.activeClientId === cid && S.module === "setup") renderSetupBody();
}

async function setupTagItem(it, tagByName, push, ctx){
  const hit = tagByName.get(it.name.toLowerCase());
  if(hit){ await push({ kind: "tag", name: it.name, action: "found", ghl_id: hit.id || null }); return; }
  try{
    const r = await ghl("create_tag", { name: it.name }, ctx);
    await push({ kind: "tag", name: it.name, action: "created", ghl_id: (r.tag && r.tag.id) || null });
  }catch(e){
    if(e.status === 400 && /already exist/i.test(e.message)) await push({ kind: "tag", name: it.name, action: "found", ghl_id: null });
    else throw e;
  }
}

async function setupFieldItem(it, fieldByKey, push, ctx){
  const hit = fieldByKey.get(it.object + ":" + it.name.toLowerCase());
  if(hit){ await push({ kind: "field", object: it.object, name: it.name, action: "found", ghl_id: hit.id || null }); return; }
  try{
    const r = await ghl("create_field", { name: it.name, dataType: GHL_DATATYPE[it.f.type] || "TEXT", model: it.object }, ctx);
    await push({ kind: "field", object: it.object, name: it.name, action: "created", ghl_id: (r.customField && r.customField.id) || null });
  }catch(e){
    if(e.status === 400 && e.meta && e.meta.existingId) await push({ kind: "field", object: it.object, name: it.name, action: "found", ghl_id: e.meta.existingId });
    else throw e;
  }
}

// name → GHL id registry (fields set values by fieldId, not name). Deep-merge,
// never overwrite: partial/failed runs still keep every id that landed.
async function mergeGhlMap(cid, baseMap, log){
  const map = { ...baseMap, tags: { ...(baseMap.tags || {}) }, fields: { ...(baseMap.fields || {}) } };
  log.forEach(e => {
    if(e.action === "error" || !e.ghl_id) return;
    if(e.kind === "tag") map.tags[e.name] = e.ghl_id;
    if(e.kind === "field") map.fields[e.object + ":" + e.name] = e.ghl_id;
  });
  const { data } = await sb.from("clients").update({ ghl_map: map }).eq("id", cid).select().single();
  if(data && S.activeClientId === cid) S.activeClient = data;
}

function renderSetupLogCard(){
  const run = S.setup.run;
  if(!run) return "";
  const interrupted = run.status === "running" && !S.setup.running;
  const rows = (run.log || []).map(e => `
    <div class="mf-line">${e.action === "created" ? "＋" : e.action === "found" ? "→" : "✗"}
      ${esc(e.kind)}${e.object === "opportunity" ? " (opportunity)" : ""} · <span class="mf-k">${esc(e.name)}</span> —
      ${e.action === "error" ? `<span style="color:#C0392B">${esc(e.error)}</span>` : esc(e.action) + (e.ghl_id ? " · " + esc(e.ghl_id) : "")}
    </div>`).join("");
  return `<div class="card">
    <div class="phase-h">Last run · ${esc(interrupted ? "interrupted — safe to re-run (idempotent)" : run.status)} · ${esc(new Date(run.created_at).toLocaleString())}</div>
    ${rows || `<div class="msg">No items logged yet.</div>`}
  </div>`;
}

/* ---- Card 4: human-only checklist (deterministic — never AI) ---- */
function humanChecklistTemplate(steps, loc){
  const base = `https://app.gohighlevel.com/v2/location/${loc}/settings/`;
  const hasPayments = steps.some(s => /payment|stripe/i.test((s.matched_engine || "") + " " + (s.title || "")));
  return [
    { text: "Connect the client's subdomain + DNS records for funnels/links", url: base + "domain" },
    { text: "A2P 10DLC registration (brand + campaign) — SMS won't send without it", url: base + "phone_number" },
    ...(hasPayments ? [{ text: "Connect Stripe (live keys, not test mode)", url: base + "payments" }] : []),
    { text: "Connect QuickBooks (if the client invoices through it)", url: base + "integrations" },
    { text: "Connect Google (Business Profile + Calendar) and Facebook/Instagram", url: base + "integrations" },
    { text: "Email authentication: dedicated sending domain, DKIM/SPF verified", url: base + "email_services" },
  ].map(i => ({ ...i, done: false }));
}

function renderSetupChecklist(){
  const run = S.setup.run;
  const inner = !run
    ? `<div class="msg">Materializes with the first setup run.</div>`
    : (run.checklist || []).map((c, i) => `
      <label style="display:block;font-size:13px;margin:3px 0">
        <input type="checkbox" ${c.done ? "checked" : ""} onchange="toggleSetupChecklist(${i})">
        ${c.done ? `<s>${esc(c.text)}</s>` : esc(c.text)}
        ${c.url ? ` <a href="${escAttr(c.url)}" target="_blank" rel="noopener">open ↗</a>` : ""}
      </label>`).join("");
  return `<div class="card"><div class="phase-h">Human-only checklist — what the API can't do</div>${inner}</div>`;
}

async function toggleSetupChecklist(i){
  const run = S.setup.run; if(!run) return;
  const list = (run.checklist || []).map((c, x) => x === i ? { ...c, done: !c.done } : c);
  const { data, error } = await sb.from("setup_runs").update({ checklist: list }).eq("id", run.id).select().single();
  if(error){ setSetupMsg("Checklist update failed: " + error.message); renderSetupBody(); return; }   // rerender snaps the checkbox back
  S.setup.run = data;
  renderSetupBody();
}

/* ============================================================
   BOOT
============================================================ */
sb.auth.onAuthStateChange((_e, session) => { if(session && document.getElementById("app").style.display === "none") initApp(); });
initApp();
</script>
