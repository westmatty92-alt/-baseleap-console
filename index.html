/* ---- THE SWEEP: three-way catalog routing per accepted gap ----
   Deterministic routing reads gap.matched_engine (persisted by the Automation
   Agent — never re-judged). AI runs only for parameterize (adapt a catalog
   engine) and formulate (design a new one). mode = retrieve|formulate is the
   fundamental split; drop-in vs parameterize is NOT a mode — both retrieve,
   distinguished by the presence of a "changes made" note. */

const PARAMETERIZE_CONTRACT_PROMPT = `OUTPUT — respond ONLY with valid JSON, no markdown, exactly this shape:
{"parameter_values":{"<declared key>":"the concrete value for THIS client"},"changes_made":"operator-readable list of every adaptation, e.g. discount set to 15%, tiers renamed Silver/Gold, field sr_referral_code → acme_referral_code","deployment_overrides":{"branding":{},"business_rules":{}}}
Field rules:
- parameter_values: one entry per declared client_parameter key — every key, no extras. Value = the concrete setting for this client, or "NEEDS DISCOVERY: <what to ask>" when the business context doesn't answer it.
- changes_made: every adaptation in one plain list — this is what the operator confirms before building. Never empty.
- deployment_overrides: ONLY the deployment-guide VALUES that change for this client (adapted math, renamed tiers/fields/tags). Echo nothing that stays as-is. never_touch is architecture — never overridden.`;

const DESIGN_DOCTRINE_PROMPT = `AUTOMATION DESIGN DOCTRINE (how you decide the nodes, tags, and fields — apply BEFORE writing them):
1. Think in STATES: name the from-state and to-state the automation moves someone between; write final_rule first — if you can't write that one sentence, the design is too messy.
2. Tags are signals, fields are truth: tags say what bucket someone is in (workflow triggers, visibility, guards, segmentation); custom FIELDS hold what is true (money, balances, points, dates, renewal logic). This rule decides the manifest — never a tag as a counter or source of truth.
3. Guard first: every workflow opens with a duplicate-prevention guard (tag exists / field filled / recent payment / token used → end). Double-fires are the #1 broken-GHL cause.
4. Factory-line node order: Trigger → Guard → Update state → Update records → Send message → Handoff → End.
5. Name the source of truth: Stripe = payment truth · GHL Calendar = appointment truth · custom fields = state/data truth · tags = visibility · pipelines = operational status.
6. Find before create (opportunities/records): find → found ? update : create.
7. Never reward before fulfillment: rewards fire on the qualifying event (paid, showed/completed, no refund) — never on booking.
8. Delays are timing, not logic: never "wait and hope" — wait, re-find, then branch on what exists. Every delay has a reason.`;

const FORMULATE_CONTRACT_PROMPT = `OUTPUT — respond ONLY with valid JSON, no markdown, exactly this shape:
{"spec":{"purpose":"one sentence","automations":[{"name":"workflow name","trigger":{"type":"exact GHL trigger","filters":{}},"final_rule":"When [trigger] happens, if [guard passes], update [state], then [action], unless [failure condition].","nodes":[{"type":"trigger","config":"exact trigger + filters"}],"tests":["test matrix items"]}]},"manifest":{"requires_tags":["tags this engine reads/branches on"],"creates_tags":["tags it sets"],"requires_fields":[{"name":"field name","type":"text|number|currency|date"}]},"deployment":{"branding":{"<area>":"what changes per client"},"business_rules":{"math_operations":["every hardcoded number that changes per client"]},"never_touch":["architectural rules that break the engine if edited"]}}
Field rules:
- spec: catalog-grade — a builder executes it without more research. Trigger semantics match the business event exactly; design every trigger for re-entry/duplicates (processed-state tags, find-before-create); value-awarding steps gate on Payment Received.
- final_rule: fill the template with THIS automation's specifics — it is the spine the nodes expand from.
- nodes: the ordered node-by-node workflow exactly as assembled in the GHL builder. Each node = {"type","config"}; type is one of trigger|guard|wait|action|update|condition|webhook|handoff|end (webhook = external webhook-out call — never fold it into action; update = field/tag/record state change). The first node is always the trigger; the second is the guard (doctrine rule 3). condition nodes add "yes":[nodes] and "no":[nodes] branch arrays (branches may end with an end node). config is one precise sentence of settings.
- manifest: classify by doctrine rule 2 — every tag the engine reads or sets and every custom field it needs, named exactly as the nodes reference them. The engine is not buildable until it declares these.
- tests: the REAL test matrix for THIS automation, not generic phrases. One entry each for: the happy path end-to-end; EVERY guard (prove the duplicate-prevention actually blocks a re-fire); EVERY condition branch — the YES and the NO separately; each webhook ROUND-TRIP (it fires AND the response writes back the expected field); the exit condition (the automation stops on the right tag/state). Each test names the setup, the action, and the expected observable result.
- deployment: the three-tier guide for FUTURE clients of this engine — branding (names/copy/links), business_rules incl. math_operations (the most-forgotten tier), never_touch (the architecture).
- This engine is DESIGNED, NOT PROVEN — tests must name what to verify live before trusting it.`;

// DEPTH GUARD (retrieve-vs-create gate): an engine qualifies for a retrieve
// route only when its spec carries BOTH a manifest and real workflow content —
// every automation an object with steps/nodes, not title strings or a pattern
// one-liner. Enforced in data, not prompt: however confidently the assessment
// matched, a thin stub can never be retrieved. Evaluated against the LIVE
// catalog row, so deepening a spec flips its route with zero code change.
function isDeepEngine(e){
  const spec = e && e.spec;
  return !!(spec && spec.manifest
    && Array.isArray(spec.automations) && spec.automations.length
    && spec.automations.every(a => a && typeof a === "object"
        && (Array.isArray(a.steps) || Array.isArray(a.nodes))));
}

// Deterministic three-way router — no AI, no re-judging. A matched engine that
// fails the depth guard routes to formulate SEEDED with the stub — its curated
// summary/manifest/deployment feed the design prompt as constraints.
// gaps.matched_engine stays as persisted (honest pattern metadata); only the
// route is decided here.
function classifyGapRoute(g, catalogByKey){
  const engine = g.matched_engine ? catalogByKey.get(g.matched_engine) : null;
  if(!engine) return { route: "formulate", engine: null, seed: null };
  if(!isDeepEngine(engine)) return { route: "formulate", engine: null, seed: engine };
  return Object.keys(engine.client_parameters || {}).length
    ? { route: "parameterize", engine, seed: null }
    : { route: "dropin", engine, seed: null };
}

// Shared retry-once wiring for the sweep's per-gap AI calls (same doctrine as
// generatePlanDraft): only a contract violation earns the retry, with the named
// violation fed back; transport/proxy errors propagate immediately.
async function aiJsonWithRetry({ system, userMsg, max_tokens, validate, what }){
  const attempt = async (msg) => {
    let out;
    const raw = await ai({ system, messages: [{ role:"user", content: msg }], max_tokens });
    try{ out = JSON.parse(raw.replace(/```json|```/g, "").trim()); }
    catch(e){ throw new Error("invalid JSON"); }
    validate(out);
    return out;
  };
  try{ return await attempt(userMsg); }
  catch(e1){
    if(/AI request failed/.test(e1.message)) throw e1;                 // transport — retrying blind doubles cost
    if(/output truncated/.test(e1.message))                            // truncation — the SAME call can only truncate again
      throw new Error(`${what}: output exceeded the ${max_tokens}-token budget — not retried. Raise the limit or split the call.`);
    try{ return await attempt(userMsg + `\n\nYour previous attempt violated the output contract — ${e1.message}. Respond with the complete corrected JSON only.`); }
    catch(e2){
      if(/output truncated/.test(e2.message))
        throw new Error(`${what}: retry exceeded the ${max_tokens}-token budget after a contract violation (${e1.message})`);
      throw new Error(`${what} failed validation twice (first: ${e1.message}; then: ${e2.message})`);
    }
  }
}

function sweepClientContext(){
  const stackSummary = summarizeStack(S.activeClient.current_stack) || "No current stack captured.";
  return `Client: ${S.activeClient.business_name} (${S.activeClient.industry || "industry n/a"})\nCurrent stack: ${stackSummary}`;
}

function validateAdaptation(a, engine){
  if(!a || typeof a !== "object") throw new Error("adaptation is not an object");
  if(!a.parameter_values || typeof a.parameter_values !== "object") throw new Error("parameter_values missing");
  const declared = Object.keys(engine.client_parameters || {});
  const got = Object.keys(a.parameter_values);
  const extra = got.filter(k => !declared.includes(k));
  const missing = declared.filter(k => !got.includes(k));
  if(extra.length) throw new Error("parameter_values has undeclared keys: " + extra.join(", "));
  if(missing.length) throw new Error("parameter_values missing declared keys: " + missing.join(", "));
  if(typeof a.changes_made !== "string" || !a.changes_made.trim()) throw new Error("changes_made missing");
  if(a.deployment_overrides != null && typeof a.deployment_overrides !== "object") throw new Error("deployment_overrides must be an object");
}

// PARAMETERIZE: adapt a catalog engine's declared knobs + deployment VALUES to
// this client; the changes_made note is what the operator confirms before building.
async function adaptEngineToClient(engine, gap){
  const dep = engine.spec && engine.spec.deployment;
  const system = "You adapt a proven GHL automation engine to a new client. Adapt ONLY the declared client_parameters and deployment-guide values — the engine architecture is fixed.\n\n"
    + PARAMETERIZE_CONTRACT_PROMPT;
  const userMsg = sweepClientContext()
    + `\n\nGap this engine delivers: ${gap.title}\nProblem: ${gap.problem || "—"}`
    + `\n\nEngine: ${engine.name} (${engine.engine_key})\nEngine summary: ${engine.summary || "—"}`
    + `\nDeclared client_parameters (adapt EVERY key):\n${JSON.stringify(engine.client_parameters, null, 1)}`
    + (dep ? `\nDeployment business_rules to adapt the VALUES of:\n${JSON.stringify(dep.business_rules || {}, null, 1)}` : "\n(No deployment guide on this engine yet — adapt the declared parameters only.)")
    + `\n\nAdapt this engine to the client now.`;
  return aiJsonWithRetry({ system, userMsg, max_tokens: 8000,
    validate: a => validateAdaptation(a, engine), what: `parameterize (${engine.engine_key})` });
}

const NODE_TYPES = ["trigger","guard","wait","action","update","condition","webhook","handoff","end"];

// One node = {type, config}; condition nodes carry yes/no branch arrays (one level
// of nesting is the contract — branches hold plain nodes, validated the same way).
function validateNodes(nodes, at, isBranch){
  if(!Array.isArray(nodes) || !nodes.length) throw new Error(at + ": nodes empty");
  nodes.forEach((n, j) => {
    const here = `${at} node ${j+1}`;
    if(!n || typeof n !== "object") throw new Error(here + ": not an object");
    if(!NODE_TYPES.includes(n.type)) throw new Error(here + `: type must be one of ${NODE_TYPES.join("|")}`);
    if(typeof n.config !== "string" || !n.config.trim()) throw new Error(here + ": config missing");
    if(n.type === "condition"){
      validateNodes(n.yes, here + " yes-branch", true);
      validateNodes(n.no,  here + " no-branch",  true);
    }
  });
  if(!isBranch && nodes[0].type !== "trigger") throw new Error(at + ": first node must be the trigger");
}

// Recursive tally of the node types the tests floor depends on (branches included).
function countNodeTypes(nodes, counts = { guard: 0, condition: 0 }){
  (nodes || []).forEach(n => {
    if(n && counts[n.type] !== undefined) counts[n.type]++;
    if(n && n.type === "condition"){ countNodeTypes(n.yes, counts); countNodeTypes(n.no, counts); }
  });
  return counts;
}

// Lenient FLOOR, deliberately not the exact matrix formula — the full coverage
// requirement (happy path, every branch YES+NO, webhook round-trips, exit) lives
// in the PROMPT. A strict count would false-reject valid formulations over a
// counting mismatch and make formulate flaky; the floor only rejects trivial output.
function validateAutomationTests(a, at){
  if(!Array.isArray(a.tests) || !a.tests.length || a.tests.some(t => typeof t !== "string" || !t.trim()))
    throw new Error(at + ": tests must be a non-empty array of non-empty strings");
  const c = countNodeTypes(a.nodes);
  const floor = c.guard + c.condition;
  if(a.tests.length < floor)
    throw new Error(at + `: only ${a.tests.length} tests for ${c.guard} guard(s) + ${c.condition} condition(s) — cover at least each guard and each condition (${floor} minimum), plus happy path, both branch sides, webhook round-trips, and the exit condition`);
}

function validateManifest(m, at){
  if(!m || typeof m !== "object") throw new Error(at + " missing");
  ["requires_tags","creates_tags"].forEach(k => {
    if(!Array.isArray(m[k]) || m[k].some(t => typeof t !== "string" || !t.trim()))
      throw new Error(`${at}.${k} must be an array of non-empty strings`);
  });
  if(!Array.isArray(m.requires_fields)) throw new Error(at + ".requires_fields must be an array");
  m.requires_fields.forEach((f, i) => {
    if(!f || typeof f.name !== "string" || !f.name.trim() || typeof f.type !== "string" || !f.type.trim())
      throw new Error(`${at}.requires_fields[${i}] needs name and type`);
  });
}

function validateFormulation(f){
  if(!f || typeof f !== "object") throw new Error("formulation is not an object");
  if(!f.spec || typeof f.spec !== "object" || typeof f.spec.purpose !== "string" || !f.spec.purpose.trim()) throw new Error("spec.purpose missing");
  if(!Array.isArray(f.spec.automations) || !f.spec.automations.length) throw new Error("spec.automations empty");
  f.spec.automations.forEach((a, i) => {
    if(typeof a.name !== "string" || !a.name.trim()) throw new Error(`automation ${i+1}: name missing`);
    if(!a.trigger || typeof a.trigger.type !== "string") throw new Error(`automation ${i+1}: trigger.type missing`);
    if(typeof a.final_rule !== "string" || !a.final_rule.trim()) throw new Error(`automation ${i+1}: final_rule missing`);
    validateNodes(a.nodes, `automation ${i+1}`, false);
    validateAutomationTests(a, `automation ${i+1}`);
  });
  validateManifest(f.manifest, "manifest");
  const d = f.deployment;
  if(!d || typeof d !== "object") throw new Error("deployment missing");
  if(!d.branding || typeof d.branding !== "object") throw new Error("deployment.branding missing");
  if(!d.business_rules || typeof d.business_rules !== "object" || !Array.isArray(d.business_rules.math_operations))
    throw new Error("deployment.business_rules.math_operations must be an array");
  if(!Array.isArray(d.never_touch) || !d.never_touch.length) throw new Error("deployment.never_touch empty");
}

// The catalog stub handed to a seeded formulate: constraints, not a spec. The
// curated knowledge (summary, pattern, manifest, deployment, declared knobs)
// flows into the design; the AI still designs the FULL workflow, validated by
// the untouched validateFormulation.
function catalogSeedBlock(seed){
  const spec = seed.spec || {};
  const lines = [
    `CATALOG SEED — catalog engine "${seed.name}" (${seed.engine_key}) matches this gap's pattern but is not deepened to a buildable spec, so you design it in full. Everything below is CONSTRAINTS your design must honor — not a spec to copy:`,
    `Summary: ${seed.summary || "—"}`,
  ];
  if(spec.pattern) lines.push(`Known pattern: ${spec.pattern}`);
  if(Array.isArray(spec.automations) && spec.automations.length)
    lines.push(`Documented automations (titles only — design each in full): ${spec.automations.map(a => typeof a === "string" ? a : a.name).join(" · ")}`);
  if(spec.core_rule) lines.push(`Core rule (architectural — must hold): ${spec.core_rule}`);
  if(Array.isArray(spec.interacts_with) && spec.interacts_with.length)
    lines.push(`Interacts with: ${spec.interacts_with.join(" · ")}`);
  if(spec.manifest)
    lines.push(`Curated manifest — use these tags/fields EXACTLY as named (add if needed, never rename):\n${JSON.stringify(spec.manifest, null, 1)}`);
  if(spec.deployment)
    lines.push(`Curated deployment guide — your deployment output must stay consistent with it; its never_touch entries are architecture:\n${JSON.stringify(spec.deployment, null, 1)}`);
  if(Object.keys(seed.client_parameters || {}).length)
    lines.push(`Declared client knobs — the design must expose each as an adaptable point:\n${JSON.stringify(seed.client_parameters, null, 1)}`);
  return lines.join("\n");
}

// FORMULATE: no retrievable catalog row — AI designs BOTH halves (spec + three-
// tier deployment guide) from the GHL grammar; a thin-engine match passes its
// stub in as seed (depth guard). Never written to engine_catalog here;
// graduation is the operator's call after a real build (separate step, deferred).
async function formulateEngine(gap, seed){
  const system = "You design a NEW GHL automation engine from scratch for an agency build plan. It has no proven template — design conservatively and testably.\n\n"
    + DESIGN_DOCTRINE_PROMPT + "\n\n" + GHL_GRAMMAR_PROMPT + "\n\n" + FORMULATE_CONTRACT_PROMPT;
  const userMsg = sweepClientContext()
    + `\n\nGap to deliver:\nTitle: ${gap.title}\nProblem: ${gap.problem || "—"}`
    + `\nValidated mechanism: ${gap.mechanism || "?"} | approach: ${gap.approach || "?"} | severity: ${gap.severity || "medium"}`
    + (seed ? `\n\n${catalogSeedBlock(seed)}` : "")
    + `\n\nDesign the engine now.`;
  return aiJsonWithRetry({ system, userMsg, max_tokens: 32000,   // full spec + deployment guide — match generatePlanDraft's budget
    validate: validateFormulation, what: `formulate (${gap.title})` });
}

// The sweep orchestrator: one catalog read, classify every gap (deterministic),
// then run the parameterize/formulate AI calls through a BOUNDED CONCURRENT POOL.
// Results are assigned by gap position — the same index gap_ref uses — so
// completion order never affects the output; concurrency changes wall-clock only.
// allSettled semantics: every gap runs to completion; any failure aborts the
// generation with ONE aggregated error naming each failed gap (no silent drops,
// no partial plans — a plan missing a swept gap would change plan structure).
// Per-call max_tokens + the ai() stop_reason truncation check live inside the
// untouched adaptEngineToClient/formulateEngine (Bug #17 preserved by construction).
const SWEEP_CONCURRENCY = 5;   // each call is its own /api/ai invocation (300s each); 5 keeps worst-case in-flight output well under rate limits

async function sweepAcceptedGaps(gaps){
  const engines = await listEngines();
  const byKey = new Map(engines.map(e => [e.engine_key, e]));
  const routed = gaps.map(g => classifyGapRoute(g, byKey));
  const results = new Array(gaps.length);
  const queue = [];   // gap indexes that need an AI call
  routed.forEach(({ route, engine }, i) => {
    if(route === "dropin"){
      results[i] = { route, engine_key: engine.engine_key, depends_on: engine.depends_on || [],
        spec: engine.spec, deployment: (engine.spec && engine.spec.deployment) || null,
        manifest: (engine.spec && engine.spec.manifest) || null, changes_note: null };
    } else queue.push(i);
  });
  const aiTotal = queue.length;
  let done = 0;
  const failures = [];
  const progress = () => setBuildPlanMsg(`Sweeping ${gaps.length} gap${gaps.length === 1 ? "" : "s"} — ${gaps.length - aiTotal} drop-in (instant), ${aiTotal} AI call${aiTotal === 1 ? "" : "s"} (≤${SWEEP_CONCURRENCY} at once)… ${done}/${aiTotal} done`);
  progress();
  const worker = async () => {
    while(queue.length){
      const i = queue.shift();
      const { route, engine, seed } = routed[i];
      const g = gaps[i];
      try{
        if(route === "parameterize"){
          const a = await adaptEngineToClient(engine, g);
          results[i] = { route, engine_key: engine.engine_key, depends_on: engine.depends_on || [],
            spec: engine.spec, deployment: (engine.spec && engine.spec.deployment) || null,
            manifest: (engine.spec && engine.spec.manifest) || null,
            parameter_values: a.parameter_values, deployment_overrides: a.deployment_overrides || null,
            changes_note: a.changes_made };
        } else {
          const f = await formulateEngine(g, seed);
          // engine_key stays null on a seeded formulate — acceptedKeys/foundation
          // logic must never count a stub as a delivered engine. seeded_from is
          // provenance only; the stub's real prerequisites ARE inherited.
          results[i] = { route, engine_key: null, seeded_from: seed ? seed.engine_key : null,
            depends_on: seed ? (seed.depends_on || []) : [],
            spec: f.spec, deployment: f.deployment, manifest: f.manifest, changes_note: null };
        }
      }catch(e){ failures.push(`"${g.title}": ${e.message}`); }
      done++; progress();
    }
  };
  await Promise.all(Array.from({ length: Math.min(SWEEP_CONCURRENCY, aiTotal) }, worker));
  if(failures.length)
    throw new Error(`sweep failed on ${failures.length} of ${aiTotal} AI call${aiTotal === 1 ? "" : "s"} — ${failures.join("; ")} — nothing was generated; press Generate to retry`);
  return results;
}

// Post-parse attachment: sweep artifacts land on steps BY CODE, keyed by gap_ref
// — never emitted inside the plan JSON (token budget). mode is overridden from
// the route; the first automation step per gap carries the artifacts + editable
// changes note, later steps of the same gap just carry the review flag.
function attachSweepToDraft(draft, sweep){
  const seen = new Set();
  draft.steps.forEach(s => {
    if(s.gap_ref === null || s.agent !== "automation" || !sweep[s.gap_ref]) return;
    const sw = sweep[s.gap_ref];
    s.mode = sw.route === "formulate" ? "formulate" : "retrieve";
    s.needs_review = (sw.route === "parameterize" || sw.route === "formulate") ? sw.route : null;
    s.carries_artifacts = !seen.has(s.gap_ref);
    if(s.carries_artifacts){
      if(sw.route === "parameterize") s.changes_note = sw.changes_note;
      // Build-Plan Depth: the artifact step carries the node workflow + manifest
      // (never overwrite the {tbd:true} flag injection set on manifest-less engines)
      s.workflow = (sw.spec && sw.spec.automations) || null;
      if(sw.manifest) s.manifest = sw.manifest;
    }
    seen.add(s.gap_ref);
  });
  draft.sweep = sweep;
}

// The full auto-generated deployment story for the engine's artifact step —
// persisted on build_steps.deployment (migration 009) and rendered as the
// READ-ONLY collapsed "Deployment guide" section. Replaces the old
// composeStepNotes text dump: the notes column now holds ONLY operator-typed
// text on new plans (historical rows keep their baked-in dump — never rewritten).
// spec_extras = the engine spec minus what already renders structurally
// (automations → workflow view, deployment/manifest → their own sections).
function composeStepDeployment(sw, changesNote){
  const { automations: _a, deployment: _d, manifest: _m, ...specExtras } = sw.spec || {};
  const d = {
    route: sw.route,
    seeded_from: sw.seeded_from || null,   // depth guard: the thin stub this formulation was seeded with
    needs_review: (sw.route === "parameterize" || sw.route === "formulate") ? sw.route : null,
    changes_note: changesNote ?? sw.changes_note ?? null,
    parameter_values: sw.parameter_values || null,
    tiers: sw.deployment || null,
    overrides: (sw.deployment_overrides && Object.keys(sw.deployment_overrides).length) ? sw.deployment_overrides : null,
    spec_extras: Object.keys(specExtras).length ? specExtras : null,
  };
  return (d.changes_note || d.parameter_values || d.tiers || d.overrides || d.spec_extras) ? d : null;
}

// Draft steps render the deployment story live from the sweep (edits to the
// changes note flow through); saved steps read the persisted deployment column.
function draftStepDeployment(s){
  const sweep = S.buildPlan.draft && S.buildPlan.draft.sweep;
  if(!s.carries_artifacts || !sweep || s.gap_ref === null || !sweep[s.gap_ref]) return null;
  return composeStepDeployment(sweep[s.gap_ref], s.changes_note);
}

// The editable "changes made" note (DoD: note exists + is editable; polish later).
// No re-render — the textarea itself is the live editor.
function updateDraftChangesNote(ref, value){
  const s = S.buildPlan.draft && S.buildPlan.draft.steps.find(x => x.ref === ref);
  if(s) s.changes_note = value;
}

    + BUILD_SEQUENCING_PROMPT + "\n\n"

// Routing line per gap, from the sweep. Engine-prerequisite hints are computed

function gapRouteLine(sw, acceptedKeys){

    + `Accepted gaps to deliver (gap_ref = the number):\n`

/* ---- parse + order: the AI proposes edges, this code decides the order ---- */
const SEVERITY_RANK = { high: 0, medium: 1, low: 2 };   // lower = builds earlier

// Throws a specific error on the first contract violation; returns nothing.
// Checks every field of every step, that all depends_on refs resolve, and that
// no step depends on itself. Cycles are caught by the sort (Kahn's leftover set).
function validatePlanShape(p, gaps){
  if(typeof p.title !== "string" || !p.title.trim()) throw new Error("plan title missing");
  if(typeof p.summary !== "string" || !p.summary.trim()) throw new Error("plan summary missing");
  if(!Array.isArray(p.scope_flags) || p.scope_flags.some(f => typeof f !== "string")) throw new Error("scope_flags must be an array of strings");
  if(!Array.isArray(p.steps) || !p.steps.length) throw new Error("plan has no steps");
  const refs = new Set();
  p.steps.forEach((s, i) => {
    const at = `step ${i+1}${typeof s.ref === "string" && s.ref.trim() ? ` ("${s.ref}")` : ""}`;
    if(typeof s.ref !== "string" || !s.ref.trim()) throw new Error(at + ": ref missing");
    if(!/^[A-Za-z0-9_-]+$/.test(s.ref)) throw new Error(at + ": ref must be a short alphanumeric id");   // refs land inside onclick='...' handlers — no quotes/markup
    if(refs.has(s.ref)) throw new Error(at + ": duplicate ref");
    refs.add(s.ref);
    if(!["setup","automation"].includes(s.agent)) throw new Error(at + ": agent must be setup|automation");
    if(s.agent === "automation" ? !["retrieve","formulate"].includes(s.mode) : s.mode != null)
      throw new Error(at + ": mode must be retrieve|formulate on automation steps and null on setup steps");
    if(!(s.gap_ref === null || (Number.isInteger(s.gap_ref) && s.gap_ref >= 0 && s.gap_ref < gaps.length)))
      throw new Error(at + `: gap_ref must be null or 0–${gaps.length - 1}`);
    if(typeof s.long_lead !== "boolean") throw new Error(at + ": long_lead must be boolean");
    if(typeof s.title !== "string" || !s.title.trim()) throw new Error(at + ": title missing");
    if(typeof s.detail !== "string" || !s.detail.trim()) throw new Error(at + ": detail missing");
    if(!Array.isArray(s.checklist) || s.checklist.some(c => typeof c !== "string" || !c.trim()))
      throw new Error(at + ": checklist must be an array of non-empty strings");
    if(typeof s.estimated_hours !== "number" || !isFinite(s.estimated_hours) || s.estimated_hours < 0)
      throw new Error(at + ": estimated_hours must be a number ≥ 0");
    if(!Array.isArray(s.depends_on) || s.depends_on.some(d => typeof d !== "string")) throw new Error(at + ": depends_on must be an array of refs");
    if(s.depends_on.includes(s.ref)) throw new Error(at + ": depends on itself");
  });
  p.steps.forEach(s => s.depends_on.forEach(d => {
    if(!refs.has(d)) throw new Error(`step "${s.ref}" depends on unknown ref "${d}"`);
  }));
}

// A step's severity comes from the gap it delivers; foundation steps (no gap)
// rank below low — dependency edges, not severity, are what pull them early.
function stepSeverityRank(s, gaps){
  const g = s.gap_ref === null ? null : gaps[s.gap_ref];
  return g && SEVERITY_RANK[g.severity] !== undefined ? SEVERITY_RANK[g.severity] : 3;
}

// Kahn's topological sort. Among the currently-ready steps (all dependencies
// already placed), the next pick is decided by: long-lead flag → severity of the
// delivered gap → ascending estimated_hours → original array index (stability).
// Throws naming the stuck refs if the queue drains before every step is placed (= cycle).
function orderPlanSteps(steps, gaps){
  const indegree = new Map(steps.map(s => [s.ref, s.depends_on.length]));
  const dependents = new Map(steps.map(s => [s.ref, []]));
  steps.forEach(s => s.depends_on.forEach(d => dependents.get(d).push(s.ref)));
  const byRef = new Map(steps.map(s => [s.ref, s]));
  const pickNext = (a, b) =>
       (b.long_lead === true) - (a.long_lead === true)
    || stepSeverityRank(a, gaps) - stepSeverityRank(b, gaps)
    || a.estimated_hours - b.estimated_hours
    || steps.indexOf(a) - steps.indexOf(b);
  let ready = steps.filter(s => indegree.get(s.ref) === 0);
  const ordered = [];
  while(ready.length){
    ready.sort(pickNext);
    const s = ready.shift();
    ordered.push(s);
    dependents.get(s.ref).forEach(ref => {
      indegree.set(ref, indegree.get(ref) - 1);
      if(indegree.get(ref) === 0) ready.push(byRef.get(ref));
    });
  }
  if(ordered.length !== steps.length){
    const stuck = steps.filter(s => !ordered.includes(s)).map(s => s.ref).join(", ");
    throw new Error("dependency cycle among: " + stuck);
  }
  return ordered.map((s, i) => ({ ...s, position: i }));
}

// Completeness by construction (Build-Plan Depth DoD): per-engine "create tags &
// fields" setup steps are INJECTED BY CODE from the engines' manifests — never
// hand-listed by the AI (hand-listing is what missed review-received). Runs between
// shape validation and the topological sort, so injected refs order like any step.
// Each unique tag/field is created by the FIRST gap whose manifest mentions it
// (dedupe by exact name); every automation step then depends on each injected step
// that owns one of its gap's items — setup-before-automation made automatic, with
// cross-engine edges when one engine creates a tag another requires. A routed
// engine with NO manifest gets {tbd:true} — visible, never silently setup-free.
function manifestItemKeys(m){
  return [...new Set([...(m.creates_tags || []), ...(m.requires_tags || [])])].map(t => "tag:" + t)
    .concat((m.requires_fields || []).map(f => "field:" + f.name));
}

function injectManifestSetupSteps(p, gaps, sweep){
  const owner = new Map();   // "tag:X" / "field:Y" → ref of the injected step that creates it
  const injected = [];
  const taken = new Set(p.steps.map(s => s.ref));
  sweep.forEach((sw, i) => {
    if(!sw.manifest) return;
    let ref = "mf" + i;
    while(taken.has(ref)) ref += "_";   // the AI owns the s* namespace but nothing stops it emitting "mf0"
    taken.add(ref);
    const mine = manifestItemKeys(sw.manifest).filter(k => !owner.has(k));
    mine.forEach(k => owner.set(k, ref));
    if(!mine.length) return;   // every item already owned by an earlier engine's setup step
    injected.push({
      ref, agent: "setup", mode: null, gap_ref: i, long_lead: false, injected: "manifest",
      title: `Create tags & fields — ${gaps[i].title}`,
      detail: `Generated from the engine's manifest: these ${mine.length} tag/field item${mine.length === 1 ? "" : "s"} must exist before the engine's workflows are built.`,
      checklist: mine.map(k => k.startsWith("tag:")
        ? "Create tag: " + k.slice(4)
        : (fld => `Create field: ${fld.name} (${fld.type})`)((sw.manifest.requires_fields || []).find(f => "field:" + f.name === k)))
        .concat(["Verify each item exists on a test contact"]),
      estimated_hours: 0.5, depends_on: [], manifest: sw.manifest,
    });
  });
  p.steps.forEach(s => {
    if(s.agent !== "automation" || s.gap_ref === null || !sweep[s.gap_ref]) return;
    const m = sweep[s.gap_ref].manifest;
    if(!m){ s.manifest = { tbd: true }; return; }
    const deps = [...new Set(manifestItemKeys(m).map(k => owner.get(k)).filter(Boolean))];
    s.depends_on = [...new Set([...s.depends_on, ...deps])];
  });
  p.steps.push(...injected);
}

// raw AI text → validated, code-completed, deterministically ordered draft plan.
// Throws with a specific message on any contract violation — the caller
// retries generation ONCE on failure and never saves an invalid graph.
function parseAndOrderPlan(raw, gaps, sweep){
  let p;
  try{ p = JSON.parse(raw.replace(/```json|```/g, "").trim()); }
  catch(e){ throw new Error("AI returned invalid JSON"); }
  validatePlanShape(p, gaps);
  p.steps.forEach(s => { s.depends_on = [...new Set(s.depends_on)]; });  // dupes would corrupt indegree counts
  injectManifestSetupSteps(p, gaps, sweep);   // after validation (AI steps only), before the sort (injected refs order like any step)
  const steps = orderPlanSteps(p.steps, gaps).map(s => ({
    ...s, title: s.title.trim(), detail: s.detail.trim(), checklist: s.checklist.map(c => c.trim()),
  }));
  // coverage counts AUTOMATION steps only — an injected setup step must never mask a missing engine step
  const covered = new Set(steps.filter(s => s.agent === "automation").map(s => s.gap_ref).filter(r => r !== null));
  const warnings = gaps.map((g, i) => covered.has(i) ? null : `Accepted gap "${g.title}" has no step delivering it.`).filter(Boolean);
  return {
    title: p.title.trim(), summary: p.summary.trim(),
    scope_flags: p.scope_flags.map(f => f.trim()).filter(Boolean),
    steps, warnings,
  };
}

/* ---- generate / save / load ---- */
function setBuildPlanMsg(t){ S.buildPlan.msg = t; const el = document.getElementById("buildplan-msg"); if(el) el.textContent = t; }

// The planner reads only accepted gaps — selection is set on the Finalize subtab.
async function loadAcceptedGaps(clientId){
  const { data, error } = await sb.from("gaps").select("*")
    .eq("client_id", clientId).eq("validation_status", "validated").eq("selection", "accepted")
    .order("sort_order");
  if(error) throw new Error("could not load accepted gaps: " + error.message);
  return data || [];
}

// Retry-once wiring: ONLY a contract violation (parseAndOrderPlan throw) earns the
// retry, with the named violation fed back so the second attempt can fix it.
// Transport/proxy errors from ai() propagate immediately — retrying those blind
// just doubles cost on an outage.
// Retry feedback names the REAL problem: a truncation retry asks for concision
// (dropping steps is not allowed); a contract violation asks for the specific fix.
function planRetryFeedback(err){
  return /truncated/.test(err.message)
    ? "Your previous attempt was cut off at the output-token limit before the JSON completed. Regenerate the COMPLETE plan more concisely — shorter detail sentences, tighter checklist phrasing. Do NOT drop steps, checklists, or dependency edges to save space."
    : `Your previous attempt violated the output contract — ${err.message}. Regenerate the complete corrected JSON.`;
}

async function generatePlanDraft(system, userMsg, gaps, sweep){
  let raw;
  try{
    raw = await ai({ system, messages: [{ role:"user", content: userMsg }], max_tokens: 32000 });
    return parseAndOrderPlan(raw, gaps, sweep);
  }catch(e1){
    if(/AI request failed/.test(e1.message)) throw e1;   // transport/proxy error — retrying blind just doubles cost
    raw = await ai({ system, messages: [{ role:"user", content: userMsg + "\n\n" + planRetryFeedback(e1) }], max_tokens: 32000 });
    try{ return parseAndOrderPlan(raw, gaps, sweep); }
    catch(e2){ throw new Error(`plan failed validation twice (first: ${e1.message}; then: ${e2.message})`); }
  }
}

async function generateBuildPlan(){
  if(S.buildPlan.generating) return;
  S.buildPlan.generating = true; setBuildPlanMsg("Generating plan…"); renderAutomation();
  try{
    const gaps = await loadAcceptedGaps(S.activeClientId);
    if(!gaps.length) throw new Error("no accepted gaps — validate gaps here, then mark them accepted (Gap Report) first");
    const sweep = await sweepAcceptedGaps(gaps);   // the three-way routing, before the main generation
    const hasMode2 = sweep.some(sw => sw.route === "formulate");
    setBuildPlanMsg("Sweep done — generating plan…");
    S.buildPlan.draft = await generatePlanDraft(buildPlanSystemPrompt(hasMode2), buildPlanUserMessage(gaps, sweep), gaps, sweep);
    attachSweepToDraft(S.buildPlan.draft, sweep);  // artifacts + mode override land by code, never via the plan JSON
    S.buildPlan.draftGaps = gaps;   // the exact list the draft's gap_refs index into — frozen with the draft
    setBuildPlanMsg("Draft ready — review below, then save.");
  }catch(e){
    console.error("generateBuildPlan error:", e);
    setBuildPlanMsg("Generation failed: " + e.message);
  }
  S.buildPlan.generating = false; renderAutomation();
}

// Draft steps → build_steps rows. Local refs become real UUIDs minted client-side,
// so depends_on UUID[] resolves inside ONE atomic batch insert.
function draftStepRows(draft, gaps, planId, op){
  const idByRef = Object.fromEntries(draft.steps.map(s => [s.ref, crypto.randomUUID()]));
  return draft.steps.map(s => ({
    id: idByRef[s.ref], build_plan_id: planId, operator_id: op,
    gap_id: s.gap_ref === null ? null : gaps[s.gap_ref].id,
    agent: s.agent, mode: s.mode,
    matched_engine: s.gap_ref === null ? null : (gaps[s.gap_ref].matched_engine || null),
    title: s.title, detail: s.detail,
    notes: null,   // operator-typed text only — the auto-generated story lives in deployment (split DoD)
    checklist: s.checklist.map(t => ({ text: t, done: false })),
    manifest: s.manifest || null, workflow: s.workflow || null,   // Build-Plan Depth (migration 008)
    deployment: s.carries_artifacts && draft.sweep && s.gap_ref !== null && draft.sweep[s.gap_ref]
      ? composeStepDeployment(draft.sweep[s.gap_ref], s.changes_note) : null,   // migration 009
    estimated_hours: s.estimated_hours, status: "queued",
    depends_on: s.depends_on.map(r => idByRef[r]),
    position: s.position,
  }));
}

// Two writes: parent plan, then ALL steps as one batch insert (single statement —
// atomic, so steps are all-or-nothing). The partial-failure window is between the
// two writes: plan row in, steps failed → delete the plan row (build_steps cascade).
async function saveBuildPlan(){
  const d = S.buildPlan.draft;
  if(!d || S.buildPlan.saving) return;
  S.buildPlan.saving = true; setBuildPlanMsg("Saving…"); renderAutomation();
  try{
    const { data: plan, error: planErr } = await sb.from("build_plans")
      .insert({ operator_id: S.user.id, client_id: S.activeClientId, title: d.title, summary: d.summary })
      .select().single();
    if(planErr || !plan) throw new Error("plan insert failed: " + (planErr ? planErr.message : "no row returned"));

    const rows = draftStepRows(d, S.buildPlan.draftGaps, plan.id, S.user.id);
    const { data: steps, error: stepErr } = await sb.from("build_steps").insert(rows).select();
    if(stepErr || !steps || steps.length !== rows.length){
      await rollbackBuildPlan(plan.id, stepErr ? stepErr.message : `expected ${rows.length} rows back, got ${steps ? steps.length : 0}`);
      S.buildPlan.saving = false; renderAutomation(); return;
    }
    S.buildPlan.plan = plan;
    S.buildPlan.steps = steps.slice().sort((a, b) => a.position - b.position);
    S.buildPlan.draft = null; S.buildPlan.draftGaps = null;   // draft is spent — the saved rows are now the truth
    setBuildPlanMsg("Plan saved ✓");
  }catch(e){
    console.error("saveBuildPlan error:", e);
    setBuildPlanMsg("Save failed: " + e.message + " — nothing was saved, draft kept.");
  }
  S.buildPlan.saving = false; renderAutomation();
}

// Deleting the plan row cascades to any inserted build_steps (FK ON DELETE CASCADE),
// so one verified delete restores the pre-save state. The draft is kept either way.
async function rollbackBuildPlan(planId, why){
  const { error } = await sb.from("build_plans").delete().eq("id", planId);
  setBuildPlanMsg(error
    ? `Save failed (${why}) AND rollback failed (${error.message}) — orphaned plan ${planId}, remove it in Supabase. Draft kept.`
    : `Save failed: ${why}. Rolled back — nothing was saved. Draft kept; try again.`);
}

// Latest plan per client + its steps in topological position order.
async function loadBuildPlanData(clientId){
  try{
    const { data: plans, error } = await sb.from("build_plans").select("*")
      .eq("client_id", clientId).order("created_at", { ascending: false }).limit(1);
    if(error) throw new Error(error.message);
    S.buildPlan.plan = (plans && plans[0]) || null;
    S.buildPlan.steps = [];
    if(S.buildPlan.plan){
      const { data: steps, error: e2 } = await sb.from("build_steps").select("*")
        .eq("build_plan_id", S.buildPlan.plan.id).order("position");
      if(e2) throw new Error(e2.message);
      S.buildPlan.steps = steps || [];
    }
  }catch(e){ setBuildPlanMsg("Load failed: " + e.message); }
  S.buildPlan.loaded = true;
  renderAutomation();
}

/* ---- Finalize subtab: the gap-finalization decision surface ----
   Bridge between the gap report and the build plan. Reads validated gaps,
   writes gaps.selection (proposed | accepted | declined) — the one selection
   state that drives BOTH the proposal and the build plan. Dark by design:
   this is the presentation-adjacent surface. */
const BAND_RANGES = { simple:[500,1000], standard:[1500,3000], complex:[3500,6000] };

function finSplit(){
  const validated = S.automation.gaps.filter(g => g.validation_status === "validated");
  return {
    validated,
    pending: S.automation.gaps.filter(g => g.validation_status === "pending").length,
    accepted: validated.filter(g => g.selection === "accepted"),
    undecided: validated.filter(g => g.selection !== "accepted" && g.selection !== "declined"),
  };
}

function finTotalsLine(accepted){
  if(!accepted.length) return "no gaps accepted yet";
  const hours = accepted.reduce((t, g) => t + (g.estimated_hours || 0), 0);
  let lo = 0, hi = 0, plus = false;
  accepted.forEach(g => {
    const r = BAND_RANGES[g.band];
    if(r){ lo += r[0]; hi += r[1]; if(g.band === "complex") plus = true; }
  });
  const k = n => "$" + (n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,"") + "k" : n);
  return `≈ ${hours}h internal` + (lo ? ` · ${k(lo)}–${k(hi)}${plus ? "+" : ""} band value` : "");
}

function renderFinalizeBar(f){
  const decided = f.validated.length - f.undecided.length;
  const armed = f.accepted.length > 0 && f.undecided.length === 0;
  const pct = f.validated.length ? Math.round(decided / f.validated.length * 100) : 0;
  const hint = f.undecided.length
    ? `${f.undecided.length} gap${f.undecided.length === 1 ? "" : "s"} undecided`
    : "accept at least one gap";
  return `
    <div class="fin-bar">
      <div>
        <div class="fin-count">${f.accepted.length} / ${f.validated.length}<small>accepted</small></div>
        <div class="fin-totals">${esc(finTotalsLine(f.accepted))}</div>
      </div>
      <div class="fin-right">
        ${armed ? "" : `<span class="fin-hint">${esc(hint)}</span>`}
        <button class="fin-cta ${armed ? "armed" : "idle"}" ${armed ? `onclick="finalizeToPlan()"` : "disabled"}>Generate build plan →</button>
      </div>
      <div class="fin-bar-meter"><i style="width:${pct}%"></i></div>
    </div>`;
}

function finalizeToPlan(){
  S.automation.tab = "plan";
  renderAutomation();
  // fresh client state loads first; generation only auto-starts on a truly empty plan slate
  if(S.buildPlan.loaded && !S.buildPlan.plan && !S.buildPlan.draft && !S.buildPlan.generating) generateBuildPlan();
}

function setFinalizeMsg(t){ S.automation.finMsg = t; const el = document.getElementById("finalize-msg"); if(el) el.textContent = t; }

// One tap = one verified write. Clicking the already-selected side reverts to
// proposed (built-in undo). UPDATE never re-stamps operator_id (RLS covers it);
// .select().single() forces verification and we re-render from the returned row.
async function setGapSelection(gapId, target){
  const g = S.automation.gaps.find(x => x.id === gapId);
  if(!g || S.automation.finBusy[gapId] || S.automation.finBulkBusy) return;
  const selection = g.selection === target ? "proposed" : target;
  S.automation.finBusy[gapId] = true; renderAutomation();
  const { data, error } = await sb.from("gaps").update({ selection }).eq("id", gapId).select().single();
  delete S.automation.finBusy[gapId];
  if(error){ setFinalizeMsg("Selection failed: " + error.message); renderAutomation(); return; }
  Object.assign(g, data);                 // trust the persisted row, not the local patch
  setFinalizeMsg("");
  renderAutomation();
}

// Bulk write: one UPDATE ... IN(ids) with a returned-count check. A short count
// means RLS or drift ate rows — surface it and reload from DB truth, never guess.
async function bulkSetSelection(ids, selection, label){
  if(!ids.length || S.automation.finBulkBusy) return;
  S.automation.finBulkBusy = true; renderAutomation();
  const { data, error } = await sb.from("gaps").update({ selection }).in("id", ids).select();
  S.automation.finBulkBusy = false;
  if(error || !data || data.length !== ids.length){
    setFinalizeMsg(`${label} failed: ${error ? error.message : `expected ${ids.length} rows back, got ${data ? data.length : 0}`} — reloading from database.`);
    S.automation.loaded = false; renderAutomation();
    return;
  }
  data.forEach(row => { const g = S.automation.gaps.find(x => x.id === row.id); if(g) Object.assign(g, row); });
  setFinalizeMsg(label + " ✓");
  renderAutomation();
}

function acceptAllGaps(){ const f = finSplit(); bulkSetSelection(f.validated.filter(g => g.selection !== "accepted").map(g => g.id), "accepted", "Accept all"); }
function declineRemainingGaps(){ const f = finSplit(); bulkSetSelection(f.undecided.map(g => g.id), "declined", "Decline remaining"); }
function resetAllSelections(){ const f = finSplit(); bulkSetSelection(f.validated.filter(g => g.selection === "accepted" || g.selection === "declined").map(g => g.id), "proposed", "Reset"); }

function renderFinCard(g){
  const state = g.selection === "accepted" ? "accepted" : g.selection === "declined" ? "declined" : "proposed";
  const badges = [
    g.severity || "medium",
    g.matched_engine || (g.is_new_template ? "new template" : null),
    g.band, g.estimated_hours != null ? g.estimated_hours + "h" : null,
  ].filter(Boolean).map(b => `<span class="fin-badge">${esc(String(b))}</span>`).join("");
  return `
    <div class="fin-card ${state}${S.automation.finBusy[g.id] ? " busy" : ""}">
      <div class="fin-card-top">
        <div class="fin-title">${esc(g.title)}</div>
        <div class="fin-seg" role="group" aria-label="Selection for ${esc(g.title)}">
          <button class="${state === "accepted" ? "on-accept" : ""}" onclick="setGapSelection('${g.id}','accepted')">Accept</button>
          <button class="${state === "declined" ? "on-decline" : ""}" onclick="setGapSelection('${g.id}','declined')">Decline</button>
        </div>
      </div>
      ${badges ? `<div class="fin-badges">${badges}</div>` : ""}
      ${g.problem ? `<div class="fin-problem">${esc(g.problem)}</div>` : ""}
    </div>`;
}

function renderFinalizeBody(){
  const body = document.getElementById("automation-body");
  if(!S.automation.loaded){ body.innerHTML = `<div class="audit-empty">Loading gaps…</div>`; loadAutomationData(S.activeClientId); return; }
  const f = finSplit();
  const bulkDis = S.automation.finBulkBusy ? "disabled" : "";
  body.innerHTML = `
    <div class="fin-surface"><div class="fin-col">
      ${renderFinalizeBar(f)}
      ${f.validated.length ? `
        <div class="fin-bulk">
          <button onclick="acceptAllGaps()" ${bulkDis}>Accept all</button>
          <button onclick="declineRemainingGaps()" ${bulkDis || (f.undecided.length ? "" : "disabled")}>Decline remaining</button>
          <button onclick="resetAllSelections()" ${bulkDis}>Reset all to proposed</button>
        </div>
        <div id="fin-list">${f.validated.map(renderFinCard).join("")}</div>`
        : `<div class="fin-empty">No validated gaps yet — qualify gaps on the Feasibility tab first.</div>`}
      ${f.pending ? `<div class="fin-note">${f.pending} gap${f.pending === 1 ? " is" : "s are"} still awaiting feasibility — assess ${f.pending === 1 ? "it" : "them"} on the Feasibility tab if ${f.pending === 1 ? "it's" : "they're"} in scope.</div>` : ""}
      <div class="fin-note" id="finalize-msg">${esc(S.automation.finMsg)}</div>
    </div></div>`;
}

/* ---- Build-plan subtab UI ---- */
function renderBuildPlanBody(){
  const body = document.getElementById("automation-body");
  if(!S.buildPlan.loaded){ body.innerHTML = `<div class="audit-empty">Loading build plan…</div>`; loadBuildPlanData(S.activeClientId); return; }
  // precedence: a saved plan is the truth; a draft only shows before any save
  const inner = S.buildPlan.plan ? renderSavedPlan() : S.buildPlan.draft ? renderDraftReview() : renderPlanEmpty();
  body.innerHTML = inner + `<div class="msg" id="buildplan-msg" style="margin-top:10px">${esc(S.buildPlan.msg)}</div>`;
  autoSizeNotes();
}

// Scroller fix: the notes content (review flag / spec / deployment dumps) lays out
// full-height instead of scrolling inside a 64px box. Runs after every plan render;
// the textarea's own oninput keeps it growing while the operator types (saveStepNotes
// intentionally doesn't re-render). resize:vertical still allows manual shrinking.
function autoSizeNotes(){
  document.querySelectorAll("#automation-body textarea.notes").forEach(t => {
    t.style.height = "auto"; t.style.height = (t.scrollHeight + 2) + "px";
  });
}

function renderPlanEmpty(){
  return `
    <div class="card">
      <div class="phase-t">No build plan yet</div>
      <div class="msg" style="margin-bottom:12px">Generates ONE dependency-ordered plan (setup + automation steps) from this client's accepted gaps. Validate gaps on the Feasibility tab, then mark them accepted on the Finalize tab.</div>
      <button class="btn-primary" style="width:auto" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating plan…":"Generate build plan"}</button>
    </div>`;
}

/* -- draft review: warnings FIRST (look before you save), then scope flags, summary, ordered steps -- */
function renderDraftWarnings(d){
  if(!d.warnings.length) return "";
  return `
    <div class="plan-warn">
      <div class="plan-warn-title">⚠ ${d.warnings.length} accepted gap${d.warnings.length===1?"":"s"} NOT covered by this plan</div>
      ${d.warnings.map(w => `<div class="plan-warn-item">• ${esc(w)}</div>`).join("")}
      <div class="msg" style="margin-top:6px">Look before you save: regenerate, or save knowingly — some gaps are a conversation, not an automation.</div>
    </div>`;
}

function draftDepLabel(s, d){
  return s.depends_on.map(ref => { const t = d.steps.find(x => x.ref === ref); return t ? "#" + (t.position + 1) : ref; }).join(", ");
}

function stepBadges(s){
  return [s.agent, s.mode, s.needs_review ? "⚠ review · " + s.needs_review : "", s.manifest && s.manifest.tbd ? "⚠ tags/fields TBD" : "", s.long_lead ? "long-lead" : "", s.estimated_hours != null ? s.estimated_hours + "h" : ""]
    .filter(Boolean).map(b => `<span class="step-badge">${esc(String(b))}</span>`).join(" ");
}

/* -- Build-Plan Depth: expandable node workflow + manifest (draft AND saved) --
   Structured underneath, readable flow on expand (locked decision): typed
   {type, config} nodes from formulated engines get a type chip; prose-string
   steps from catalog specs render as plain STEP rows — same top-to-bottom flow.
   Expand state lives in S.buildPlan.expanded so it survives the re-renders the
   PM layer triggers (checklist toggles, status changes). */
function toggleStepDepth(key){
  S.buildPlan.expanded[key] = !S.buildPlan.expanded[key];
  renderAutomation();
}

function renderNodeRows(nodes){
  return (nodes || []).map(n => {
    if(typeof n === "string") return `<div class="wf-row"><span class="wf-chip">STEP</span><span>${esc(n)}</span></div>`;
    const chip = n.type === "condition" ? "IF" : String(n.type || "step").toUpperCase();
    let html = `<div class="wf-row"><span class="wf-chip">${esc(chip)}</span><span>${esc(n.config || "")}</span></div>`;
    if(n.type === "condition")
      html += `<div class="wf-branch"><div class="wf-branch-label">YES</div>${renderNodeRows(n.yes)}<div class="wf-branch-label">NO</div>${renderNodeRows(n.no)}</div>`;
    return html;
  }).join("");
}

/* Nested disclosure (3 levels): step depth → collapsed automation list (01 · Name)
   → automation open = final_rule + nodes IMMEDIATELY → collapsed Tests below.
   Each level keys into S.buildPlan.expanded independently ("<key>:aN", "<key>:aN:t")
   so states survive PM-layer re-renders. The .auto-head right side stays empty on
   purpose — the future per-automation "Refine / discuss" chat slots in there. */
function renderAutomationTests(a, key){
  const tests = Array.isArray(a.tests) ? a.tests : (a.tests ? [String(a.tests)] : []);
  if(!tests.length) return "";
  const tKey = key + ":t";
  const open = !!S.buildPlan.expanded[tKey];
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(tKey)}')">${open ? "▾" : "▸"} Tests (${tests.length})</button>`
    + (open ? `<div class="wf-tests">${tests.map(t => `<div class="wf-test">☐ ${esc(t)}</div>`).join("")}</div>` : "");
}

function renderAutomationBody(a, key){
  const trig = a.trigger ? `<div class="wf-row"><span class="wf-chip">TRIGGER</span><span>${esc(a.trigger.type + (a.trigger.filters && Object.keys(a.trigger.filters).length ? " — " + JSON.stringify(a.trigger.filters) : ""))}</span></div>` : "";
  return (a.final_rule ? `<div class="wf-rule">${esc(a.final_rule)}</div>` : "")
    + (a.nodes ? renderNodeRows(a.nodes) : trig + renderNodeRows(a.steps))   // typed nodes open with their own trigger node
    + renderAutomationTests(a, key);
}

function renderAutomationList(automations, key){
  return (automations || []).map((a, i) => {
    const num = String(i + 1).padStart(2, "0");
    if(typeof a === "string")   // thin spec: name-only entry, nothing to expand
      return `<div class="auto-head"><span class="auto-num">${num}</span><span class="auto-name">${esc(a)}</span></div>`;
    const aKey = `${key}:a${i}`;
    const open = !!S.buildPlan.expanded[aKey];
    return `
      <div class="auto-head">
        <button class="auto-toggle" onclick="toggleStepDepth('${escAttr(aKey)}')">${open ? "▾" : "▸"} <span class="auto-num">${num}</span> ${esc(a.name || "Untitled automation")}</button>
      </div>`
      + (open ? `<div class="auto-body">${renderAutomationBody(a, aKey)}</div>` : "");
  }).join("");
}

function renderManifestLines(m){
  if(!m) return "";
  if(m.tbd) return `<div class="mf-line">⚠ <span class="mf-k">Tags/fields TBD</span> — engine not yet deepened; no manifest in the catalog. List and create them manually before building.</div>`;
  const fields = (m.requires_fields || []).map(f => `${f.name} (${f.type})`);
  return [
    (m.creates_tags || []).length ? `<div class="mf-line"><span class="mf-k">Creates tags:</span> ${esc(m.creates_tags.join(" · "))}</div>` : "",
    (m.requires_tags || []).length ? `<div class="mf-line"><span class="mf-k">Requires tags:</span> ${esc(m.requires_tags.join(" · "))}</div>` : "",
    fields.length ? `<div class="mf-line"><span class="mf-k">Fields:</span> ${esc(fields.join(" · "))}</div>` : "",
  ].join("");
}

function renderStepDepth(s, key){
  if(!s.manifest && !s.workflow) return "";
  const open = !!S.buildPlan.expanded[key];
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(key)}')">${open ? "▾" : "▸"} Node workflow &amp; manifest</button>`
    + (open ? `<div class="depth-box">${renderManifestLines(s.manifest)}${s.workflow ? renderAutomationList(s.workflow, key) : ""}</div>` : "");
}

/* -- Deployment guide section (split DoD): READ-ONLY, collapsed by default,
   structured labeled blocks — never a raw dump, no inputs anywhere. The ⚠ REVIEW
   flag sits inline on the toggle so it stays visible without opening. -- */
function renderDeploymentLines(v, depth = 0){
  const pad = depth ? ` style="margin-left:${depth * 14}px"` : "";
  if(Array.isArray(v)) return v.map(x => `<div class="mf-line"${pad}>• ${esc(typeof x === "object" ? JSON.stringify(x) : String(x))}</div>`).join("");
  if(v && typeof v === "object")
    return Object.entries(v).map(([k, x]) =>
      (x && typeof x === "object")
        ? `<div class="mf-line"${pad}><span class="mf-k">${esc(k)}:</span></div>` + renderDeploymentLines(x, depth + 1)
        : `<div class="mf-line"${pad}><span class="mf-k">${esc(k)}:</span> ${esc(String(x))}</div>`
    ).join("");
  return `<div class="mf-line"${pad}>${esc(String(v))}</div>`;
}

function renderDeploymentBlock(label, v){
  return v == null ? "" : `<div class="dep-tier">${esc(label)}</div>` + renderDeploymentLines(v);
}

function renderDeploymentBody(dep){
  return (dep.route === "dropin" ? `<div class="mf-line">Drop-in engine — deploy as-is.</div>` : "")
    + renderDeploymentBlock("Changes made", dep.changes_note)
    + renderDeploymentBlock("Parameter values", dep.parameter_values)
    + renderDeploymentBlock("Branding", dep.tiers && dep.tiers.branding)
    + renderDeploymentBlock("Business rules", dep.tiers && dep.tiers.business_rules)
    + renderDeploymentBlock("Never touch", dep.tiers && dep.tiers.never_touch)
    + renderDeploymentBlock("Client overrides", dep.overrides)
    + renderDeploymentBlock("Engine spec", dep.spec_extras);
}

function renderStepDeployment(dep, key){
  if(!dep) return "";
  const dKey = key + ":d";
  const open = !!S.buildPlan.expanded[dKey];
  const flag = dep.needs_review === "parameterize" ? `<span class="dep-review">⚠ REVIEW — parameterized: confirm changes</span>`
             : dep.needs_review === "formulate"    ? `<span class="dep-review">⚠ REVIEW — formulated: unproven${dep.seeded_from ? " (seeded from " + esc(dep.seeded_from) + " stub)" : ""}</span>` : "";
  return `<button class="depth-toggle" onclick="toggleStepDepth('${escAttr(dKey)}')">${open ? "▾" : "▸"} Deployment guide ${flag}</button>`
    + (open ? `<div class="depth-box">${renderDeploymentBody(dep)}</div>` : "");
}

// "Names surfaced UP FRONT" (locked requirement): the pre-build checklist card —
// every tag/field the plan's engines need, unioned from the steps' manifests,
// plus the engines whose manifests are TBD. Works on draft steps (attached) and
// saved rows (persisted manifest column) alike.
function renderManifestCard(steps){
  const manifests = steps.filter(s => s.manifest && !s.manifest.tbd).map(s => s.manifest);
  const tbdSteps = steps.filter(s => s.manifest && s.manifest.tbd);
  if(!manifests.length && !tbdSteps.length) return "";
  const tags = [...new Set(manifests.flatMap(m => [...(m.creates_tags || []), ...(m.requires_tags || [])]))];
  const fieldByName = new Map();
  manifests.flatMap(m => m.requires_fields || []).forEach(f => { if(!fieldByName.has(f.name)) fieldByName.set(f.name, f); });
  const fields = [...fieldByName.values()].map(f => `${f.name} (${f.type})`);
  const tbdTitles = [...new Set(tbdSteps.map(s => s.title))];
  return `
    <div class="card">
      <div class="phase-h">Pre-build manifest — create these before building</div>
      ${tags.length ? `<div class="mf-line"><span class="mf-k">Tags (${tags.length}):</span> ${esc(tags.join(" · "))}</div>` : ""}
      ${fields.length ? `<div class="mf-line"><span class="mf-k">Fields (${fields.length}):</span> ${esc(fields.join(" · "))}</div>` : ""}
      ${tbdTitles.length ? `<div class="mf-line">⚠ <span class="mf-k">TBD:</span> ${esc(tbdTitles.join(" · "))} — engine${tbdTitles.length === 1 ? "" : "s"} not yet deepened; tags/fields not generated.</div>` : ""}
    </div>`;
}

// Parameterize steps carry the editable "changes made" note (the drop-in vs
// parameterize signal — drop-in steps have none). Edits stay on the draft step
// and are persisted into notes at save.
function renderDraftChangesNote(s){
  if(s.needs_review !== "parameterize" || !s.carries_artifacts) return "";
  return `
    <div class="msg" style="margin:6px 0 4px">Changes made — confirm (editable):</div>
    <textarea oninput="updateDraftChangesNote('${esc(s.ref)}', this.value)">${esc(s.changes_note || "")}</textarea>`;
}

function renderDraftStep(s, d){
  const gap = s.gap_ref === null ? null : S.buildPlan.draftGaps[s.gap_ref];
  return `
    <div class="gap-card ${gap ? "sev-" + esc(gap.severity || "medium") : ""}">
      <div class="gap-top">
        <div style="flex:1;font-size:14px;font-weight:600">${s.position + 1}. ${esc(s.title)}</div>
        ${stepBadges(s)}
      </div>
      <div class="gap-body">
        ${gap ? `<div class="msg" style="margin-bottom:4px">Delivers: ${esc(gap.title)}</div>` : ""}
        ${s.depends_on.length ? `<div class="msg" style="margin-bottom:4px">After: ${esc(draftDepLabel(s, d))}</div>` : ""}
        <div style="font-size:13px;margin:6px 0">${esc(s.detail)}</div>
        ${renderDraftChangesNote(s)}
        ${s.checklist.length ? `<div class="msg">${s.checklist.map(c => "☐ " + esc(c)).join("<br>")}</div>` : ""}
        ${renderStepDepth(s, s.ref)}
        ${renderStepDeployment(draftStepDeployment(s), s.ref)}
      </div>
    </div>`;
}

function renderDraftReview(){
  const d = S.buildPlan.draft;
  const hours = d.steps.reduce((t, s) => t + s.estimated_hours, 0);
  return renderDraftWarnings(d)
    + (d.scope_flags.length ? `
      <div class="card" style="border-left:3px solid #EF9F27">
        <div class="phase-h">Scope flags — surfaced by the planner</div>
        ${d.scope_flags.map(f => `<div class="msg">• ${esc(f)}</div>`).join("")}
      </div>` : "")
    + `<div class="card">
        <div class="phase-h">Draft plan — NOT saved yet</div>
        <div class="phase-t">${esc(d.title)}</div>
        <div class="msg">${esc(d.summary)}</div>
        <div class="msg" style="margin-top:6px">${d.steps.length} steps · ~${hours}h internal cost-to-deliver</div>
      </div>`
    + renderManifestCard(d.steps)
    + d.steps.map(s => renderDraftStep(s, d)).join("")
    + `<div class="btn-row" style="margin-top:14px">
        <button class="btn-primary" style="width:auto" onclick="saveBuildPlan()" ${S.buildPlan.saving?"disabled":""}>${S.buildPlan.saving?"Saving…":"Save plan"}</button>
        <button class="btn-ghost" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating…":"Regenerate"}</button>
        <button class="btn-ghost" onclick="discardDraft()">Discard draft</button>
      </div>`;
}

function discardDraft(){
  S.buildPlan.draft = null; S.buildPlan.draftGaps = null;
  setBuildPlanMsg("Draft discarded — nothing was saved.");
  renderAutomation();
}

/* -- saved plan: per-step status / checklist / notes, every write verified -- */
function savedDepLabel(s){
  const byId = new Map(S.buildPlan.steps.map(x => [x.id, x]));
  return s.depends_on.map(id => { const t = byId.get(id); return t ? `#${t.position + 1}${t.status === "done" ? " ✓" : ""}` : "?"; }).join(", ");
}

function renderSavedStep(s){
  const statusOpts = ["queued","building","testing","done"].map(v => `<option value="${v}" ${s.status===v?"selected":""}>${v}</option>`).join("");
  const checklist = (s.checklist || []).map((c, i) => `
    <label style="display:block;font-size:13px;margin:2px 0">
      <input type="checkbox" ${c.done?"checked":""} onchange="toggleStepChecklist('${s.id}',${i})"> ${c.done ? `<s>${esc(c.text)}</s>` : esc(c.text)}
    </label>`).join("");
  return `
    <div class="gap-card">
      <div class="gap-top">
        <div style="flex:1;font-size:14px;font-weight:600">${s.position + 1}. ${esc(s.title)}</div>
        ${stepBadges(s)}
        <select onchange="setStepStatus('${s.id}', this.value)">${statusOpts}</select>
      </div>
      <div class="gap-body">
        ${s.depends_on.length ? `<div class="msg" style="margin-bottom:6px">After: ${esc(savedDepLabel(s))}</div>` : ""}
        ${s.detail ? `<div style="font-size:13px;margin-bottom:8px">${esc(s.detail)}</div>` : ""}
        ${checklist ? `<div style="margin-bottom:8px">${checklist}</div>` : ""}
        ${renderStepDepth(s, s.id)}
        ${renderStepDeployment(s.deployment, s.id)}
        <label>Notes</label>
        <textarea class="notes" oninput="this.style.height='auto';this.style.height=(this.scrollHeight+2)+'px'" onchange="saveStepNotes('${s.id}', this.value)">${esc(s.notes || "")}</textarea>
      </div>
    </div>`;
}

function renderSavedPlan(){
  const p = S.buildPlan.plan, steps = S.buildPlan.steps;
  const done = steps.filter(s => s.status === "done").length;
  return `
    <div class="card">
      <div class="phase-h">Build plan · ${esc(p.status || "")}</div>
      <div class="phase-t">${esc(p.title || "Untitled plan")}</div>
      <div class="msg">${esc(p.summary || "")}</div>
      <div class="msg" style="margin-top:6px">${done} of ${steps.length} steps done</div>
    </div>`
    + renderManifestCard(steps)
    + steps.map(renderSavedStep).join("");
}

async function setStepStatus(stepId, status){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  // completed_at is the Phase D hinge (SOP-gen + ledger): stamped on done, cleared on any move away
  const patch = { status, completed_at: status === "done" ? new Date().toISOString() : null };
  const { data, error } = await sb.from("build_steps").update(patch).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Status update failed: " + error.message); renderAutomation(); return; }
  Object.assign(s, data);
  setBuildPlanMsg(`Step ${s.position + 1} → ${data.status} ✓`);
  renderAutomation();
}

async function toggleStepChecklist(stepId, idx){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const list = (s.checklist || []).map((c, i) => i === idx ? { ...c, done: !c.done } : c);
  const { data, error } = await sb.from("build_steps").update({ checklist: list }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Checklist update failed: " + error.message); renderAutomation(); return; }  // rerender snaps the checkbox back
  Object.assign(s, data);
  renderAutomation();
}

async function saveStepNotes(stepId, text){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const { data, error } = await sb.from("build_steps").update({ notes: text.trim() || null }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Notes save failed: " + error.message); return; }
  Object.assign(s, data);
  setBuildPlanMsg("Notes saved ✓");   // no rerender — keeps focus/scroll; local row already mirrors the DB
}

/* ============================================================
   BOOT
============================================================ */
sb.auth.onAuthStateChange((_e, session) => { if(session && document.getElementById("app").style.display === "none") initApp(); });
initApp();
</script>
