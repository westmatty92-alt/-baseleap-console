<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseleap Console</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --midnight:#0D1F2D; --depth:#1A1A2E; --volt:#00D4A0; --run:#00A878; --canvas:#F4F5F0;
    --ink:#0D1F2D; --muted:#5B6B73; --line:#E2E6E3; --surface:#FFFFFF; --bg:#F4F5F0;
    /* dark decision-surface tokens (reusable for the future console-wide dark restyle) */
    --d-line:rgba(255,255,255,.07); --d-text:rgba(237,239,242,.88); --d-text-strong:#EDEFF2; --d-muted:#9AA3AD;
    --ok:#22C55E; --err:#EF4444; --info:#6366F1;
    --radius:10px; --font:"Garet","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* Auth gate */
  #auth{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--midnight)}
  .auth-card{background:var(--surface);border-radius:16px;padding:2rem;width:340px;max-width:90vw}
  .auth-card h1{font-size:20px;color:var(--midnight);margin-bottom:4px}
  .auth-card p{color:var(--muted);font-size:13px;margin-bottom:1.25rem}
  .auth-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;font-size:14px}
  .auth-card input:focus{outline:none;border-color:var(--volt)}
  .auth-card .err{color:#C0392B;font-size:12px;margin-bottom:8px;display:none}
  .btn-primary{background:var(--volt);color:var(--midnight);border:none;padding:11px 16px;border-radius:var(--radius);font-weight:600;font-size:14px;width:100%}
  .btn-primary:hover{background:var(--run);color:#fff}

  /* App layout */
  #app{display:none;grid-template-columns:240px 1fr;height:100vh}
  .sidebar{background:var(--midnight);color:#fff;display:flex;flex-direction:column;padding:16px 12px;gap:4px}
  .brand{font-size:17px;font-weight:700;color:#fff;padding:8px 10px 16px;letter-spacing:.3px}
  .brand span{color:var(--volt)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:#B9C4CA;font-size:13px;border:none;background:none;text-align:left;width:100%}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:var(--volt);color:var(--midnight);font-weight:600}
  .nav-spacer{flex:1}
  .signout{color:#7C8B92;font-size:12px;background:none;border:none;text-align:left;padding:10px 12px}
  .signout:hover{color:#fff}

  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--line)}
  .client-switch{display:flex;align-items:center;gap:8px}
  .client-switch label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .client-switch select{padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius);font-size:13px;min-width:200px;background:var(--surface)}
  .btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:var(--radius);font-size:13px}
  .btn-ghost:hover{border-color:var(--volt)}
  .topbar-status{margin-left:auto;font-size:12px;color:var(--muted)}

  .content{flex:1;overflow-y:auto;padding:24px}
  .panel-title{font-size:18px;font-weight:600;margin-bottom:4px}
  .panel-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .placeholder{background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:48px;text-align:center;color:var(--muted)}
  .placeholder strong{color:var(--ink);display:block;margin-bottom:6px;font-size:15px}
  .empty-client{text-align:center;color:var(--muted);padding:64px 24px}

  /* Modal — hardcoded hex backgrounds (never CSS vars, per build rules) */
  .modal-overlay{position:fixed;inset:0;background:rgba(13,31,45,.55);display:none;align-items:center;justify-content:center;z-index:50}
  .modal{background:#FFFFFF;border-radius:14px;padding:1.5rem;width:380px;max-width:90vw}
  .modal h3{font-size:16px;margin-bottom:14px;color:#0D1F2D}
  .modal input,.modal select{width:100%;padding:10px 12px;border:1px solid #E2E6E3;border-radius:10px;margin-bottom:10px;font-size:14px}
  .modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

  /* Audit module */
  .subtabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)}
  .subtab{padding:8px 14px;font-size:13px;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .subtab.active{color:var(--midnight);border-bottom-color:var(--volt);font-weight:600}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .phase-h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
  .phase-t{font-size:15px;font-weight:600;margin-bottom:10px}
  .script{background:var(--midnight);color:#E2E8F0;border-radius:10px;padding:12px 14px;font-size:13px;font-style:italic;line-height:1.6;margin-bottom:10px}
  .q{font-size:13px;padding:7px 0;border-bottom:1px solid var(--line);line-height:1.5}
  .q:last-child{border-bottom:none}
  .tip{background:#EAF7F2;border:1px solid #B7E6D6;color:#0A5C45;font-size:12px;padding:9px 12px;border-radius:8px;margin-top:10px;line-height:1.5}
  .notes{width:100%;min-height:64px;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;resize:vertical;font-family:inherit;line-height:1.5;margin-top:10px}
  .notes:focus{outline:none;border-color:var(--volt)}
  textarea.capture{width:100%;min-height:220px;font-size:13px;padding:12px;border:1px solid var(--line);border-radius:10px;resize:vertical;font-family:inherit;line-height:1.6}
  textarea.capture:focus{outline:none;border-color:var(--volt)}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
  .msg{font-size:12px;color:var(--muted)}
  .gap-card{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
  .gap-top{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--canvas)}
  .gap-top input.gtitle{flex:1;border:none;background:none;font-size:14px;font-weight:600;color:var(--ink);padding:2px}
  .gap-top input.gtitle:focus{outline:none}
  .gap-top select{font-size:12px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .gap-del{border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px}
  .gap-del:hover{color:#C0392B}
  .gap-body{padding:10px 12px}
  .gap-body label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
  .gap-body textarea{width:100%;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;resize:vertical;font-family:inherit;min-height:40px;margin-bottom:8px;line-height:1.5}
  .gap-body textarea:focus{outline:none;border-color:var(--volt)}
  .sev-high{border-left:3px solid #E24B4A}
  .sev-medium{border-left:3px solid #EF9F27}
  .sev-low{border-left:3px solid #639922}
  .plan-warn{border:2px solid #E24B4A;background:rgba(226,75,74,.06);border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .plan-warn-title{color:#E24B4A;font-weight:700;font-size:14px;margin-bottom:6px}
  .plan-warn-item{color:#E24B4A;font-size:13px;margin-bottom:2px}
  .step-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--canvas);border:1px solid var(--line);color:var(--muted);white-space:nowrap}

  /* Finalize — dark decision surface (scoped to the Finalize subtab) */
  .fin-surface{margin:0 -24px -24px;padding:28px 24px 64px;background:var(--midnight);min-height:calc(100vh - 168px)}
  .fin-col{max-width:860px;margin:0 auto}
  .fin-bar{position:sticky;top:12px;z-index:5;display:flex;align-items:center;gap:18px;background:var(--depth);border:1px solid var(--d-line);border-radius:12px;padding:16px 20px 20px;box-shadow:0 10px 30px rgba(0,0,0,.35);overflow:hidden}
  .fin-bar-meter{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(0,168,120,.18)}
  .fin-bar-meter i{display:block;height:100%;background:var(--run);width:0;transition:width .25s ease}
  .fin-count{font-weight:800;font-size:28px;line-height:1.1;color:var(--d-text-strong)}
  .fin-count small{font-size:12px;font-weight:500;color:var(--d-muted);margin-left:8px;letter-spacing:.05em;text-transform:uppercase}
  .fin-totals{font-size:12px;color:var(--d-muted);margin-top:4px}
  .fin-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .fin-hint{font-size:12px;color:var(--d-muted);text-align:right}
  .fin-cta{padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;border:1px solid transparent;transition:background .2s ease,color .2s ease,border-color .2s ease;white-space:nowrap}
  .fin-cta.armed{background:var(--volt);color:var(--midnight)}
  .fin-cta.armed:hover{background:var(--run);color:#fff}
  .fin-cta.idle{background:none;border-color:var(--d-line);color:var(--d-muted);cursor:default}
  .fin-note{font-size:12px;color:var(--d-muted);margin:16px 2px 0}
  .fin-empty{color:var(--d-muted);font-size:13px;padding:40px 0;text-align:center}
  .fin-row{display:flex;align-items:center;justify-content:space-between;background:var(--depth);border:1px solid var(--d-line);border-radius:12px;padding:14px 18px;margin-top:12px;color:var(--d-text);font-size:14px}
  .fin-row span{font-size:11px;color:var(--d-muted);letter-spacing:.04em;text-transform:uppercase}
  .audit-empty{color:var(--muted);font-size:13px;padding:24px 0}
  .stack-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .stack-row label{width:150px;flex-shrink:0;font-size:12px;color:var(--muted)}
  .stack-row select,.stack-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--surface)}
  .stack-row select:focus,.stack-row input:focus{outline:none;border-color:var(--volt)}
</style>
</head>
<body>

<!-- ================= AUTH GATE ================= -->
<div id="auth">
  <div class="auth-card">
    <h1>Baseleap <span style="color:var(--volt)">Console</span></h1>
    <p>Internal agency console — sign in to continue.</p>
    <div class="err" id="auth-err"></div>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="username">
    <input type="password" id="auth-pass" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" onclick="signIn()">Sign in</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <nav class="sidebar">
    <div class="brand">Baseleap<span>.</span></div>
    <button class="nav-item" data-mod="research" onclick="switchModule('research')">Client research</button>
    <button class="nav-item active" data-mod="audit" onclick="switchModule('audit')">Audit assistant</button>
    <button class="nav-item" data-mod="automation" onclick="switchModule('automation')">Automation agent</button>
    <button class="nav-item" data-mod="report" onclick="switchModule('report')">Gap report</button>
    <button class="nav-item" data-mod="proposal" onclick="switchModule('proposal')">Proposal</button>
    <div class="nav-spacer"></div>
    <button class="signout" onclick="signOut()">Sign out</button>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="client-switch">
        <label>Client</label>
        <select id="client-select" onchange="loadClient(this.value)"></select>
      </div>
      <button class="btn-ghost" onclick="openNewClient()">+ New client</button>
      <div class="topbar-status" id="status"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ================= NEW CLIENT MODAL ================= -->
<div class="modal-overlay" id="nc-modal">
  <div class="modal">
    <h3>New client</h3>
    <input id="nc-name" placeholder="Business name *">
    <input id="nc-industry" placeholder="Industry / vertical">
    <input id="nc-website" placeholder="Website">
    <input id="nc-location" placeholder="Location (city, province)">
    <div class="row">
      <button class="btn-ghost" onclick="closeNewClient()">Cancel</button>
      <button class="btn-primary" style="width:auto" onclick="createClient()">Create</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const SUPABASE_URL = "https://qqgdzwkbuzciocnyimje.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxZ2R6d2tidXpjaW9jbnlpbWplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzQzMDQsImV4cCI6MjA5ODQxMDMwNH0.Nb4jnTwJDvKFgM2RV1cSsuPNaNJJh7PqpB1Ga-8Yss4";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============================================================
   GLOBAL STATE  (S.* is reset on every client switch)
============================================================ */
function freshAudit(){ return { tab:"guide", guideNotes:{}, captureText:"", summary:null, sessionId:null, loaded:false, analyzing:false, msg:"", stackForm:null, stackOtherFlags:{}, extracting:false }; }
function freshAutomation(){ return { tab:"gaps", loaded:false, msg:"", gaps:[], drafts:{}, assessing:{}, errors:{}, assessingAll:false, progress:"" }; }
function freshBuildPlan(){ return { loaded:false, msg:"", plan:null, steps:[], draft:null, draftGaps:null, generating:false, saving:false }; }

const S = {
  user: null,
  clients: [],
  activeClientId: null,
  activeClient: null,
  module: 'audit',
  // per-client module state — cleared by resetClientState()
  audit: freshAudit(),
  gaps: [],
  automation: freshAutomation(),
  buildPlan: freshBuildPlan(),
  report: null,
  proposal: null,
};

function resetClientState(){
  // CRITICAL: clears all loaded module data before a new client loads,
  // so client B never sees client A's audit/report. (switchBusiness discipline)
  S.audit = freshAudit();
  S.gaps = [];
  S.automation = freshAutomation();
  S.buildPlan = freshBuildPlan();
  S.report = null;
  S.proposal = null;
}

/* ============================================================
   AI WRAPPER  — always via backend proxy, never raw to Anthropic
============================================================ */
async function ai({ system, messages, model = "claude-sonnet-4-6", max_tokens = 1500 }){
  const res = await fetch("/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, messages, model, max_tokens }),
  });
  if(!res.ok){ const body = await res.json().catch(()=>null); throw new Error("AI request failed: " + res.status + (body ? " — " + JSON.stringify(body) : "")); }
  const data = await res.json();
  if(data.stop_reason === "max_tokens"){
    // A truncated response is never usable — name the real failure instead of
    // letting it surface downstream as "invalid JSON".
    console.warn(`ai(): output TRUNCATED — hit max_tokens=${max_tokens}`, "usage:", JSON.stringify(data.usage || null));
    throw new Error(`output truncated — hit the ${max_tokens}-token output cap before finishing`);
  }
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
}

/* ============================================================
   AUTH
============================================================ */
async function signIn(){
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  const err = document.getElementById("auth-err");
  err.style.display = "none";
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ err.textContent = error.message; err.style.display = "block"; return; }
  initApp();
}

async function signOut(){
  await sb.auth.signOut();
  document.getElementById("app").style.display = "none";
  document.getElementById("auth").style.display = "flex";
}

/* ============================================================
   APP INIT
============================================================ */
async function initApp(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ document.getElementById("auth").style.display = "flex"; return; }
  S.user = session.user;
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "grid";
  await loadClients();
  render();
}

/* ============================================================
   CLIENTS  (the business-switcher dropdown)
============================================================ */
async function loadClients(){
  const { data, error } = await sb
    .from("clients")
    .select("id,business_name,industry,website,location,status")
    .eq("archived", false)
    .order("business_name");
  if(error){ setStatus("Error loading clients"); return; }
  S.clients = data || [];
  const sel = document.getElementById("client-select");
  if(!S.clients.length){
    sel.innerHTML = `<option value="">No clients yet</option>`;
    S.activeClientId = null; S.activeClient = null;
    return;
  }
  sel.innerHTML = S.clients.map(c => `<option value="${c.id}">${c.business_name}</option>`).join("");
  if(!S.activeClientId) await loadClient(S.clients[0].id);
}

async function loadClient(id){
  if(!id){ S.activeClientId = null; S.activeClient = null; resetClientState(); render(); return; }
  resetClientState();                 // wipe previous client's loaded data first
  S.activeClientId = id;
  document.getElementById("client-select").value = id;
  const { data } = await sb.from("clients").select("*").eq("id", id).single();
  S.activeClient = data || null;
  // module data loads lazily inside each module when it's built
  render();
}

function openNewClient(){ document.getElementById("nc-modal").style.display = "flex"; }
function closeNewClient(){ document.getElementById("nc-modal").style.display = "none"; }

async function createClient(){
  const name = document.getElementById("nc-name").value.trim();
  if(!name){ return; }
  const row = {
    operator_id: S.user.id,            // RLS: every insert must stamp operator_id
    business_name: name,
    industry: document.getElementById("nc-industry").value.trim() || null,
    website: document.getElementById("nc-website").value.trim() || null,
    location: document.getElementById("nc-location").value.trim() || null,
  };
  const { data, error } = await sb.from("clients").insert(row).select().single();
  if(error){ setStatus("Could not create client: " + error.message); return; }
  ["nc-name","nc-industry","nc-website","nc-location"].forEach(i => document.getElementById(i).value = "");
  closeNewClient();
  await loadClients();
  await loadClient(data.id);
}

/* ============================================================
   MODULE ROUTING  (modules filled in subsequent sessions)
============================================================ */
function switchModule(mod){
  S.module = mod;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.mod === mod));
  render();
}

const MODULES = {
  research:  { title: "Client research",  sub: "Pre-call brief, auto-built from the lead form." },
  audit:     { title: "Audit assistant",  sub: "Capture the call, surface gaps, draft the diagnosis." },
  automation:{ title: "Automation agent", sub: "Feasibility gate — confirm each gap is buildable." },
  report:    { title: "Gap report",       sub: "The client-facing report, built from validated gaps." },
  proposal:  { title: "Proposal",         sub: "Scoped proposal from the gap report and a package." },
};

function render(){
  const content = document.getElementById("content");
  const m = MODULES[S.module];
  if(!S.activeClient){
    content.innerHTML = `<div class="empty-client">No client selected. Create one with <strong>+ New client</strong> to begin.</div>`;
    setStatus("");
    return;
  }
  setStatus(S.activeClient.business_name + (S.activeClient.industry ? " · " + S.activeClient.industry : ""));
  if(S.module === "audit"){ renderAudit(); return; }
  if(S.module === "automation"){ renderAutomation(); return; }
  content.innerHTML = `
    <div class="panel-title">${m.title}</div>
    <div class="panel-sub">${m.sub}</div>
    <div class="placeholder">
      <strong>${m.title} module — slot ready</strong>
      This module will be built next. The shell, client record, and AI wrapper are wired and ready for it.
    </div>`;
}

function setStatus(t){ document.getElementById("status").textContent = t; }

/* ============================================================
   MODULE 1 — AI AUDIT ASSISTANT
============================================================ */
const GUIDE = [
  { id:"pre", label:"Pre-call", title:"Pre-audit form",
    tip:"Send 24–48h before the call. Read the answers first. Use their words back to them.",
    questions:[
      "What does your current process look like when a new lead comes in?",
      "What is the most repetitive task your team does every week?",
      "Where do things most often fall through the cracks?",
      "What tools are you using right now? (everything — even spreadsheets)",
      "If your operations were completely fixed, what would that look like?"
    ]},
  { id:"open", label:"Opening", title:"Set the tone",
    tip:"Do not pitch. Open with this, then stop talking and take notes in their words.",
    script:[
      "\"Before I show you anything, I just want to understand how your business runs day to day.\"",
      "\"Walk me through what happens from the moment someone reaches out to the moment they become a paying customer.\""
    ]},
  { id:"leads", label:"Leads", title:"Lead & intake",
    tip:"If they mention a spreadsheet, note it — the clearest signal automation delivers visible value.",
    questions:[
      "Where do your leads come from right now?",
      "When a lead comes in, who sees it first and what do they do with it?",
      "How quickly does someone follow up, and how?",
      "What happens if nobody follows up that day?",
      "Have you ever lost a job because a lead didn't get a fast response?"
    ]},
  { id:"booking", label:"Booking", title:"Booking & scheduling",
    tip:"Turn their scheduling-time answer into a dollar figure for the debrief.",
    questions:[
      "How do customers currently book or schedule with you?",
      "Who manages the calendar and how do they communicate about it?",
      "What happens when someone cancels or reschedules?",
      "Do you get no-shows? What's the process when that happens?",
      "How much time per week goes to scheduling back-and-forth?"
    ]},
  { id:"ops", label:"Operations", title:"Operations & repetitive work",
    tip:"Quote the specific manual task back, in their words, during the debrief.",
    questions:[
      "Walk me through what happens after a booking is confirmed.",
      "Which steps does someone do manually every single time?",
      "What does your team spend the most time on that isn't serving a customer?",
      "If you could remove one task from your team's day tomorrow, what would it be?",
      "Do you have any automations running, or is most of it manual?"
    ]},
  { id:"followup", label:"Follow-up", title:"Follow-up & retention",
    tip:"If they do nothing post-service, frame it as uncaptured revenue — not a failure.",
    questions:[
      "What happens after a job is completed or a service delivered?",
      "Do you follow up — reviews, check-ins, offers?",
      "Do you stay in touch with past customers, or only when they reach out?"
    ]},
  { id:"gut", label:"Gut check", title:"The gut check",
    tip:"Let them articulate the cost of staying the same and the value of fixing it.",
    questions:[
      "On a scale of 1–10, how organized do your operations feel right now?",
      "What is the cost of leaving things as they are — time, missed revenue, stress?",
      "If we fixed the three biggest gaps today, what would that mean for the business?"
    ]},
  { id:"debrief", label:"Debrief", title:"Reflect it back",
    tip:"Reflect back before proposing anything. When they say \"yes, exactly\" — trust is built.",

      "[List their gaps back, in their language]",
      "\"I'll put together a gap report and roadmap, then walk you through exactly what I'd fix and in what order.\""
    ]}
];

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;"); }
function setAuditMsg(t){ S.audit.msg = t; const el = document.getElementById("audit-msg"); if(el) el.textContent = t; }

function renderAudit(){
  const content = document.getElementById("content");
  if(!S.audit.loaded){ content.innerHTML = `<div class="audit-empty">Loading audit…</div>`; loadAuditData(S.activeClientId); return; }
  const tabs = [["guide","Guide"],["capture","Capture"],["gaps","Gaps"],["stack","Stack"]];
  content.innerHTML = `
    <div class="panel-title">Audit assistant</div>
    <div class="panel-sub">${esc(S.activeClient.business_name)}${S.activeClient.industry ? " · " + esc(S.activeClient.industry) : ""}</div>
    <div class="subtabs">
      ${tabs.map(([id,lbl]) => `<button class="subtab ${S.audit.tab===id?"active":""}" onclick="auditTab('${id}')">${lbl}${id==="gaps"&&S.gaps.length?` (${S.gaps.length})`:""}</button>`).join("")}
    </div>
    <div id="audit-body"></div>`;
  renderAuditBody();
}

function auditTab(t){ S.audit.tab = t; renderAudit(); }

function renderAuditBody(){
  const body = document.getElementById("audit-body");
  if(S.audit.tab === "guide") body.innerHTML = renderGuide();
  else if(S.audit.tab === "capture") body.innerHTML = renderCapture();
  else if(S.audit.tab === "gaps") body.innerHTML = renderGaps();
  else{
    if(!S.audit.stackForm) S.audit.stackForm = hydrateStack(S.activeClient.current_stack);
    body.innerHTML = renderStack();
  }
}

function renderGuide(){
  return GUIDE.map(p => `
    <div class="card">
      <div class="phase-h">${esc(p.label)}</div>
      <div class="phase-t">${esc(p.title)}</div>
      ${p.script ? `<div class="script">${p.script.map(l => esc(l)).join("<br><br>")}</div>` : ""}
      ${p.questions ? p.questions.map(q => `<div class="q">${esc(q)}</div>`).join("") : ""}
      <div class="tip">${esc(p.tip)}</div>
      <textarea class="notes" placeholder="Notes — what did they say? (in their words)" onchange="S.audit.guideNotes['${p.id}']=this.value">${esc(S.audit.guideNotes[p.id]||"")}</textarea>
    </div>`).join("");
}

function renderCapture(){
  return `
    <div class="card">
      <div class="phase-t">Transcript / notes</div>
      <p class="panel-sub">Paste the Zoom or Google Meet transcript, or any rough notes. This is combined with your Guide notes for the analysis.</p>
      <textarea class="capture" placeholder="Paste transcript or notes here…" onchange="S.audit.captureText=this.value">${esc(S.audit.captureText)}</textarea>
    </div>`;
}

function renderGaps(){
  const sevSel = (i,v) => ["high","medium","low"].map(s => `<option value="${s}" ${v===s?"selected":""}>${s}</option>`).join("");
  const cards = S.gaps.map((g,i) => `
    <div class="gap-card sev-${esc(g.severity||"medium")}">
      <div class="gap-top">
        <input class="gtitle" value="${escAttr(g.title)}" onchange="editGap(${i},'title',this.value)">
        <select onchange="editGap(${i},'severity',this.value);renderAudit()">${sevSel(i,g.severity||"medium")}</select>
        <button class="gap-del" title="Remove" onclick="deleteGap(${i})">×</button>
      </div>
      <div class="gap-body">

        <textarea onchange="editGap(${i},'problem',this.value)">${esc(g.problem)}</textarea>
        <label>Cost of leaving it</label>
        <textarea onchange="editGap(${i},'cost',this.value)">${esc(g.cost)}</textarea>
      </div>

  return `
    <div class="card">
      <div class="phase-t">Identified gaps</div>

      <div class="btn-row">
        <button class="btn-primary" style="width:auto" onclick="analyzeGaps()" ${S.audit.analyzing?"disabled":""}>${S.audit.analyzing?"Analyzing…":(S.gaps.length?"Re-analyze":"Analyze notes")}</button>
        ${S.gaps.length?`<button class="btn-ghost" onclick="saveAudit()">Save to client</button>`:""}
        <span class="msg" id="audit-msg">${esc(S.audit.msg)}</span>

}

function getAuditText(){
  const guide = GUIDE.map(p => { const n = (S.audit.guideNotes[p.id]||"").trim(); return n ? `[${p.title}] ${n}` : ""; }).filter(Boolean).join("\n");
  return [guide, S.audit.captureText.trim()].filter(Boolean).join("\n\n");
}

function editGap(i, field, val){ if(S.gaps[i]) S.gaps[i][field] = val; }
function deleteGap(i){ S.gaps.splice(i,1); renderAudit(); }

async function analyzeGaps(){
  const text = getAuditText();
  if(text.length < 40){ setAuditMsg("Add Guide notes or a transcript first."); return; }
  S.audit.analyzing = true; renderAudit();
  try{
    const stackSummary = summarizeStack(S.activeClient.current_stack);
    const out = await ai({
      system: "You are an expert business-systems analyst on a GHL automation agency's audit call. From the notes, identify every distinct, separately-solvable workflow gap as its own item — each gap should map ~1:1 to one automation that could be built and priced independently. Never collapse related but distinct gaps into a single item. Scale gap count to transcript richness: a brief call yields 3–5 gaps, a rich transcript yields 6–9 or more — do NOT cap at three. Separation rules: lead-capture is separate from lead-response; reminders are separate from calendar management; review requests are separate from retention follow-up; manual invoicing and payment-chasing are always their own gap. Use the client's own words in problem and cost fields. Respond ONLY with valid JSON, no markdown:\n{\"summary\":\"2-3 sentence plain-language summary of their current workflow\",\"gaps\":[{\"title\":\"short gap name\",\"problem\":\"what's happening, in their words\",\"cost\":\"the time or money cost of leaving it\",\"severity\":\"high|medium|low\",\"category\":\"gap|tool|pain|win\"}]}",
      messages: [{ role:"user", content:`Client: ${S.activeClient.business_name} (${S.activeClient.industry||"industry n/a"})\n\nAudit notes:\n${text}`
        + (stackSummary ? `\n\nCurrent stack (context only — what they already run, not a gap): ${stackSummary}` : "") }],
      max_tokens: 1500,
    });
    const parsed = JSON.parse(out.replace(/```json|```/g,"").trim());
    S.audit.summary = parsed.summary || null;
    S.gaps = (parsed.gaps || []).map((g,i) => ({ title:g.title||"Untitled gap", problem:g.problem||"", cost:g.cost||"", severity:g.severity||"medium", category:g.category||"gap", sort_order:i }));
    setAuditMsg(`${S.gaps.length} gaps found — review and save.`);
  }catch(e){
    console.error("analyzeGaps error:", e);
    setAuditMsg("Could not analyze: " + e.message);
  }
  S.audit.analyzing = false; renderAudit();
}

async function saveAudit(){
  if(!S.gaps.length){ setAuditMsg("Analyze first — nothing to save."); return; }
  const op = S.user.id, cid = S.activeClientId;
  const sessionRow = { operator_id:op, client_id:cid, transcript:getAuditText(), audit_summary:S.audit.summary||null, status:"analyzed" };
  let sid = S.audit.sessionId;
  if(sid){
    await sb.from("audit_sessions").update(sessionRow).eq("id", sid);
    await sb.from("gaps").delete().eq("audit_session_id", sid);
  }else{
    const { data, error } = await sb.from("audit_sessions").insert(sessionRow).select().single();
    if(error){ setAuditMsg("Save failed: " + error.message); return; }
    sid = data.id; S.audit.sessionId = sid;
  }
  const rows = S.gaps.map((g,i) => ({ operator_id:op, client_id:cid, audit_session_id:sid, title:g.title, problem:g.problem||null, cost:g.cost||null, severity:g.severity||"medium", category:g.category||"gap", validation_status:"pending", sort_order:i }));
  const { error:gErr } = await sb.from("gaps").insert(rows);
  if(gErr){ setAuditMsg("Gaps save failed: " + gErr.message); return; }
  setAuditMsg("Saved ✓ — gaps are pending the Automation Agent's feasibility check.");
}

async function loadAuditData(clientId){
  const { data: sessions } = await sb.from("audit_sessions").select("*").eq("client_id", clientId).order("created_at", { ascending:false }).limit(1);
  if(sessions && sessions.length){
    const s = sessions[0];
    S.audit.sessionId = s.id;
    S.audit.summary = s.audit_summary;
    if(s.transcript && !S.audit.captureText) S.audit.captureText = s.transcript;
    const { data: gaps } = await sb.from("gaps").select("*").eq("audit_session_id", s.id).order("sort_order");
    S.gaps = gaps || [];
  }
  S.audit.loaded = true;
  renderAudit();
}

/* ============================================================
   CURRENT STACK  (client-level context, not a gap — read by the
   future Automation Agent to decide build vs integrate vs replace)
============================================================ */
const STACK_OPTIONS = {
  "website.platform": ["None","Wix","WordPress","Squarespace","Shopify","Webflow","Custom"],
  "crm": ["None or spreadsheet","HubSpot"],
  "booking": ["Manual","Google Calendar","Calendly","Acuity"],
  "invoicing": ["Manual","QuickBooks","Stripe","Square"],
  "comms": ["None","Email only","SMS","Mailchimp"],
  "automations.tool": ["None","Zapier","Make","n8n"],
};

function emptyStack(){
  return { website:{platform:"",url:""}, crm:"", booking:"", invoicing:"", comms:"", automations:{tool:"",description:""}, monthly_tool_spend:null, notes:"" };
}

function hydrateStack(raw){
  const d = emptyStack();
  if(!raw || typeof raw !== "object") return d;
  return {
    website: { platform:(raw.website && raw.website.platform) || "", url:(raw.website && raw.website.url) || "" },
    crm: raw.crm || "",
    booking: raw.booking || "",
    invoicing: raw.invoicing || "",
    comms: raw.comms || "",
    automations: { tool:(raw.automations && raw.automations.tool) || "", description:(raw.automations && raw.automations.description) || "" },
    monthly_tool_spend: (typeof raw.monthly_tool_spend === "number") ? raw.monthly_tool_spend : null,
    notes: raw.notes || "",
  };
}

function summarizeStack(stack){
  if(!stack) return "";
  const parts = [];
  if(stack.website && (stack.website.platform || stack.website.url)) parts.push(`website: ${[stack.website.platform, stack.website.url].filter(Boolean).join(" — ")}`);
  if(stack.crm) parts.push(`CRM: ${stack.crm}`);
  if(stack.booking) parts.push(`booking: ${stack.booking}`);
  if(stack.invoicing) parts.push(`invoicing: ${stack.invoicing}`);
  if(stack.comms) parts.push(`comms: ${stack.comms}`);
  if(stack.automations && (stack.automations.tool || stack.automations.description)) parts.push(`automations: ${[stack.automations.tool, stack.automations.description].filter(Boolean).join(" — ")}`);
  if(stack.monthly_tool_spend != null) parts.push(`monthly tool spend: $${stack.monthly_tool_spend} CAD`);
  if(stack.notes) parts.push(`notes: ${stack.notes}`);
  return parts.join("; ");
}

function stackGet(path){
  const parts = path.split(".");
  let o = S.audit.stackForm;
  for(const p of parts){ if(o == null) return undefined; o = o[p]; }
  return o;
}

function stackSet(path, val){
  const parts = path.split(".");
  let o = S.audit.stackForm;
  for(let i=0;i<parts.length-1;i++) o = o[parts[i]];
  o[parts[parts.length-1]] = val;
}

function stackSelectChange(path, val){
  if(val === "__other__"){ S.audit.stackOtherFlags[path] = true; }
  else{ S.audit.stackOtherFlags[path] = false; stackSet(path, val); }
  renderAuditBody();
}

function stackDropdown(path, label){
  const opts = STACK_OPTIONS[path];
  const value = stackGet(path) || "";
  const presetValues = opts.slice(1);
  const isOther = !!S.audit.stackOtherFlags[path] || (value !== "" && !presetValues.includes(value));
  const selectVal = isOther ? "__other__" : value;
  const optionsHtml = [
    `<option value="" ${selectVal===""?"selected":""}>${esc(opts[0])}</option>`,
    ...presetValues.map(o => `<option value="${escAttr(o)}" ${selectVal===o?"selected":""}>${esc(o)}</option>`),
    `<option value="__other__" ${isOther?"selected":""}>Other</option>`,
  ].join("");
  return `
    <div class="stack-row">
      <label>${esc(label)}</label>
      <select onchange="stackSelectChange('${path}', this.value)">${optionsHtml}</select>
      ${isOther ? `<input type="text" placeholder="Specify…" value="${escAttr(value)}" oninput="stackSet('${path}', this.value)">` : ""}
    </div>`;
}

function renderStack(){
  const st = S.audit.stackForm;
  return `
    <div class="card">
      <div class="phase-t">Current stack</div>
      <p class="panel-sub">What the client already runs — context for the Automation Agent to decide build vs integrate vs replace. Not a gap.</p>
      <div class="btn-row">
        <button class="btn-ghost" onclick="extractStack()" ${S.audit.extracting?"disabled":""}>${S.audit.extracting?"Extracting…":"Extract from transcript"}</button>
        <button class="btn-primary" style="width:auto" onclick="saveStack()">Save stack</button>
        <span class="msg" id="audit-msg">${esc(S.audit.msg)}</span>
      </div>
    </div>
    <div class="card">
      <div class="phase-h">Website</div>
      ${stackDropdown("website.platform","Platform")}
      <div class="stack-row">
        <label>URL</label>
        <input type="text" value="${escAttr(st.website.url)}" oninput="stackSet('website.url', this.value)">
      </div>
    </div>
    <div class="card">
      <div class="phase-h">Systems</div>
      ${stackDropdown("crm","CRM")}
      ${stackDropdown("booking","Booking")}
      ${stackDropdown("invoicing","Invoicing")}
      ${stackDropdown("comms","Comms")}
    </div>
    <div class="card">
      <div class="phase-h">Automations</div>
      ${stackDropdown("automations.tool","Tool")}
      <div class="stack-row">
        <label>Description</label>
        <input type="text" value="${escAttr(st.automations.description)}" oninput="stackSet('automations.description', this.value)">
      </div>
    </div>
    <div class="card">
      <div class="stack-row">
        <label>Monthly tool spend (CAD)</label>
        <input type="number" min="0" step="1" value="${st.monthly_tool_spend==null?"":st.monthly_tool_spend}" oninput="stackSet('monthly_tool_spend', this.value===''?null:Number(this.value))">
      </div>
      <label style="font-size:11px;color:var(--muted);display:block;margin:10px 0 4px">Notes</label>
      <textarea class="notes" placeholder="Anything that doesn't fit a field — e.g. 'paper calendar in the shop'" oninput="stackSet('notes', this.value)">${esc(st.notes)}</textarea>
    </div>`;
}

async function extractStack(){
  const text = getAuditText();
  if(text.trim().length < 40){ setAuditMsg("Add Guide notes or a transcript first."); return; }
  S.audit.extracting = true; renderAuditBody();
  try{
    const out = await ai({
      system: "Extract ONLY the client's existing tools, software, and vendors mentioned in the transcript below. This is stack/infrastructure capture, NOT gap or workflow analysis — do not identify problems, pain points, costs, or missing processes; a separate process already does that. Return ONLY valid JSON in this exact shape, no markdown: {\"website\":{\"platform\":\"\",\"url\":\"\"},\"crm\":\"\",\"booking\":\"\",\"invoicing\":\"\",\"comms\":\"\",\"automations\":{\"tool\":\"\",\"description\":\"\"},\"monthly_tool_spend\":null,\"notes\":\"\"}. If a tool is clearly mentioned or strongly implied, SET the matching field to the closest named option — never leave a field on its default while only describing that same tool in notes or in automations.description. Examples: mentions of Google Calendar for booking/estimates → booking=\"Google Calendar\"; a form or process that emails the team → comms=\"Email only\" (or the specific tool if named); QuickBooks mentioned → invoicing=\"QuickBooks\"; an existing website being discussed, even if the platform is never named, means website.url/context should still be captured and website.platform only left empty if the platform itself is truly never stated. Use empty string / null only for fields with no mention or implication at all — do not wildly guess beyond what's mentioned or implied, but \"clearly mentioned or strongly implied\" clears the bar (you don't need the exact product name spelled out). The notes field is for detail that has no matching field at all (e.g. \"paper calendar in the shop\") — it is NOT a substitute for setting a field that exists, and it must NEVER contain workflow gaps, pain points, problem descriptions, or a gap/opportunity list.",
      messages: [{ role:"user", content:`Client: ${S.activeClient.business_name} (${S.activeClient.industry||"industry n/a"})\n\nTranscript / notes:\n${text}` }],
      max_tokens: 800,
    });
    const parsed = JSON.parse(out.replace(/```json|```/g,"").trim());
    if(Array.isArray(parsed.gaps) || parsed.summary){
      throw new Error("Model returned gap analysis instead of stack info — try again.");
    }
    S.audit.stackForm = hydrateStack(parsed);
    S.audit.stackOtherFlags = {};
    setAuditMsg("Extracted — review before saving.");
  }catch(e){
    console.error("extractStack error:", e);
    setAuditMsg("Could not extract: " + e.message);
  }
  S.audit.extracting = false; renderAuditBody();
}

async function saveStack(){
  const cid = S.activeClientId;
  const stack = S.audit.stackForm || emptyStack();
  const { error } = await sb.from("clients").update({ current_stack: stack }).eq("id", cid);
  if(error){ setAuditMsg("Stack save failed: " + error.message); return; }
  S.activeClient.current_stack = stack;
  const idx = S.clients.findIndex(c => c.id === cid);
  if(idx > -1) S.clients[idx].current_stack = stack;
  setAuditMsg("Stack saved ✓");
}

/* ============================================================
   MODULE 2 — AUTOMATION AGENT (feasibility gate)
   Reads PENDING gaps + current_stack for the active client. The Audit
   Assistant identifies gaps; this module only qualifies existing ones —
   it never creates new gap rows.
============================================================ */
const AUTOMATION_CATALOG_PROMPT = `AUTOMATION ENGINE CATALOG (Baseleap):
Two-number snapshot model: GHL automations, once built, are cloned (snapshot) into a new client's sub-account with only client-specific bits wired up. Cost-to-deliver has two numbers: first-build hours (build from scratch, one-time, higher) and deploy hours (snapshot + parameterize, repeats, much lower). For a TEMPLATED engine match, estimate DEPLOY hours — UNLESS approach is integrate/replace with genuine per-client wiring, then use the higher end. For a gap with no matching engine, estimate FIRST-BUILD hours and set is_new_template:true.

Approach rule (read current_stack first) — the build/replace boundary is about whether a real TOOL exists, not whether the client is disorganized:
- build = NO automated system exists for this job. This INCLUDES the client doing it manually by hand, forwarding emails, texting themselves, or "just remembering" — manual effort is not a tool to replace, it's the absence of one. Net-new in GHL (or n8n if GHL can't do it).
- replace = an actual existing TOOL or ARTIFACT does this job poorly and gets consolidated/swapped — e.g. a paper calendar, a spreadsheet used as a CRM, two disconnected apps duct-taped together. Requires a real artifact to point to, not just "they're behind on this."
- integrate = a capable third-party tool already exists for this job (e.g. QuickBooks, Calendly) — connect/automate it rather than replace it.
Rule of thumb: "they do it manually / nothing exists" → build. "they use a bad or fragmented tool" → replace. "they have a good tool, just wire it in" → integrate. Do NOT default to replace just because the client's process is informal — check current_stack for an actual named tool before choosing replace.

Known engines (name | approach | templated | deploy hrs | band):
- Meta Lead Follow-Up Drip | build | yes | <1 day | standard
- Booking Lifecycle (confirm/cancel/complete) | build | yes | <1 day | standard
- Payment Processor Foundation (Stripe) | integrate | yes | <1 day | standard — foundational, build first; non-Stripe processors are net-new
- Referral & Loyalty | build | yes | 1-3 days | complex
- Review Engine (request + credit) | build | yes | <1 day | simple
- Session Decrement | build | yes | <1 day | standard
- Membership Booking-Lock | build | yes | <1 day | standard
- Reactivation Gate (membership) | build | yes | <1 day | standard — state cleanup on re-pay, NOT a marketing win-back

Not-yet-templated: a marketing win-back drip for lapsed customers is a common gap with no engine yet — model on the Meta timeline pattern, standard band, first-build. Any gap with no matching engine: matched_engine=null, is_new_template=true, first-build hours.

Bands (client price anchor): simple $500-1000, standard $1500-3000, complex $3500-6000+, referral full program $2500-6000. Band sets client price regardless of your internal hour estimate — hours are cost-to-deliver only, used to select/confirm the band.`;

function automationSystemPrompt(){
  return "You are the Automation Agent — the feasibility gate for a GHL automation agency (Baseleap). "
    + "You qualify one gap the Audit Assistant already identified; you never invent new gaps. "
    + "Given the gap and the client's current tool stack, assess feasibility, name the mechanism, estimate cost-to-deliver, and tag an approach.\n\n"
    + AUTOMATION_CATALOG_PROMPT
    + "\n\nMatch the gap to a known engine where possible. The approach MUST be informed by current_stack: if the client already runs a capable tool for this job, prefer integrate; if current_stack names an actual bad/fragmented tool or artifact doing this job, consider replace; if current_stack shows nothing for this job — including purely manual handling — that is build, never replace.\n\n"
    + "Respond ONLY with valid JSON, no markdown, in exactly this shape:\n"
    + '{"feasible":true,"approach":"build|integrate|replace","mechanism":"one-line how","estimated_hours":0,"band":"simple|standard|complex","templated":true,"is_new_template":false,"matched_engine":"engine name or null","rationale":"1-2 sentences"}';
}

function parseAssessResponse(raw){
  let parsed;
  try{ parsed = JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch(e){ throw new Error("AI returned invalid JSON"); }
  const shapeOk = typeof parsed.feasible === "boolean"
    && ["build","integrate","replace"].includes(parsed.approach)
    && typeof parsed.mechanism === "string" && parsed.mechanism.trim()
    && typeof parsed.estimated_hours === "number" && parsed.estimated_hours >= 0
    && ["simple","standard","complex"].includes(parsed.band)
    && typeof parsed.templated === "boolean"
    && typeof parsed.is_new_template === "boolean"
    && (parsed.matched_engine === null || typeof parsed.matched_engine === "string")
    && typeof parsed.rationale === "string";
  if(!shapeOk) throw new Error("AI response did not match the expected shape — try again.");
  return parsed;
}

function initDraft(g){
  return {
    feasible: g.feasible, approach: g.approach || "", mechanism: g.mechanism || "",
    estimated_hours: g.estimated_hours, band: g.band || "", templated: null,
    is_new_template: g.is_new_template ?? null, matched_engine: g.matched_engine || "",
    rationale: "",
  };
}
function getDraft(g){
  if(!S.automation.drafts[g.id]) S.automation.drafts[g.id] = initDraft(g);
  return S.automation.drafts[g.id];
}
function setDraftField(gapId, field, val){ const d = S.automation.drafts[gapId]; if(d) d[field] = val; }
// After a validate/un-validate round trip, resync the draft's persisted-column fields
// from the authoritative DB row so the card reflects what's actually saved, not stale local state.
function syncDraftFromGap(gapId, g){
  const d = S.automation.drafts[gapId] || initDraft(g);
  d.feasible = g.feasible; d.approach = g.approach || ""; d.mechanism = g.mechanism || "";
  d.estimated_hours = g.estimated_hours; d.band = g.band || "";
  d.matched_engine = g.matched_engine || ""; d.is_new_template = g.is_new_template ?? null;
  S.automation.drafts[gapId] = d;
}
function setAutomationMsg(t){ S.automation.msg = t; const el = document.getElementById("automation-msg"); if(el) el.textContent = t; }

async function loadAutomationData(clientId){
  const { data } = await sb.from("gaps").select("*").eq("client_id", clientId).order("sort_order");
  S.automation.gaps = data || [];
  S.automation.drafts = {};
  S.automation.loaded = true;
  renderAutomation();
}

async function assessGap(gapId, silent){
  const g = S.automation.gaps.find(x => x.id === gapId);
  if(!g) return;
  delete S.automation.errors[gapId];
  S.automation.assessing[gapId] = true; renderAutomation();
  try{
    const stackSummary = summarizeStack(S.activeClient.current_stack) || "No current stack captured.";
    const out = await ai({
      system: automationSystemPrompt(),
      messages: [{ role:"user", content:
        `Client: ${S.activeClient.business_name} (${S.activeClient.industry||"industry n/a"})\n`
        + `Current stack: ${stackSummary}\n\n`
        + `Gap to assess:\nTitle: ${g.title}\nProblem: ${g.problem||""}\nCost: ${g.cost||""}\nSeverity: ${g.severity||""}\nCategory: ${g.category||""}` }],
      max_tokens: 700,
    });
    const parsed = parseAssessResponse(out);
    S.automation.drafts[gapId] = {
      ...getDraft(g),
      feasible: parsed.feasible, approach: parsed.approach, mechanism: parsed.mechanism.trim(),
      estimated_hours: parsed.estimated_hours, band: parsed.band, templated: parsed.templated,
      is_new_template: parsed.is_new_template, matched_engine: parsed.matched_engine || "",
      rationale: parsed.rationale.trim(),
    };
    if(!silent) setAutomationMsg("Assessed — review before validating.");
  }catch(e){
    console.error("assessGap error:", e);
    S.automation.errors[gapId] = e.message;
    if(!silent) setAutomationMsg("Assessment failed: " + e.message);
  }
  S.automation.assessing[gapId] = false; renderAutomation();
}

async function assessAllPending(){
  const pending = S.automation.gaps.filter(g => g.validation_status === "pending");
  if(!pending.length || S.automation.assessingAll) return;
  S.automation.assessingAll = true;
  for(let i = 0; i < pending.length; i++){
    S.automation.progress = `Assessing ${i+1} of ${pending.length}…`;
    renderAutomation();
    await assessGap(pending[i].id, true); // silent — batch reports its own progress/errors
  }
  S.automation.assessingAll = false;
  S.automation.progress = "";
  const failed = pending.filter(g => S.automation.errors[g.id]).length;
  setAutomationMsg(failed ? `Assessed ${pending.length - failed} of ${pending.length} — ${failed} failed, see card${failed===1?"":"s"} below.` : `Assessed ${pending.length} gap${pending.length===1?"":"s"}.`);
  renderAutomation();
}

async function validateGap(gapId){
  const g = S.automation.gaps.find(x => x.id === gapId);
  const d = S.automation.drafts[gapId];
  if(!g || !d) return;
  if(!d.approach || !d.mechanism.trim() || typeof d.estimated_hours !== "number"){
    setAutomationMsg("Assess, or fill in approach, mechanism, and hours, before validating.");
    return;
  }
  const patch = { feasible: !!d.feasible, approach: d.approach, mechanism: d.mechanism.trim(), estimated_hours: d.estimated_hours, band: d.band || null,
    matched_engine: d.matched_engine || null, is_new_template: d.is_new_template === true,   // Mode-1/Mode-2 routing signals — the build-planner reads these
    validation_status: "validated" };
  // .select().single() forces verification: an RLS-filtered or otherwise no-op update
  // throws here instead of silently leaving the row unchanged while the UI reports success.
  const { data, error } = await sb.from("gaps").update(patch).eq("id", gapId).select().single();
  if(error){ setAutomationMsg("Validate failed: " + error.message); return; }
  Object.assign(g, data);                    // trust the persisted row, not the local patch
  syncDraftFromGap(gapId, data);              // keep the card showing what's actually saved
  setAutomationMsg("Validated ✓ — will appear in the Gap Report.");
  renderAutomation();
}

async function unvalidateGap(gapId){
  const g = S.automation.gaps.find(x => x.id === gapId);
  if(!g) return;
  const { data, error } = await sb.from("gaps").update({ validation_status: "pending" }).eq("id", gapId).select().single();
  if(error){ setAutomationMsg("Un-validate failed: " + error.message); return; }
  Object.assign(g, data);
  syncDraftFromGap(gapId, data);
  setAutomationMsg("Back to pending.");
  renderAutomation();
}

/* ---- parse + order: the AI proposes edges, this code decides the order ---- */
const SEVERITY_RANK = { high: 0, medium: 1, low: 2 };   // lower = builds earlier

// Throws a specific error on the first contract violation; returns nothing.
// Checks every field of every step, that all depends_on refs resolve, and that
// no step depends on itself. Cycles are caught by the sort (Kahn's leftover set).
function validatePlanShape(p, gaps){
  if(typeof p.title !== "string" || !p.title.trim()) throw new Error("plan title missing");
  if(typeof p.summary !== "string" || !p.summary.trim()) throw new Error("plan summary missing");
  if(!Array.isArray(p.scope_flags) || p.scope_flags.some(f => typeof f !== "string")) throw new Error("scope_flags must be an array of strings");
  if(!Array.isArray(p.steps) || !p.steps.length) throw new Error("plan has no steps");
  const refs = new Set();
  p.steps.forEach((s, i) => {
    const at = `step ${i+1}${typeof s.ref === "string" && s.ref.trim() ? ` ("${s.ref}")` : ""}`;
    if(typeof s.ref !== "string" || !s.ref.trim()) throw new Error(at + ": ref missing");
    if(refs.has(s.ref)) throw new Error(at + ": duplicate ref");
    refs.add(s.ref);
    if(!["setup","automation"].includes(s.agent)) throw new Error(at + ": agent must be setup|automation");
    if(s.agent === "automation" ? !["deploy","design"].includes(s.mode) : s.mode != null)
      throw new Error(at + ": mode must be deploy|design on automation steps and null on setup steps");
    if(!(s.gap_ref === null || (Number.isInteger(s.gap_ref) && s.gap_ref >= 0 && s.gap_ref < gaps.length)))
      throw new Error(at + `: gap_ref must be null or 0–${gaps.length - 1}`);
    if(typeof s.long_lead !== "boolean") throw new Error(at + ": long_lead must be boolean");
    if(typeof s.title !== "string" || !s.title.trim()) throw new Error(at + ": title missing");
    if(typeof s.detail !== "string" || !s.detail.trim()) throw new Error(at + ": detail missing");
    if(!Array.isArray(s.checklist) || s.checklist.some(c => typeof c !== "string" || !c.trim()))
      throw new Error(at + ": checklist must be an array of non-empty strings");
    if(typeof s.estimated_hours !== "number" || !isFinite(s.estimated_hours) || s.estimated_hours < 0)
      throw new Error(at + ": estimated_hours must be a number ≥ 0");
    if(!Array.isArray(s.depends_on) || s.depends_on.some(d => typeof d !== "string")) throw new Error(at + ": depends_on must be an array of refs");
    if(s.depends_on.includes(s.ref)) throw new Error(at + ": depends on itself");
  });
  p.steps.forEach(s => s.depends_on.forEach(d => {
    if(!refs.has(d)) throw new Error(`step "${s.ref}" depends on unknown ref "${d}"`);
  }));
}

// A step's severity comes from the gap it delivers; foundation steps (no gap)
// rank below low — dependency edges, not severity, are what pull them early.
function stepSeverityRank(s, gaps){
  const g = s.gap_ref === null ? null : gaps[s.gap_ref];
  return g && SEVERITY_RANK[g.severity] !== undefined ? SEVERITY_RANK[g.severity] : 3;
}

// Kahn's topological sort. Among the currently-ready steps (all dependencies
// already placed), the next pick is decided by: long-lead flag → severity of the
// delivered gap → ascending estimated_hours → original array index (stability).
// Throws naming the stuck refs if the queue drains before every step is placed (= cycle).
function orderPlanSteps(steps, gaps){
  const indegree = new Map(steps.map(s => [s.ref, s.depends_on.length]));
  const dependents = new Map(steps.map(s => [s.ref, []]));
  steps.forEach(s => s.depends_on.forEach(d => dependents.get(d).push(s.ref)));
  const byRef = new Map(steps.map(s => [s.ref, s]));
  const pickNext = (a, b) =>
       (b.long_lead === true) - (a.long_lead === true)
    || stepSeverityRank(a, gaps) - stepSeverityRank(b, gaps)
    || a.estimated_hours - b.estimated_hours
    || steps.indexOf(a) - steps.indexOf(b);
  let ready = steps.filter(s => indegree.get(s.ref) === 0);
  const ordered = [];
  while(ready.length){
    ready.sort(pickNext);
    const s = ready.shift();
    ordered.push(s);
    dependents.get(s.ref).forEach(ref => {
      indegree.set(ref, indegree.get(ref) - 1);
      if(indegree.get(ref) === 0) ready.push(byRef.get(ref));
    });
  }
  if(ordered.length !== steps.length){
    const stuck = steps.filter(s => !ordered.includes(s)).map(s => s.ref).join(", ");
    throw new Error("dependency cycle among: " + stuck);
  }
  return ordered.map((s, i) => ({ ...s, position: i }));
}

// raw AI text → validated, deterministically ordered draft plan.
// Throws with a specific message on any contract violation — the caller
// retries generation ONCE on failure and never saves an invalid graph.
function parseAndOrderPlan(raw, gaps){
  let p;
  try{ p = JSON.parse(raw.replace(/```json|```/g, "").trim()); }
  catch(e){ throw new Error("AI returned invalid JSON"); }
  validatePlanShape(p, gaps);
  p.steps.forEach(s => { s.depends_on = [...new Set(s.depends_on)]; });  // dupes would corrupt indegree counts
  const steps = orderPlanSteps(p.steps, gaps).map(s => ({
    ...s, title: s.title.trim(), detail: s.detail.trim(), checklist: s.checklist.map(c => c.trim()),
  }));
  const covered = new Set(steps.map(s => s.gap_ref).filter(r => r !== null));
  const warnings = gaps.map((g, i) => covered.has(i) ? null : `Accepted gap "${g.title}" has no step delivering it.`).filter(Boolean);
  return {
    title: p.title.trim(), summary: p.summary.trim(),
    scope_flags: p.scope_flags.map(f => f.trim()).filter(Boolean),
    steps, warnings,
  };
}

/* ---- generate / save / load ---- */
function setBuildPlanMsg(t){ S.buildPlan.msg = t; const el = document.getElementById("buildplan-msg"); if(el) el.textContent = t; }

// The planner reads only accepted gaps — selection is set on the Finalize subtab.
async function loadAcceptedGaps(clientId){
  const { data, error } = await sb.from("gaps").select("*")
    .eq("client_id", clientId).eq("validation_status", "validated").eq("selection", "accepted")
    .order("sort_order");
  if(error) throw new Error("could not load accepted gaps: " + error.message);
  return data || [];
}

// Retry-once wiring: ONLY a contract violation (parseAndOrderPlan throw) earns the
// retry, with the named violation fed back so the second attempt can fix it.
// Transport/proxy errors from ai() propagate immediately — retrying those blind
// just doubles cost on an outage.
// Retry feedback names the REAL problem: a truncation retry asks for concision
// (dropping steps is not allowed); a contract violation asks for the specific fix.
function planRetryFeedback(err){
  return /truncated/.test(err.message)
    ? "Your previous attempt was cut off at the output-token limit before the JSON completed. Regenerate the COMPLETE plan more concisely — shorter detail sentences, tighter checklist phrasing. Do NOT drop steps, checklists, or dependency edges to save space."
    : `Your previous attempt violated the output contract — ${err.message}. Regenerate the complete corrected JSON.`;
}

async function generatePlanDraft(system, userMsg, gaps){
  let raw;
  try{
    raw = await ai({ system, messages: [{ role:"user", content: userMsg }], max_tokens: 32000 });
    return parseAndOrderPlan(raw, gaps);
  }catch(e1){
    if(/AI request failed/.test(e1.message)) throw e1;   // transport/proxy error — retrying blind just doubles cost
    raw = await ai({ system, messages: [{ role:"user", content: userMsg + "\n\n" + planRetryFeedback(e1) }], max_tokens: 32000 });
    try{ return parseAndOrderPlan(raw, gaps); }
    catch(e2){ throw new Error(`plan failed validation twice (first: ${e1.message}; then: ${e2.message})`); }
  }
}

async function generateBuildPlan(){
  if(S.buildPlan.generating) return;
  S.buildPlan.generating = true; setBuildPlanMsg("Generating plan…"); renderAutomation();
  try{
    const gaps = await loadAcceptedGaps(S.activeClientId);
    if(!gaps.length) throw new Error("no accepted gaps — validate gaps here, then mark them accepted (Gap Report) first");
    const hasMode2 = gaps.some(g => g.is_new_template === true || !g.matched_engine);
    S.buildPlan.draft = await generatePlanDraft(buildPlanSystemPrompt(hasMode2), buildPlanUserMessage(gaps), gaps);
    S.buildPlan.draftGaps = gaps;   // the exact list the draft's gap_refs index into — frozen with the draft
    setBuildPlanMsg("Draft ready — review below, then save.");
  }catch(e){
    console.error("generateBuildPlan error:", e);
    setBuildPlanMsg("Generation failed: " + e.message);
  }
  S.buildPlan.generating = false; renderAutomation();
}

// Draft steps → build_steps rows. Local refs become real UUIDs minted client-side,
// so depends_on UUID[] resolves inside ONE atomic batch insert.
function draftStepRows(draft, gaps, planId, op){
  const idByRef = Object.fromEntries(draft.steps.map(s => [s.ref, crypto.randomUUID()]));
  return draft.steps.map(s => ({
    id: idByRef[s.ref], build_plan_id: planId, operator_id: op,
    gap_id: s.gap_ref === null ? null : gaps[s.gap_ref].id,
    agent: s.agent, mode: s.mode,
    matched_engine: s.gap_ref === null ? null : (gaps[s.gap_ref].matched_engine || null),
    title: s.title, detail: s.detail,
    checklist: s.checklist.map(t => ({ text: t, done: false })),
    estimated_hours: s.estimated_hours, status: "queued",
    depends_on: s.depends_on.map(r => idByRef[r]),
    position: s.position,
  }));
}

// Two writes: parent plan, then ALL steps as one batch insert (single statement —
// atomic, so steps are all-or-nothing). The partial-failure window is between the
// two writes: plan row in, steps failed → delete the plan row (build_steps cascade).
async function saveBuildPlan(){
  const d = S.buildPlan.draft;
  if(!d || S.buildPlan.saving) return;
  S.buildPlan.saving = true; setBuildPlanMsg("Saving…"); renderAutomation();
  try{
    const { data: plan, error: planErr } = await sb.from("build_plans")
      .insert({ operator_id: S.user.id, client_id: S.activeClientId, title: d.title, summary: d.summary })
      .select().single();
    if(planErr || !plan) throw new Error("plan insert failed: " + (planErr ? planErr.message : "no row returned"));

    const rows = draftStepRows(d, S.buildPlan.draftGaps, plan.id, S.user.id);
    const { data: steps, error: stepErr } = await sb.from("build_steps").insert(rows).select();
    if(stepErr || !steps || steps.length !== rows.length){
      await rollbackBuildPlan(plan.id, stepErr ? stepErr.message : `expected ${rows.length} rows back, got ${steps ? steps.length : 0}`);
      S.buildPlan.saving = false; renderAutomation(); return;
    }
    S.buildPlan.plan = plan;
    S.buildPlan.steps = steps.slice().sort((a, b) => a.position - b.position);
    S.buildPlan.draft = null; S.buildPlan.draftGaps = null;   // draft is spent — the saved rows are now the truth
    setBuildPlanMsg("Plan saved ✓");
  }catch(e){
    console.error("saveBuildPlan error:", e);
    setBuildPlanMsg("Save failed: " + e.message + " — nothing was saved, draft kept.");
  }
  S.buildPlan.saving = false; renderAutomation();
}

// Deleting the plan row cascades to any inserted build_steps (FK ON DELETE CASCADE),
// so one verified delete restores the pre-save state. The draft is kept either way.
async function rollbackBuildPlan(planId, why){
  const { error } = await sb.from("build_plans").delete().eq("id", planId);
  setBuildPlanMsg(error
    ? `Save failed (${why}) AND rollback failed (${error.message}) — orphaned plan ${planId}, remove it in Supabase. Draft kept.`
    : `Save failed: ${why}. Rolled back — nothing was saved. Draft kept; try again.`);
}

// Latest plan per client + its steps in topological position order.
async function loadBuildPlanData(clientId){
  try{
    const { data: plans, error } = await sb.from("build_plans").select("*")
      .eq("client_id", clientId).order("created_at", { ascending: false }).limit(1);
    if(error) throw new Error(error.message);
    S.buildPlan.plan = (plans && plans[0]) || null;
    S.buildPlan.steps = [];
    if(S.buildPlan.plan){
      const { data: steps, error: e2 } = await sb.from("build_steps").select("*")
        .eq("build_plan_id", S.buildPlan.plan.id).order("position");
      if(e2) throw new Error(e2.message);
      S.buildPlan.steps = steps || [];
    }
  }catch(e){ setBuildPlanMsg("Load failed: " + e.message); }
  S.buildPlan.loaded = true;
  renderAutomation();
}

/* ---- Finalize subtab: the gap-finalization decision surface ----
   Bridge between the gap report and the build plan. Reads validated gaps,
   writes gaps.selection (proposed | accepted | declined) — the one selection
   state that drives BOTH the proposal and the build plan. Dark by design:
   this is the presentation-adjacent surface. */
const BAND_RANGES = { simple:[500,1000], standard:[1500,3000], complex:[3500,6000] };

function finSplit(){
  const validated = S.automation.gaps.filter(g => g.validation_status === "validated");
  return {
    validated,
    pending: S.automation.gaps.filter(g => g.validation_status === "pending").length,
    accepted: validated.filter(g => g.selection === "accepted"),
    undecided: validated.filter(g => g.selection !== "accepted" && g.selection !== "declined"),
  };
}

function finTotalsLine(accepted){
  if(!accepted.length) return "no gaps accepted yet";
  const hours = accepted.reduce((t, g) => t + (g.estimated_hours || 0), 0);
  let lo = 0, hi = 0, plus = false;
  accepted.forEach(g => {
    const r = BAND_RANGES[g.band];
    if(r){ lo += r[0]; hi += r[1]; if(g.band === "complex") plus = true; }
  });
  const k = n => "$" + (n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,"") + "k" : n);
  return `≈ ${hours}h internal` + (lo ? ` · ${k(lo)}–${k(hi)}${plus ? "+" : ""} band value` : "");
}

function renderFinalizeBar(f){
  const decided = f.validated.length - f.undecided.length;
  const armed = f.accepted.length > 0 && f.undecided.length === 0;
  const pct = f.validated.length ? Math.round(decided / f.validated.length * 100) : 0;
  const hint = f.undecided.length
    ? `${f.undecided.length} gap${f.undecided.length === 1 ? "" : "s"} undecided`
    : "accept at least one gap";
  return `
    <div class="fin-bar">
      <div>
        <div class="fin-count">${f.accepted.length} / ${f.validated.length}<small>accepted</small></div>
        <div class="fin-totals">${esc(finTotalsLine(f.accepted))}</div>
      </div>
      <div class="fin-right">
        ${armed ? "" : `<span class="fin-hint">${esc(hint)}</span>`}
        <button class="fin-cta ${armed ? "armed" : "idle"}" ${armed ? `onclick="finalizeToPlan()"` : "disabled"}>Generate build plan →</button>
      </div>
      <div class="fin-bar-meter"><i style="width:${pct}%"></i></div>
    </div>`;
}

function finalizeToPlan(){
  S.automation.tab = "plan";
  renderAutomation();
  // fresh client state loads first; generation only auto-starts on a truly empty plan slate
  if(S.buildPlan.loaded && !S.buildPlan.plan && !S.buildPlan.draft && !S.buildPlan.generating) generateBuildPlan();
}

function renderFinalizeBody(){
  const body = document.getElementById("automation-body");
  if(!S.automation.loaded){ body.innerHTML = `<div class="audit-empty">Loading gaps…</div>`; loadAutomationData(S.activeClientId); return; }
  const f = finSplit();
  const rows = f.validated.map(g =>
    `<div class="fin-row">${esc(g.title)}<span>${esc(g.selection || "proposed")}</span></div>`).join("");
  body.innerHTML = `
    <div class="fin-surface"><div class="fin-col">
      ${renderFinalizeBar(f)}
      <div id="fin-list">${f.validated.length ? rows : `<div class="fin-empty">No validated gaps yet — qualify gaps on the Feasibility tab first.</div>`}</div>
      ${f.pending ? `<div class="fin-note">${f.pending} gap${f.pending === 1 ? " is" : "s are"} still awaiting feasibility — assess ${f.pending === 1 ? "it" : "them"} on the Feasibility tab if ${f.pending === 1 ? "it's" : "they're"} in scope.</div>` : ""}
    </div></div>`;
}

/* ---- Build-plan subtab UI ---- */
function renderBuildPlanBody(){
  const body = document.getElementById("automation-body");
  if(!S.buildPlan.loaded){ body.innerHTML = `<div class="audit-empty">Loading build plan…</div>`; loadBuildPlanData(S.activeClientId); return; }
  // precedence: a saved plan is the truth; a draft only shows before any save
  const inner = S.buildPlan.plan ? renderSavedPlan() : S.buildPlan.draft ? renderDraftReview() : renderPlanEmpty();
  body.innerHTML = inner + `<div class="msg" id="buildplan-msg" style="margin-top:10px">${esc(S.buildPlan.msg)}</div>`;
}

function renderPlanEmpty(){
  return `
    <div class="card">
      <div class="phase-t">No build plan yet</div>
      <div class="msg" style="margin-bottom:12px">Generates ONE dependency-ordered plan (setup + automation steps) from this client's accepted gaps. Validate gaps on the Feasibility tab, then mark them accepted on the Finalize tab.</div>
      <button class="btn-primary" style="width:auto" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating plan…":"Generate build plan"}</button>
    </div>`;
}

/* -- draft review: warnings FIRST (look before you save), then scope flags, summary, ordered steps -- */
function renderDraftWarnings(d){
  if(!d.warnings.length) return "";
  return `
    <div class="plan-warn">
      <div class="plan-warn-title">⚠ ${d.warnings.length} accepted gap${d.warnings.length===1?"":"s"} NOT covered by this plan</div>
      ${d.warnings.map(w => `<div class="plan-warn-item">• ${esc(w)}</div>`).join("")}
      <div class="msg" style="margin-top:6px">Look before you save: regenerate, or save knowingly — some gaps are a conversation, not an automation.</div>
    </div>`;
}

function draftDepLabel(s, d){
  return s.depends_on.map(ref => { const t = d.steps.find(x => x.ref === ref); return t ? "#" + (t.position + 1) : ref; }).join(", ");
}

function stepBadges(s){
  return [s.agent, s.mode, s.long_lead ? "long-lead" : "", s.estimated_hours != null ? s.estimated_hours + "h" : ""]
    .filter(Boolean).map(b => `<span class="step-badge">${esc(String(b))}</span>`).join(" ");
}

function renderDraftStep(s, d){
  const gap = s.gap_ref === null ? null : S.buildPlan.draftGaps[s.gap_ref];
  return `
    <div class="gap-card ${gap ? "sev-" + esc(gap.severity || "medium") : ""}">
      <div class="gap-top">
        <div style="flex:1;font-size:14px;font-weight:600">${s.position + 1}. ${esc(s.title)}</div>
        ${stepBadges(s)}
      </div>
      <div class="gap-body">
        ${gap ? `<div class="msg" style="margin-bottom:4px">Delivers: ${esc(gap.title)}</div>` : ""}
        ${s.depends_on.length ? `<div class="msg" style="margin-bottom:4px">After: ${esc(draftDepLabel(s, d))}</div>` : ""}
        <div style="font-size:13px;margin:6px 0">${esc(s.detail)}</div>
        ${s.checklist.length ? `<div class="msg">${s.checklist.map(c => "☐ " + esc(c)).join("<br>")}</div>` : ""}
      </div>
    </div>`;
}

function renderDraftReview(){
  const d = S.buildPlan.draft;
  const hours = d.steps.reduce((t, s) => t + s.estimated_hours, 0);
  return renderDraftWarnings(d)
    + (d.scope_flags.length ? `
      <div class="card" style="border-left:3px solid #EF9F27">
        <div class="phase-h">Scope flags — surfaced by the planner</div>
        ${d.scope_flags.map(f => `<div class="msg">• ${esc(f)}</div>`).join("")}
      </div>` : "")
    + `<div class="card">
        <div class="phase-h">Draft plan — NOT saved yet</div>
        <div class="phase-t">${esc(d.title)}</div>
        <div class="msg">${esc(d.summary)}</div>
        <div class="msg" style="margin-top:6px">${d.steps.length} steps · ~${hours}h internal cost-to-deliver</div>
      </div>`
    + d.steps.map(s => renderDraftStep(s, d)).join("")
    + `<div class="btn-row" style="margin-top:14px">
        <button class="btn-primary" style="width:auto" onclick="saveBuildPlan()" ${S.buildPlan.saving?"disabled":""}>${S.buildPlan.saving?"Saving…":"Save plan"}</button>
        <button class="btn-ghost" onclick="generateBuildPlan()" ${S.buildPlan.generating?"disabled":""}>${S.buildPlan.generating?"Generating…":"Regenerate"}</button>
        <button class="btn-ghost" onclick="discardDraft()">Discard draft</button>
      </div>`;
}

function discardDraft(){
  S.buildPlan.draft = null; S.buildPlan.draftGaps = null;
  setBuildPlanMsg("Draft discarded — nothing was saved.");
  renderAutomation();
}

/* -- saved plan: per-step status / checklist / notes, every write verified -- */
function savedDepLabel(s){
  const byId = new Map(S.buildPlan.steps.map(x => [x.id, x]));
  return s.depends_on.map(id => { const t = byId.get(id); return t ? `#${t.position + 1}${t.status === "done" ? " ✓" : ""}` : "?"; }).join(", ");
}

function renderSavedStep(s){
  const statusOpts = ["queued","building","testing","done"].map(v => `<option value="${v}" ${s.status===v?"selected":""}>${v}</option>`).join("");
  const checklist = (s.checklist || []).map((c, i) => `
    <label style="display:block;font-size:13px;margin:2px 0">
      <input type="checkbox" ${c.done?"checked":""} onchange="toggleStepChecklist('${s.id}',${i})"> ${c.done ? `<s>${esc(c.text)}</s>` : esc(c.text)}
    </label>`).join("");
  return `
    <div class="gap-card">
      <div class="gap-top">
        <div style="flex:1;font-size:14px;font-weight:600">${s.position + 1}. ${esc(s.title)}</div>
        ${stepBadges(s)}
        <select onchange="setStepStatus('${s.id}', this.value)">${statusOpts}</select>
      </div>
      <div class="gap-body">
        ${s.depends_on.length ? `<div class="msg" style="margin-bottom:6px">After: ${esc(savedDepLabel(s))}</div>` : ""}
        ${s.detail ? `<div style="font-size:13px;margin-bottom:8px">${esc(s.detail)}</div>` : ""}
        ${checklist ? `<div style="margin-bottom:8px">${checklist}</div>` : ""}
        <label>Notes</label>
        <textarea class="notes" onchange="saveStepNotes('${s.id}', this.value)">${esc(s.notes || "")}</textarea>
      </div>
    </div>`;
}

function renderSavedPlan(){
  const p = S.buildPlan.plan, steps = S.buildPlan.steps;
  const done = steps.filter(s => s.status === "done").length;
  return `
    <div class="card">
      <div class="phase-h">Build plan · ${esc(p.status || "")}</div>
      <div class="phase-t">${esc(p.title || "Untitled plan")}</div>
      <div class="msg">${esc(p.summary || "")}</div>
      <div class="msg" style="margin-top:6px">${done} of ${steps.length} steps done</div>
    </div>`
    + steps.map(renderSavedStep).join("");
}

async function setStepStatus(stepId, status){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  // completed_at is the Phase D hinge (SOP-gen + ledger): stamped on done, cleared on any move away
  const patch = { status, completed_at: status === "done" ? new Date().toISOString() : null };
  const { data, error } = await sb.from("build_steps").update(patch).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Status update failed: " + error.message); renderAutomation(); return; }
  Object.assign(s, data);
  setBuildPlanMsg(`Step ${s.position + 1} → ${data.status} ✓`);
  renderAutomation();
}

async function toggleStepChecklist(stepId, idx){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const list = (s.checklist || []).map((c, i) => i === idx ? { ...c, done: !c.done } : c);
  const { data, error } = await sb.from("build_steps").update({ checklist: list }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Checklist update failed: " + error.message); renderAutomation(); return; }  // rerender snaps the checkbox back
  Object.assign(s, data);
  renderAutomation();
}

async function saveStepNotes(stepId, text){
  const s = S.buildPlan.steps.find(x => x.id === stepId); if(!s) return;
  const { data, error } = await sb.from("build_steps").update({ notes: text.trim() || null }).eq("id", stepId).select().single();
  if(error){ setBuildPlanMsg("Notes save failed: " + error.message); return; }
  Object.assign(s, data);
  setBuildPlanMsg("Notes saved ✓");   // no rerender — keeps focus/scroll; local row already mirrors the DB
}

/* ============================================================
   BOOT
============================================================ */
sb.auth.onAuthStateChange((_e, session) => { if(session && document.getElementById("app").style.display === "none") initApp(); });
initApp();
</script>
</body>
